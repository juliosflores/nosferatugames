        <StatCard label="Notificados" value={espera.filter(e=>e.notificado).length} sub="receberam aviso" color="var(--green)" icon="✅"/>
        <StatCard label="Conversas ativas" value={conversas.filter(c=>!c.converteu&&!c.follow_up_enviado).length} sub="sem follow-up" color="var(--purple)" icon="💬"/>
        <StatCard label="Bloqueados" value={blacklist.filter(b=>b.ativo).length} sub="na blacklist" color="var(--red-b)" icon="🚫"/>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.btn,background:tab===t.id?'rgba(204,20,20,.15)':'var(--surface)',border:`1px solid ${tab===t.id?'rgba(204,20,20,.4)':'var(--border)'}`,color:tab===t.id?'var(--red-b)':'var(--dim)',fontSize:13}}>
            {t.icon} {t.label}
          </button>
        ))}
        <button onClick={load} style={{...S.btn,background:'var(--surface)',border:'1px solid var(--border)',color:'var(--dim)',fontSize:13,marginLeft:'auto'}}>↻ Atualizar</button>
      </div>

      {/* Lista de Espera */}
      {tab==='espera' && (
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// CLIENTES AGUARDANDO PRODUTO</div>
          {espera.length===0
            ? <div style={{fontSize:14,color:'var(--muted)',textAlign:'center',padding:24}}>Nenhum cliente na lista de espera</div>
            : espera.map(e=>(
              <div key={e.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontSize:15,fontWeight:700,color:e.notificado?'var(--muted)':'var(--text)'}}>{e.cliente_name||'Desconhecido'}</div>
                  <div style={{fontSize:13,color:'var(--dim)'}}>📱 {e.phone} · 🎮 <strong>{e.termo_buscado}</strong>{e.console?' ('+e.console+')':''}</div>
                  <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{fmtDateFull(e.created_at)}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  {e.notificado
                    ? <MonoTag color="var(--green)" bg="rgba(37,211,102,.1)">✅ Notificado</MonoTag>
                    : <MonoTag color="var(--gold)" bg="rgba(255,184,0,.1)">⏳ Aguardando</MonoTag>}
                  <Btn color="danger" onClick={()=>removerEspera(e.id)} style={{fontSize:12,padding:'4px 10px'}}>✕</Btn>
                </div>
              </div>
            ))}
        </div>
      )}

      {/* Conversas Ativas */}
      {tab==='conversas' && (
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// CONVERSAS EM ANDAMENTO</div>
          {conversas.length===0
            ? <div style={{fontSize:14,color:'var(--muted)',textAlign:'center',padding:24}}>Nenhuma conversa registrada</div>
            : conversas.map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontSize:15,fontWeight:700,color:c.converteu?'var(--muted)':'var(--text)'}}>{c.cliente_name||'Desconhecido'}</div>
                  <div style={{fontSize:13,color:'var(--dim)'}}>📱 {c.phone}{c.ultimo_interesse?' · 🎮 '+c.ultimo_interesse:''}{c.console?' ('+c.console+')':''}</div>
                  <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>Última msg: {fmtDateFull(c.ultima_mensagem_at)}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  {c.converteu && <MonoTag color="var(--green)" bg="rgba(37,211,102,.1)">✅ Converteu</MonoTag>}
                  {c.follow_up_enviado && !c.converteu && <MonoTag color="var(--purple)" bg="rgba(168,85,247,.1)">📤 Follow-up enviado</MonoTag>}
                  {!c.converteu && !c.follow_up_enviado && <MonoTag color="var(--gold)" bg="rgba(255,184,0,.1)">⏳ Ativo</MonoTag>}
                  {!c.converteu && <Btn color="green" onClick={()=>marcarConverteu(c.id)} style={{fontSize:12,padding:'4px 10px'}}>✅ Converteu</Btn>}
                </div>
              </div>
            ))}
        </div>
      )}

      {/* Blacklist */}
      {tab==='blacklist' && (
        <div>
          <div style={{...S.card, marginBottom:16}}>
            <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// ADICIONAR À BLACKLIST</div>
            <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:180}}>
                <label style={S.label}>Número (somente dígitos)</label>
                <input value={novoBlack.phone} onChange={e=>setNovoBlack(p=>({...p,phone:e.target.value}))} placeholder="5551999887766" style={S.input}/>
              </div>
              <div style={{flex:2,minWidth:180}}>
                <label style={S.label}>Motivo</label>
                <input value={novoBlack.motivo} onChange={e=>setNovoBlack(p=>({...p,motivo:e.target.value}))} placeholder="Ex: não compra, só enrola..." style={S.input}/>
              </div>
              <div style={{display:'flex',alignItems:'flex-end'}}>
                <Btn color="danger" onClick={addBlacklist}>🚫 Bloquear</Btn>
              </div>
            </div>
          </div>
          <div style={S.card}>
            <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// NÚMEROS BLOQUEADOS</div>
            {blacklist.length===0
              ? <div style={{fontSize:14,color:'var(--muted)',textAlign:'center',padding:24}}>Nenhum número bloqueado</div>
              : blacklist.map(b=>(
                <div key={b.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:b.ativo?'var(--red-b)':'var(--muted)'}}>{b.phone}</div>
                    {b.motivo && <div style={{fontSize:13,color:'var(--dim)'}}>{b.motivo}</div>}
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{fmtDateFull(b.created_at)}</div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    {b.ativo ? <MonoTag color="var(--red-b)" bg="rgba(204,20,20,.1)">🚫 Bloqueado</MonoTag> : <MonoTag color="var(--muted)" bg="var(--surface2)">Inativo</MonoTag>}
                    <Btn color={b.ativo?'ghost':'danger'} onClick={()=>toggleBlacklist(b.id,b.ativo)} style={{fontSize:12,padding:'4px 10px'}}>{b.ativo?'Desbloquear':'Bloquear'}</Btn>
                  </div>
                </div>
              ))}
          </div>
        </div>
      )}
    </div>
  );
};



// ── CuponsPage ────────────────────────────────────────────────
const CuponsPage = () => {
  const [cupons, setCupons]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [editando, setEditando] = useState(null);
  const [saving, setSaving]     = useState(false);
  const [toast, setToast]       = useState('');
  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(''),3000); };
  const EMPTY = { codigo:'', desconto_pct:10, desconto_fixo:0, ativo:true, usos_max:100, validade:'', descricao:'' };

  const carregar = async () => {
    setLoading(true);
    try { setCupons(await supa('cupons?order=created_at.desc') || []); }
    catch(e){ console.error(e); } finally { setLoading(false); }
  };
  useEffect(()=>{ carregar(); },[]);

  const salvar = async () => {
    if (!editando.codigo.trim()) { showToast('✕ Código obrigatório'); return; }
    setSaving(true);
    try {
      const { id, ...dados } = editando;
      dados.codigo = dados.codigo.toUpperCase().trim();
      dados.desconto_pct = Number(dados.desconto_pct||0);
      dados.desconto_fixo = Number(dados.desconto_fixo||0);
      dados.usos_max = Number(dados.usos_max||100);
      if (id) await supa(`cupons?id=eq.${id}`, { method:'PATCH', body: JSON.stringify(dados) });
      else    await supa('cupons', { method:'POST', body: JSON.stringify(dados) });
      setEditando(null); showToast('✔ Salvo!'); carregar();
    } catch(e){ showToast('✕ '+e.message); } finally { setSaving(false); }
  };

  const toggleAtivo = async (c) => {
    await supa(`cupons?id=eq.${c.id}`, { method:'PATCH', body: JSON.stringify({ ativo: !c.ativo }) });
    carregar();
  };

  const deletar = async (id) => {
    if (!confirm('Excluir cupom?')) return;
    await supa(`cupons?id=eq.${id}`, { method:'DELETE' });
    carregar();
  };

  return (
    <div>
      {toast && <div style={{position:'fixed',top:70,right:24,zIndex:2000,background:'var(--surface2)',border:'1px solid var(--border)',padding:'10px 18px',borderRadius:4,fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--text)'}}>{toast}</div>}
      <div style={{marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div><div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Cupons</div><div style={{fontSize:14,color:'var(--muted)'}}>{cupons.length} cupons cadastrados</div></div>
        <Btn onClick={()=>setEditando({...EMPTY})}>+ Novo Cupom</Btn>
      </div>
      {loading ? <div style={{textAlign:'center',padding:40,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:12}}>Carregando...</div> : (
        <div style={{...S.card,padding:0,overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',minWidth:600}}>
              <thead><tr style={{background:'var(--bg3)'}}>{['Código','Desconto','Usos','Validade','Status','Ações'].map(h=>(
                <th key={h} style={{padding:'10px 14px',textAlign:'left',fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--muted)',letterSpacing:'0.15em',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
              ))}</tr></thead>
              <tbody>
                {cupons.length===0 && <tr><td colSpan={6} style={{padding:'2rem',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:13}}>nenhum cupom cadastrado</td></tr>}
                {cupons.map(c=>(
                  <tr key={c.id} style={{borderTop:'1px solid var(--border)',opacity:c.ativo?1:0.5}}>
                    <td style={{padding:'10px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:14,fontWeight:700,color:'var(--gold)'}}>{c.codigo}</td>
                    <td style={{padding:'10px 14px',fontSize:13,color:'var(--green)'}}>
                      {c.desconto_pct>0?c.desconto_pct+'%':''}
                      {c.desconto_fixo>0?(c.desconto_pct>0?' + ':'')+('R$'+Number(c.desconto_fixo).toLocaleString('pt-BR')):''}
                    </td>
                    <td style={{padding:'10px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--dim)'}}>{c.usos_atual||0}/{c.usos_max||'∞'}</td>
                    <td style={{padding:'10px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)'}}>{c.validade||'Sem limite'}</td>
                    <td style={{padding:'10px 14px'}}>
                      <span style={{fontFamily:'Share Tech Mono, monospace',fontSize:10,padding:'2px 8px',borderRadius:2,background:c.ativo?'rgba(37,211,102,.12)':'var(--surface2)',color:c.ativo?'var(--green)':'var(--muted)',border:'1px solid '+( c.ativo?'rgba(37,211,102,.3)':'var(--border)')}}>
                        {c.ativo?'✅ ATIVO':'⏸ INATIVO'}
                      </span>
                    </td>
                    <td style={{padding:'10px 14px'}}>
                      <div style={{display:'flex',gap:4}}>
                        <button onClick={()=>setEditando(c)} style={{...S.btn,padding:'4px 8px',fontSize:12,background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--dim)'}}>✏</button>
                        <button onClick={()=>toggleAtivo(c)} style={{...S.btn,padding:'4px 8px',fontSize:12,background:c.ativo?'rgba(255,184,0,.1)':'rgba(37,211,102,.1)',border:'1px solid var(--border)',color:c.ativo?'var(--gold)':'var(--green)'}}>{c.ativo?'⏸':'▶'}</button>
                        <button onClick={()=>deletar(c.id)} style={{...S.btn,padding:'4px 8px',fontSize:12,background:'rgba(204,20,20,.1)',border:'1px solid var(--border-r)',color:'var(--red-b)'}}>🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {editando && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,width:'100%',maxWidth:460,padding:24,position:'relative'}}>
            <button onClick={()=>setEditando(null)} style={{position:'absolute',top:14,right:14,background:'none',border:'none',color:'var(--dim)',fontSize:20,cursor:'pointer'}}>✕</button>
            <div style={{fontFamily:'Press Start 2P, monospace',fontSize:11,color:'var(--text)',marginBottom:20}}>{editando.id?'EDITAR CUPOM':'NOVO CUPOM'}</div>
            <Input label="Código (ex: NOSFERATU10)" value={editando.codigo} onChange={e=>setEditando(p=>({...p,codigo:e.target.value.toUpperCase()}))} placeholder="NATAL20" />
            <div className="ng-grid2" style={S.grid2}>
              <Input label="Desconto (%)" type="number" value={editando.desconto_pct} onChange={e=>setEditando(p=>({...p,desconto_pct:e.target.value}))} placeholder="10" />
              <Input label="Desc. Fixo (R$)" type="number" value={editando.desconto_fixo||''} onChange={e=>setEditando(p=>({...p,desconto_fixo:e.target.value}))} placeholder="0" />
            </div>
            <div className="ng-grid2" style={S.grid2}>
              <Input label="Máx. de usos" type="number" value={editando.usos_max} onChange={e=>setEditando(p=>({...p,usos_max:e.target.value}))} placeholder="100" />
              <Input label="Validade" type="date" value={editando.validade||''} onChange={e=>setEditando(p=>({...p,validade:e.target.value}))} />
            </div>
            <Input label="Descrição" value={editando.descricao||''} onChange={e=>setEditando(p=>({...p,descricao:e.target.value}))} placeholder="Cupom de natal" />
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
              <Btn color="ghost" onClick={()=>setEditando(null)}>Cancelar</Btn>
              <Btn onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── UploadCSVPage ─────────────────────────────────────────────
const UploadCSVPage = () => {
  const [preview, setPreview]   = useState([]);
  const [uploading, setUploading] = useState(false);
  const [resultado, setResultado] = useState(null);
  const [toast, setToast]         = useState('');
  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(''),4000); };

  const COLUNAS = ['nome','preco','console','condicao','descricao','imagem_url'];

  const lerCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split('\n').filter(l=>l.trim());
      const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/["\']/g,''));
      const rows = lines.slice(1).map(line=>{
        const vals = line.split(',').map(v=>v.trim().replace(/^["\']|["\']$/g,''));
        const obj = {};
        headers.forEach((h,i)=>{ obj[h] = vals[i]||''; });
        return obj;
      }).filter(r=>r.nome);
      setPreview(rows);
      setResultado(null);
    };
    reader.readAsText(file, 'UTF-8');
  };

  const importar = async () => {
    if (preview.length===0) return;
    setUploading(true);
    let ok=0, erros=0;
    for (const row of preview) {
      try {
        const prod = {
          nome: row.nome||'Sem nome',
          preco: row.preco ? Number(row.preco.replace(',','.')) : null,
          console: row.console||'Outro',
          condicao: row.condicao||'Usado',
          descricao: row.descricao||'',
          imagem_url: row.imagem_url||'',
          ativo: true,
          vendido: false,
          destaque: false,
        };
        await supa('produtos', { method:'POST', body: JSON.stringify(prod) });
        ok++;
      } catch(e){ erros++; }
    }
    setResultado({ ok, erros });
    setUploading(false);
    if (ok>0) showToast('✔ '+ok+' produtos importados!');
  };

  const baixarTemplate = () => {
    const csv = COLUNAS.join(',')+'\n'+
      'PS4 Slim 500GB,850,PS4 Slim,Usado,Ótimo estado sem arranhões,'+ '\n'+
      'Nintendo Switch OLED,1500,Switch OLED,Seminovo,Na caixa com todos os acessórios,';
    const blob = new Blob([csv], { type:'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'template_produtos_nosferatu.csv';
    a.click();
  };

  return (
    <div>
      {toast && <div style={{position:'fixed',top:70,right:24,zIndex:2000,background:'var(--surface2)',border:'1px solid var(--border)',padding:'10px 18px',borderRadius:4,fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--text)'}}>{toast}</div>}
      <div style={{marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div><div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Upload em Massa</div><div style={{fontSize:14,color:'var(--muted)'}}>Importe vários produtos via CSV</div></div>
        <Btn color="ghost" onClick={baixarTemplate}>⬇ Baixar Template</Btn>
      </div>
      <div style={{...S.card,marginBottom:16}}>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:12}}>// Colunas do CSV</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {COLUNAS.map(c=><span key={c} style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,padding:'3px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--purple)'}}>{c}</span>)}
        </div>
        <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',border:'2px dashed var(--border)',borderRadius:6,padding:'20px',justifyContent:'center'}}>
          <span style={{fontSize:24}}>📂</span>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>Selecionar arquivo CSV</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>Clique ou arraste o arquivo aqui</div>
          </div>
          <input type="file" accept=".csv" onChange={lerCSV} style={{display:'none'}} />
        </label>
      </div>

      {preview.length > 0 && (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:14,color:'var(--text)'}}>{preview.length} produto{preview.length>1?'s':''} encontrado{preview.length>1?'s':''} no arquivo</div>
            <Btn onClick={importar} disabled={uploading}>{uploading?'Importando...':'⬆ Importar todos'}</Btn>
          </div>
          {resultado && (
            <div style={{...S.card,marginBottom:12,borderTop:'3px solid '+(resultado.erros===0?'var(--green)':'var(--gold)')}}>
              <div style={{fontSize:14,color:resultado.erros===0?'var(--green)':'var(--gold)'}}>{resultado.ok>0?'✔ '+resultado.ok+' importados':''} {resultado.erros>0?'✕ '+resultado.erros+' erros':''}</div>
            </div>
          )}
          <div style={{...S.card,padding:0,overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',minWidth:500}}>
                <thead><tr style={{background:'var(--bg3)'}}>{['Nome','Console','Preço','Condição'].map(h=>(
                  <th key={h} style={{padding:'8px 12px',textAlign:'left',fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--muted)',letterSpacing:'0.1em',textTransform:'uppercase'}}>{h}</th>
                ))}</tr></thead>
                <tbody>
                  {preview.slice(0,20).map((r,i)=>(
                    <tr key={i} style={{borderTop:'1px solid var(--border)'}}>
                      <td style={{padding:'8px 12px',fontSize:13,color:'var(--text)'}}>{r.nome}</td>
                      <td style={{padding:'8px 12px',fontSize:12,color:'var(--dim)'}}>{r.console||'—'}</td>
                      <td style={{padding:'8px 12px',fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--gold)'}}>{r.preco?'R$'+r.preco:'—'}</td>
                      <td style={{padding:'8px 12px',fontSize:12,color:'var(--dim)'}}>{r.condicao||'—'}</td>
                    </tr>
                  ))}
                  {preview.length>20 && <tr><td colSpan={4} style={{padding:'8px 12px',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:11}}>... e mais {preview.length-20} produtos</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const BuscaGlobal = ({produtos, setTab, fechar}) => {
  const [q, setQ]             = useState('');
  const [resultados, setRes]  = useState([]);
  const [loading, setLoading] = useState(false);
  const inputRef = useRef();

  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),50); },[]);

  useEffect(()=>{
    if (q.length < 2) { setRes([]); return; }
    setLoading(true);
    const t = setTimeout(async ()=>{
      try {
        const [prods, fins, peds] = await Promise.all([
          supa('produtos?select=id,nome,console,preco,vendido&order=nome.asc&limit=10&nome=ilike.*'+encodeURIComponent(q)+'*'),
          supa('financeiro?select=id,produto,preco_venda,status&order=data_compra.desc&limit=10&produto=ilike.*'+encodeURIComponent(q)+'*'),
          supa('pedidos?select=id,status,total,created_at&order=created_at.desc&limit=5'),
        ]);
        const r = [
          ...(prods||[]).map(p=>({tipo:'produto',label:p.nome,sub:(p.console||'')+(p.vendido?' · VENDIDO':''),valor:p.preco?'R$'+Number(p.preco).toLocaleString('pt-BR'):'',acao:()=>{setTab('produtos');fechar();}})),
          ...(fins||[]).map(f=>({tipo:'financeiro',label:f.produto,sub:f.status==='vendido'?'Vendido':'Em estoque',valor:f.preco_venda?'R$'+Number(f.preco_venda).toLocaleString('pt-BR'):'',acao:()=>{setTab('financeiro');fechar();}})),
        ];
        setRes(r);
      } catch(e){ console.error(e); }
      finally { setLoading(false); }
    }, 300);
    return ()=>clearTimeout(t);
  },[q]);

  const TIPO_COLOR = {produto:'var(--purple)',financeiro:'var(--gold)',pedido:'var(--green)'};
  const TIPO_ICON  = {produto:'🗡️',financeiro:'💰',pedido:'💳'};

        {loading && <div style={{padding:'16px',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:12}}>buscando...</div>}

    </div>
  );

  const [result, setResult]       = useState(null);
  const [preset, setPreset]       = useState('jogo');
  const [bgTheme, setBgTheme]     = useState('premium');
  const [logoPos, setLogoPos]     = useState('br'); // br=bottom-right, bl, tr, tl
  const [logoSize, setLogoSize]   = useState(18);   // % da largura
  const [step, setStep]           = useState('idle'); // idle | removing | composing | done
  const [toast, setToast]         = useState('');
  const [autoUpload, setAutoUpload] = useState(false);
  const canvasRef = useRef(null);
  const logoImgRef = useRef(null);

  const showToast = (msg, dur=3500) => { setToast(msg); setTimeout(()=>setToast(''), dur); };

  // Carrega logo salvo
  useEffect(() => {
    if (logoUrl) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { logoImgRef.current = img; };
      img.src = logoUrl;
    }
  }, [logoUrl]);

  const handleFile = (f) => {
    if (!f || !f.type.startsWith('image/')) { showToast('✕ Envie uma imagem (JPG, PNG, WEBP)'); return; }
    setFile(f);
    setResult(null);
    setStep('idle');
    const reader = new FileReader();
    reader.onload = e => setPreview(e.target.result);
    reader.readAsDataURL(f);
  };

  const handleLogoDrop = (f) => {
    if (!f || !f.type.startsWith('image/')) return;
    setLogoFile(f);
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      localStorage.setItem('ng_studio_logo', dataUrl);
      setLogoUrl(dataUrl);
      const img = new Image();
      img.onload = () => { logoImgRef.current = img; showToast('✔ Logo salvo!'); };
      img.src = dataUrl;
    };
    reader.readAsDataURL(f);
  };

  const removeBackground = async (imageFile) => {
    const fd = new FormData();
    fd.append('image_file', imageFile);
    fd.append('size', 'auto');
    const r = await fetch('https://api.remove.bg/v1.0/removebg', {
      method: 'POST',
      headers: { 'X-Api-Key': REMOVEBG_KEY },
      body: fd,
    });
    if (!r.ok) {
      const err = await r.json().catch(()=>({}));
      throw new Error(err?.errors?.[0]?.title || 'Erro remove.bg');
    }
    const blob = await r.blob();
    return blob;
  };

  const composeImage = (noBgBlob) => {
    return new Promise((resolve) => {
      const { w, h } = PRESETS[preset];
      const canvas = canvasRef.current;
      canvas.width  = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');

      // Fundo gradiente premium
      const theme = BG_THEMES[bgTheme];
      const grad = ctx.createRadialGradient(w*0.5, h*0.4, 0, w*0.5, h*0.5, w*0.75);
      grad.addColorStop(0,   theme.colors[1]);
      grad.addColorStop(0.6, theme.colors[0]);
      grad.addColorStop(1,   theme.colors[2]);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Reflexo de luz sutil no topo
      const topLight = ctx.createRadialGradient(w*0.5, 0, 0, w*0.5, 0, w*0.6);
      topLight.addColorStop(0, 'rgba(255,255,255,0.04)');
      topLight.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = topLight;
      ctx.fillRect(0, 0, w, h);

      // Glow vermelho central
      const glow = ctx.createRadialGradient(w*0.5, h*0.55, 0, w*0.5, h*0.55, w*0.45);
      glow.addColorStop(0, 'rgba(200,20,20,0.12)');
      glow.addColorStop(1, 'rgba(200,20,20,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);

      // Grade retro sutil
      ctx.strokeStyle = 'rgba(100,30,30,0.08)';
      ctx.lineWidth = 1;
      const step = 40;
      for (let x = 0; x <= w; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
      for (let y = 0; y <= h; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

      // Produto sem fundo
      const prodImg = new Image();
      prodImg.onload = () => {
        // ── Bounding box: encontra a área real do produto (pixels não-transparentes)
        const offscreen = document.createElement('canvas');
        offscreen.width  = prodImg.width;
        offscreen.height = prodImg.height;
        const octx = offscreen.getContext('2d');
        octx.drawImage(prodImg, 0, 0);
        const imgData = octx.getImageData(0, 0, prodImg.width, prodImg.height);
        const pixels  = imgData.data;
        let minX = prodImg.width, maxX = 0, minY = prodImg.height, maxY = 0;
        for (let i = 0; i < pixels.length; i += 4) {
          if (pixels[i + 3] > 10) { // alpha > 10 = pixel do produto
            const px2 = (i / 4) % prodImg.width;
            const py2 = Math.floor((i / 4) / prodImg.width);
            if (px2 < minX) minX = px2;
            if (px2 > maxX) maxX = px2;
            if (py2 < minY) minY = py2;
            if (py2 > maxY) maxY = py2;
          }
        }
        // Fallback: se não achou nada, usa imagem toda
        if (maxX === 0) { minX=0; maxX=prodImg.width; minY=0; maxY=prodImg.height; }

        const cropW = maxX - minX;
        const cropH = maxY - minY;

        // ── Normaliza: produto sempre ocupa 78% da área útil, centralizado
        const TARGET = 0.78;
        const pad    = (1 - TARGET) / 2;
        const maxW   = w * TARGET;
        const maxH   = h * TARGET;
        const ratio  = Math.min(maxW / cropW, maxH / cropH);
        const pW     = cropW * ratio;
        const pH     = cropH * ratio;
        const px     = (w - pW) / 2;
        const py     = (h - pH) / 2;

        // Sombra do produto
        ctx.shadowColor   = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur    = 60;
        ctx.shadowOffsetY = 20;
        // Desenha só a região do produto (crop pelo bounding box)
        ctx.drawImage(prodImg, minX, minY, cropW, cropH, px, py, pW, pH);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur  = 0;
        ctx.shadowOffsetY = 0;

        // Logo
        if (logoImgRef.current) {
          const lImg = logoImgRef.current;
          const lW = w * (logoSize / 100);
          const lH = lW * (lImg.height / lImg.width);
          const margin = w * 0.03;
          let lx, ly;
          if      (logoPos === 'br') { lx = w - lW - margin; ly = h - lH - margin; }
          else if (logoPos === 'bl') { lx = margin;           ly = h - lH - margin; }
          else if (logoPos === 'tr') { lx = w - lW - margin; ly = margin; }
          else                       { lx = margin;           ly = margin; }
          ctx.globalAlpha = 0.92;
          ctx.drawImage(lImg, lx, ly, lW, lH);
          ctx.globalAlpha = 1;
        }

        resolve(canvas.toDataURL('image/jpeg', 0.95));
      };
      const url = URL.createObjectURL(noBgBlob);
      prodImg.src = url;
    });
  };

  const processar = async () => {

};

// ── Publicar Produto v2 — Fila + Auto-correção + Studio ──────
// ── Token ChatGPT: renovação automática via sessão do browser ──
let forceRenovarToken = async () => { console.log('Hook useChatGPTToken não montado'); return false; };

  const useChatGPTToken = () => {
    const renovarToken = async () => {
      // Desativado no frontend por restrições de CORS no navegador.
      // Sincronização de token gerenciada automaticamente via extensão Chrome Nosferatu Sync.
      return false;
    };
    useEffect(() => {
      renovarToken();
      const t = setInterval(renovarToken, 6 * 60 * 60 * 1000);
      return () => clearInterval(t);
    }, []);
  };

const PublicarPage = () => {
  useChatGPTToken(); // 🔑 Renovação automática de token
  const REMOVEBG_KEY  = localStorage.getItem('ng_removebg_key') || 'bLTvxEPqTP8tW7wvU5wvuHJx';
  const MAKE_WEBHOOK  = localStorage.getItem('ng_make_webhook') || '';

  const BG_THEMES = {
    premium: { label:'Preto Premium', colors:['#0a0a0a','#1a0a0a','#0d0d0d'] },
    noite:   { label:'Noite Roxa',    colors:['#08050f','#12062a','#0a0a12'] },
    sangue:  { label:'Sangue',        colors:['#0f0000','#1a0505','#0a0000'] },
  };

  // Fila: [{id, file, rawPreview, status, fixes, finalImg, cloudUrl, dados, editDados, log, publicado}]
  const [fila,      setFila]      = useState([]);
  const [selecionado, setSel]     = useState(null); // id do card aberto
  const [bgTheme,   setBgTheme]   = useState('premium');
  const [analisando,setAnalisando]= useState(false);
  const canvasRef  = useRef(null);
  const logoRef    = useRef(null);

  // Logo: carrega do localStorage e mantém sempre atualizado
  useEffect(() => {
    const saved = localStorage.getItem('ng_studio_logo');
    if (saved) {
      const i = new Image();
      i.onload = () => { logoRef.current = i; };
      i.src = saved;
    } else {
      // Tenta carregar logo.png do próprio site como fallback
      const i = new Image();
      i.crossOrigin = 'anonymous';
      i.onload = () => { logoRef.current = i; };
      i.onerror = () => { logoRef.current = null; };
      i.src = '/logo.png';
    }
  }, []);

  // ── helpers de fila ──────────────────────────────────────
  const updItem = (id, patch) =>
    setFila(f => f.map(x => x.id===id ? {...x,...patch} : x));

  const addLog = (id, msg, tipo='info') =>
    setFila(f => f.map(x => x.id===id ? {...x, log:[...(x.log||[]),{msg,tipo,ts:new Date().toLocaleTimeString('pt-BR')}]} : x));

  // ── EXIF orientation fix ─────────────────────────────────
  const getExifRotation = (file) => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const view = new DataView(e.target.result);
      if (view.getUint16(0,false) !== 0xFFD8) return resolve(1);
      let offset=2, len=view.byteLength;
      while(offset<len) {
        const marker = view.getUint16(offset,false); offset+=2;
        if (marker===0xFFE1) {
          if (view.getUint32(offset+=2,false)!==0x45786966) return resolve(1);
          const little = view.getUint16(offset+=6,false)===0x4949;
          offset += view.getUint32(offset+4,little);
          const tags = view.getUint16(offset,little); offset+=2;
          for(let i=0;i<tags;i++) {
            if(view.getUint16(offset+(i*12),little)===0x0112)
              return resolve(view.getUint16(offset+(i*12)+8,little));
          }
        } else if ((marker & 0xFF00)!==0xFF00) break;
        else offset += view.getUint16(offset,false);
      }
      resolve(1);
    };
    reader.readAsArrayBuffer(file.slice(0,65536));
  });

  // ── Auto-corrigir imagem (EXIF + brilho + contraste) ────
  const autoCorrigir = (imgEl, orientation) => {
    const w0 = imgEl.naturalWidth, h0 = imgEl.naturalHeight;
    const rotated = orientation>=5 && orientation<=8;
    const cw = rotated ? h0 : w0;
    const ch = rotated ? w0 : h0;
    const c = document.createElement('canvas');
    c.width=cw; c.height=ch;
    const ctx = c.getContext('2d');
    const transforms = {
      1:[1,0,0,1,0,0], 2:[-1,0,0,1,cw,0], 3:[-1,0,0,-1,cw,ch],
      4:[1,0,0,-1,0,ch], 5:[0,1,1,0,0,0], 6:[0,1,-1,0,ch,0],
      7:[0,-1,-1,0,cw,ch], 8:[0,-1,1,0,0,ch],
    };
    const t = transforms[orientation] || transforms[1];
    ctx.transform(...t);
    ctx.drawImage(imgEl,0,0);
    ctx.setTransform(1,0,0,1,0,0);

    // Auto-brilho/contraste: analisa luminância média
    const data = ctx.getImageData(0,0,cw,ch);
    const px = data.data;
    let sum=0, n=px.length/4;
    for(let i=0;i<px.length;i+=4) sum+=(px[i]*0.299+px[i+1]*0.587+px[i+2]*0.114);
    const avgLum = sum/n;
    // Se muito escuro (<80) ou muito claro (>200): corrige
    const fixes = [];
    let factor=1, bright=0;
    if(avgLum<80)  { factor=1.15; bright=10; fixes.push('brilho aumentado'); }
    if(avgLum>200) { factor=0.88; bright=-8; fixes.push('exposição reduzida'); }
    if(orientation>1) fixes.push(`rotação EXIF corrigida (${orientation})`);

    if(factor!==1||bright!==0) {
      for(let i=0;i<px.length;i+=4){
        px[i]  =Math.min(255,Math.max(0,px[i]  *factor+bright));
        px[i+1]=Math.min(255,Math.max(0,px[i+1]*factor+bright));
        px[i+2]=Math.min(255,Math.max(0,px[i+2]*factor+bright));
      }
      ctx.putImageData(data,0,0);
    }
    return { dataUrl: c.toDataURL('image/jpeg',0.92), fixes };
  };

  // ── Compor imagem studio (remove.bg blob → canvas final) ─
  const composeStudio = (noBgBlob) => new Promise(resolve => {
    const W=1080, H=1080;
    const canvas = canvasRef.current;
    canvas.width=W; canvas.height=H;
    const ctx = canvas.getContext('2d');
    const theme = BG_THEMES[bgTheme];
    // Fundo
    const grad = ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.5,W*.8);
    grad.addColorStop(0,theme.colors[1]);
    grad.addColorStop(.55,theme.colors[0]);
    grad.addColorStop(1,theme.colors[2]);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // Glow central
    const gl=ctx.createRadialGradient(W*.5,H*.58,0,W*.5,H*.58,W*.48);
    gl.addColorStop(0,'rgba(200,20,20,0.14)'); gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gl; ctx.fillRect(0,0,W,H);
    // Grade sutil
    ctx.strokeStyle='rgba(120,30,30,0.06)'; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<=H;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // Produto
    const img=new Image();
    img.onload=()=>{
      // Bounding box
      const off=document.createElement('canvas');
      off.width=img.width; off.height=img.height;
      const octx=off.getContext('2d'); octx.drawImage(img,0,0);
      const d=octx.getImageData(0,0,img.width,img.height).data;
      let x0=img.width,x1=0,y0=img.height,y1=0;
      for(let i=0;i<d.length;i+=4){
        if(d[i+3]>12){
          const x=i/4%img.width, y=Math.floor(i/4/img.width);
          if(x<x0)x0=x; if(x>x1)x1=x; if(y<y0)y0=y; if(y>y1)y1=y;
        }
      }
      if(x1===0){x0=0;x1=img.width;y0=0;y1=img.height;}
      const cW=x1-x0, cH=y1-y0;
      const ratio=Math.min(W*.80/cW, H*.80/cH);
      const pW=cW*ratio, pH=cH*ratio;
      const px=(W-pW)/2, py=(H-pH)/2;
      // Sombra
      ctx.shadowColor='rgba(0,0,0,0.80)'; ctx.shadowBlur=80; ctx.shadowOffsetY=30;
      ctx.drawImage(img,x0,y0,cW,cH,px,py,pW,pH);
      ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
      // Reflexo sutil no chão
      ctx.save();
      ctx.translate(0,py+pH);
      ctx.scale(1,-1);
      const refGrad=ctx.createLinearGradient(0,0,0,pH*.25);
      refGrad.addColorStop(0,'rgba(255,255,255,0.06)');
      refGrad.addColorStop(1,'rgba(255,255,255,0)');
      ctx.globalAlpha=0.4;
      ctx.drawImage(img,x0,y0,cW,cH,px,0,pW,pH*.25);
      ctx.fillStyle=refGrad; ctx.fillRect(px,0,pW,pH*.25);
      ctx.restore(); ctx.globalAlpha=1;
      // Logo — canto inferior direito com tamanho maior
      if(logoRef.current){
        const l=logoRef.current;
        const lW=W*.22, lH=lW*(l.height/l.width), mg=W*.03;
        ctx.globalAlpha=0.90;
        ctx.drawImage(l, W-lW-mg, H-lH-mg, lW, lH);
        ctx.globalAlpha=1;
      }
      resolve(canvas.toDataURL('image/jpeg',0.95));
    };
    img.src=URL.createObjectURL(noBgBlob);
  });

  // ── Girar um item da fila 90 graus ─────────────────────────
  const girarItem = async (id) => {
    const item = fila.find(x => x.id === id);
    if (!item || item.status === 'processando' || item.status === 'publicando') return;
    updItem(id, { status: 'processando' });
    addLog(id, '↻ Girando imagem 90°...', 'info');
    try {
      const img = await new Promise((res, rej) => {
        const im = new Image();
        im.onload = () => res(im);
        im.onerror = rej;
        im.src = item.rawPreview || URL.createObjectURL(item.file);
      });
      const c = document.createElement('canvas');
      c.width = img.naturalHeight;
      c.height = img.naturalWidth;
      const x = c.getContext('2d');
      x.translate(c.width/2, c.height/2);
      x.rotate(Math.PI/2);
      x.drawImage(img, -img.naturalWidth/2, -img.naturalHeight/2);
      const dataUrl = c.toDataURL('image/jpeg', 0.92);
      const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.92));
      const rotatedFile = new File([blob], item.file.name, { type: 'image/jpeg' });
      
      updItem(id, {
        file: rotatedFile,
        rawPreview: dataUrl,
        finalImg: null,
        status: 'aguardando'
      });
      addLog(id, '✔ Girada. Reprocessando...', 'ok');
      
      // Reprocessa automaticamente
      setTimeout(() => processarItem(id), 300);
    } catch (e) {
      addLog(id, '✕ Erro ao girar: ' + (e.message || e), 'erro');
      updItem(id, { status: 'erro' });
    }
  };

  // ── Processar um item da fila (remove.bg + compose) ──────
  const processarItem = async (id, itemDireto) => {
    const item = itemDireto || fila.find(x=>x.id===id);
    if(!item) return;
    updItem(id,{status:'processando'});
    addLog(id,'🔲 Removendo fundo...','info');
    try {
      const fd=new FormData();
      fd.append('image_file', item.file);
      fd.append('size','auto');
      const r=await fetch('https://api.remove.bg/v1.0/removebg',{method:'POST',headers:{'X-Api-Key':REMOVEBG_KEY},body:fd});
      if(!r.ok) throw new Error('remove.bg: '+r.status);
      const blob=await r.blob();
      addLog(id,'✔ Fundo removido','ok');
      addLog(id,'🎨 Compondo imagem studio...','info');
      const finalImg=await composeStudio(blob);
      addLog(id,'✔ Imagem pronta','ok');
      updItem(id,{status:'pronto',finalImg});
    } catch(e) {
      addLog(id,'✕ '+e.message,'erro');
      updItem(id,{status:'erro'});
    }
  };

  // ── IA identifica todos os prontos ───────────────────────
  const analisarTodos = async () => {
    const prontos = fila.filter(x=>x.status==='pronto'&&!x.dados);
    if(!prontos.length) return;
    setAnalisando(true);
    for(const item of prontos) {
      addLog(item.id,'🤖 IA identificando produto...','info');
      try {
        const toB64=(f)=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
        const b64=await toB64(item.file);
        // Chama Vercel Function (mesmo domínio, sem CORS)
        const resp=await fetch('/api/identificar',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({image_base64:b64,media_type:item.file.type||'image/jpeg'})
        });
        const parsed=await resp.json();
        if(parsed.error) throw new Error(parsed.error);
        updItem(item.id,{dados:parsed,editDados:{...parsed}});
        addLog(item.id,`✔ ${parsed.nome} · R$${parsed.preco}`,'ok');
      } catch(e) {
        addLog(item.id,'✕ IA: '+e.message,'erro');
      }
    }
    setAnalisando(false);
  };

  // ── Publicar um item ─────────────────────────────────────
  const publicarItem = async (id) => {
    const item=fila.find(x=>x.id===id);
    if(!item||!item.finalImg||!item.editDados) return;
    updItem(id,{status:'publicando'});
    try {
      addLog(id,'☁️ Subindo ao Cloudinary...','info');
      const blob=await (await fetch(item.finalImg)).blob();
      const f2=new File([blob],'produto.jpg',{type:'image/jpeg'});
      const url=await cloudUpload(f2);
      addLog(id,'✔ CDN: OK','ok');
      addLog(id,'📦 Criando no Supabase...','info');
      const d=item.editDados;
      const created=await supa('produtos',{method:'POST',body:JSON.stringify({
        nome:d.nome,console:d.console,condicao:d.condicao,preco:d.preco,
        descricao:d.descricao,imagem_url:url,ativo:true,vendido:false
      })});
      registrarLog('INSERT','produtos','Publicação rápida: '+d.nome);
      addLog(id,'✔ Produto criado','ok');
      if(MAKE_WEBHOOK) {
        addLog(id,'📱 Enviando Instagram...','info');
        await fetch(MAKE_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({image_url:url,caption:`${d.descricao}\n\n💰 R$ ${d.preco}\n📲 Chama no WhatsApp!\n\n${d.hashtags}`,produto_id:created?.[0]?.id})});
        addLog(id,'✔ Instagram: enviado','ok');
      }
      updItem(id,{status:'publicado',cloudUrl:url});
      addLog(id,'🎉 Publicado!','ok');
    } catch(e) {
      addLog(id,'✕ '+e.message,'erro');
      updItem(id,{status:'pronto'});
    }
  };

  // ── Adicionar arquivos ───────────────────────────────────
  const adicionarArquivos = async (files) => {
    const novos=[];
    for(const file of files) {
      if(!file.type.startsWith('image/')) continue;
      const id='img_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const orientation=await getExifRotation(file);
      // Carrega imagem pra auto-corrigir
      const rawUrl=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
      const imgEl=await new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=rawUrl;});
      const {dataUrl:correctedUrl, fixes}=autoCorrigir(imgEl,orientation);
      // Converte correctedUrl de volta pra File
      const corrBlob=await (await fetch(correctedUrl)).blob();
      const corrFile=new File([corrBlob],file.name,{type:'image/jpeg'});
      novos.push({id,file:corrFile,rawPreview:correctedUrl,status:'aguardando',fixes,finalImg:null,cloudUrl:'',dados:null,editDados:null,log:[]});
    }
    setFila(f=>[...f,...novos]);
    // Processa automaticamente
    for(const item of novos) {
      setTimeout(()=>processarItem(item.id, item),300);
    }
  };

  const prontos      = fila.filter(x=>x.status==='pronto');
  const semDados     = prontos.filter(x=>!x.dados);
  const publicados   = fila.filter(x=>x.status==='publicado');
  const selItem      = fila.find(x=>x.id===selecionado);

  const statusColor  = {aguardando:'var(--muted)',processando:'var(--gold)',pronto:'var(--cyan)',publicando:'var(--purple)',publicado:'var(--green)',erro:'var(--red-b)'};
  const statusLabel  = {aguardando:'aguardando',processando:'processando...',pronto:'pronto',publicando:'publicando...',publicado:'publicado ✔',erro:'erro'};
  const logColor     = {info:'var(--dim)',ok:'var(--green)',erro:'var(--red-b)',warn:'var(--gold)'};

  return (
    <div>
      <canvas ref={canvasRef} style={{display:'none'}}/>

      <div style={{marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'Press Start 2P, monospace',fontSize:13,color:'var(--text)',marginBottom:4}}>⚡ Publicar Produto</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Adicione fotos → IA identifica → confirme → publique</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {Object.entries(BG_THEMES).map(([k,v])=>(
            <button key={k} onClick={()=>setBgTheme(k)} style={{...S.btn,fontSize:11,padding:'4px 10px',background:bgTheme===k?'var(--red)':'var(--surface2)',color:bgTheme===k?'#fff':'var(--dim)',border:`1px solid ${bgTheme===k?'var(--red)':'var(--border)'}`}}>{v.label}</button>
          ))}
          {fila.length>0&&<button onClick={()=>setFila([])} style={{...S.btn,fontSize:11,padding:'4px 10px',background:'transparent',border:'1px solid var(--border)',color:'var(--muted)'}}>✕ Limpar fila</button>}
        </div>
      </div>

      {/* Upload zone */}
      <label style={{display:'block',border:`2px dashed ${fila.length?'var(--border)':'var(--red)'}`,borderRadius:8,padding:fila.length?'16px':'32px',textAlign:'center',cursor:'pointer',background:'var(--bg3)',marginBottom:14,transition:'all .2s'}}
        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--red)';}}
        onDragLeave={e=>{e.currentTarget.style.borderColor=fila.length?'var(--border)':'var(--red)';}}
        onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--border)';adicionarArquivos([...e.dataTransfer.files]);}}>
        <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>adicionarArquivos([...e.target.files])}/>
        {fila.length
          ? <div style={{fontSize:13,color:'var(--dim)',fontWeight:600}}>+ Adicionar mais fotos</div>
          : <div><div style={{fontSize:40,marginBottom:8}}>📷</div><div style={{fontSize:15,fontWeight:700,color:'var(--text)',marginBottom:4}}>Arraste as fotos dos produtos aqui</div><div style={{fontSize:12,color:'var(--muted)'}}>Várias de uma vez · Auto-corrige rotação, brilho e perspectiva</div></div>
        }
      </label>

      {/* Botão analisar em lote */}
      {semDados.length>0&&(
        <div style={{marginBottom:14}}>
          <button onClick={analisarTodos} disabled={analisando} style={{...S.btn,padding:'10px 20px',fontSize:14,background:analisando?'var(--surface2)':'var(--red)',color:analisando?'var(--muted)':'#fff',border:'none',borderRadius:6}}>
            {analisando?'🤖 Identificando...':'🤖 Identificar '+semDados.length+' produto'+( semDados.length>1?'s':'')+' com IA'}
          </button>
        </div>
      )}

      {fila.length===0&&(
        <div style={{...S.card,textAlign:'center',padding:'48px',border:'1px dashed var(--border)'}}>
          <div style={{fontSize:32,opacity:.2,marginBottom:12}}>📦</div>
          <div style={{fontSize:12,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>nenhuma foto adicionada</div>
        </div>
      )}

      {/* Fila de produtos */}
      {fila.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
          {fila.map(item=>(
            <div key={item.id} style={{...S.card,cursor:'pointer',border:`1px solid ${selecionado===item.id?'var(--red-b)':item.status==='publicado'?'rgba(37,211,102,.3)':item.status==='erro'?'rgba(204,20,20,.4)':'var(--border)'}`,transition:'border .15s'}}
              onClick={()=>setSel(selecionado===item.id?null:item.id)}>

              {/* Thumbnail */}
              <div style={{position:'relative',marginBottom:10}}>
                <div style={{height:160,background:'repeating-conic-gradient(#1a1830 0% 25%,#0f0e1a 0% 50%) 0 0/16px 16px',borderRadius:4,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {item.finalImg
                    ? <img src={item.finalImg} style={{height:'100%',width:'100%',objectFit:'contain'}}/>
                    : item.rawPreview
                      ? <div style={{position:'relative',width:'100%',height:'100%'}}>
                          <img src={item.rawPreview} style={{width:'100%',height:'100%',objectFit:'contain',opacity:.4,filter:'blur(1px)'}}/>
                          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <div style={{width:28,height:28,border:'3px solid var(--border)',borderTopColor:'var(--gold)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
                          </div>
                        </div>
                      : <div style={{color:'var(--muted)',fontSize:24}}>📷</div>
                  }
                </div>
                {item.status !== 'processando' && item.status !== 'publicando' && (
                  <button onClick={(e)=>{e.stopPropagation(); girarItem(item.id);}} title="Girar 90 graus" style={{position:'absolute',top:6,left:6,width:20,height:20,borderRadius:'50%',background:'var(--gold)',border:'none',color:'#000',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1',zIndex:5}}>↻</button>
                )}
                <div style={{position:'absolute',top:6,right:6,padding:'2px 7px',borderRadius:3,background:'var(--bg)',border:'1px solid var(--border)',fontSize:10,fontFamily:'Share Tech Mono, monospace',color:statusColor[item.status]||'var(--dim)'}}>
                  {statusLabel[item.status]||item.status}
                </div>
              </div>

              {/* Info básica */}
              <div style={{fontSize:13,fontWeight:700,color:item.dados?'var(--text)':'var(--muted)',marginBottom:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {item.dados?.nome || item.file.name}
              </div>
              {item.dados&&(
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
                  <span style={{...S.tag(item.dados.condicao)}}>{item.dados.condicao}</span>
                  <span style={{fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--gold)'}}>R$ {item.dados.preco}</span>
                  <span style={{fontSize:10,color:'var(--muted)'}}>{item.dados.console}</span>
                </div>
              )}
              {item.fixes?.length>0&&(
                <div style={{fontSize:10,color:'var(--cyan)',fontFamily:'Share Tech Mono, monospace',marginBottom:4}}>
                  🔧 {item.fixes.join(' · ')}
                </div>
              )}

              {/* Expandido */}
              {selecionado===item.id&&(
                <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}} onClick={e=>e.stopPropagation()}>
                  {item.dados&&item.editDados ? (
                    <>
                      <div style={{marginBottom:8}}>
                        <label style={S.label}>Nome</label>
                        <input value={item.editDados.nome} onChange={e=>updItem(item.id,{editDados:{...item.editDados,nome:e.target.value}})} style={{...S.input,marginBottom:8}}/>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                          <div>
                            <label style={S.label}>Console</label>
                            <select value={item.editDados.console} onChange={e=>updItem(item.id,{editDados:{...item.editDados,console:e.target.value}})} style={S.input}>
                              {CONSOLES.map(c=><option key={c}>{c}</option>)}
                            </select>
                          </div>
                          <div>
                            <label style={S.label}>Condição</label>
                            <select value={item.editDados.condicao} onChange={e=>updItem(item.id,{editDados:{...item.editDados,condicao:e.target.value}})} style={S.input}>
                              {CONDICOES.map(c=><option key={c}>{c}</option>)}
                            </select>
                          </div>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                          <div>
                            <label style={S.label}>Preço R$</label>
                            <input type="number" value={item.editDados.preco} onChange={e=>updItem(item.id,{editDados:{...item.editDados,preco:Number(e.target.value)}})} style={S.input}/>
                          </div>
                        </div>
                        <label style={S.label}>Descrição</label>
                        <textarea value={item.editDados.descricao} rows={2} onChange={e=>updItem(item.id,{editDados:{...item.editDados,descricao:e.target.value}})} style={{...S.input,resize:'vertical',marginBottom:8}}/>
                        <label style={S.label}>Hashtags</label>
                        <input value={item.editDados.hashtags} onChange={e=>updItem(item.id,{editDados:{...item.editDados,hashtags:e.target.value}})} style={{...S.input,marginBottom:10}}/>
                      </div>
                      {item.status!=='publicado'&&(
                        <button onClick={()=>publicarItem(item.id)} disabled={item.status==='publicando'} style={{...S.btn,width:'100%',justifyContent:'center',padding:'10px',fontSize:14,background:item.status==='publicando'?'var(--surface2)':'var(--red)',color:item.status==='publicando'?'var(--muted)':'#fff',border:'none',borderRadius:4}}>
                          {item.status==='publicando'?'⏳ Publicando...':'🚀 Publicar este produto'}
                        </button>
                      )}
                      {item.status==='publicado'&&<div style={{textAlign:'center',color:'var(--green)',fontSize:13,fontWeight:700,padding:'8px'}}>✔ Publicado com sucesso!</div>}
                    </>
                  ) : item.status==='pronto' ? (
                    <div style={{textAlign:'center',padding:'8px'}}>
                      <button onClick={async(e)=>{e.stopPropagation();updItem(item.id,{status:'aguardando'});await analisarTodos();}} style={{...S.btn,fontSize:12,background:'rgba(168,85,247,.15)',color:'var(--purple)',border:'1px solid rgba(168,85,247,.3)'}}>🤖 Identificar este produto</button>
                    </div>
                  ) : null}

                  {/* Mini log */}
                  {item.log?.length>0&&(
                    <div style={{marginTop:10,padding:'8px',background:'var(--bg3)',borderRadius:4,maxHeight:80,overflowY:'auto'}}>
                      {item.log.map((l,i)=>(
                        <div key={i} style={{fontSize:10,color:logColor[l.tipo]||'var(--dim)',fontFamily:'Share Tech Mono, monospace',marginBottom:1}}>{l.ts} {l.msg}</div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Resumo */}
      {fila.length>0&&(
        <div style={{marginTop:16,display:'flex',gap:12,flexWrap:'wrap',fontSize:12,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>
          <span>{fila.length} fotos · </span>
          <span style={{color:'var(--cyan)'}}>{prontos.length} prontas</span>
          <span> · </span>
          <span style={{color:'var(--green)'}}>{publicados.length} publicadas</span>
          {!MAKE_WEBHOOK&&<span style={{color:'var(--gold)'}}> · ⚠ Instagram inativo (configure webhook em Config)</span>}
        </div>
      )}
    </div>
  );
};



const NAV = [
  { id:'dashboard',  label:'Dashboard',   icon:'🏰' },
  { id:'publicar',   label:'Publicar',    icon:'⚡' },
  { id:'produtos',   label:'Produtos',    icon:'🗡️' },
  { id:'pedidos',    label:'Pedidos',     icon:'💳' },
  { id:'clientes',   label:'Clientes',    icon:'👥' },
  { id:'financeiro', label:'Financeiro',  icon:'💰' },
  { id:'rastreios',  label:'Rastreios',   icon:'📦' },
  { id:'cupons',     label:'Cupons',      icon:'🏷️' },
  { id:'csv',        label:'Import CSV',  icon:'📂' },
  { id:'garimpo',    label:'Garimpo',     icon:'🎮' },

  { id:'hermes',     label:'Hermes Bot',  icon:'🦇' },
  { id:'analytics',  label:'Analytics',   icon:'🧛' },
  { id:'infra',      label:'Infra',       icon:'🖥️' },
  { id:'log',        label:'Atividades',  icon:'📋' },
  { id:'config',     label:'Config',      icon:'⚙️' },
];

const App = () => {
  const [auth,setAuth]       = useState(!!sessionStorage.getItem('ng_admin_token'));
  const [tab,setTab]         = useState('dashboard');
  const [produtos,setProdutos] = useState([]);
  const [visitas,setVisitas]   = useState([]);
  const [loading,setLoading]   = useState(true);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const [buscaAberta,setBuscaAberta] = useState(false);

  useEffect(()=>{
    const handler = (e) => {
      if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); setBuscaAberta(b=>!b); }
      if (e.key==='Escape') setBuscaAberta(false);
    };
    window.addEventListener('keydown', handler);
    return ()=>window.removeEventListener('keydown', handler);
  },[]);

  const loadProdutos = useCallback(async () => {
    try { setProdutos(await supa('produtos?select=id,nome,console,preco,condicao,imagens,ativo,vendido,destaque,frete_gratis,viewed_count,created_at,whatsapp_media_ids,compra_id,custo_compra,custo_reparo&order=created_at.desc&limit=200')||[]); } catch(e){ console.error(e); }
  },[]);
  const loadVisitas = useCallback(async () => {
    try { setVisitas(await supa('visitas?order=created_at.desc&limit=500')||[]); } catch {}
  },[]);

  useEffect(()=>{
    if (!auth) return;
    Promise.all([loadProdutos(), loadVisitas()]).finally(()=>setLoading(false));
    const t = setInterval(()=>{ loadProdutos(); loadVisitas(); }, 30000);
    return ()=>clearInterval(t);
  },[auth]);

  const logout = () => { sessionStorage.removeItem('ng_admin_token'); setAuth(false); };

  // Auto-logout após 8h de inatividade
  useEffect(() => {
    if (!auth) return;
    const KEY = 'ng_last_activity';
    const update = () => sessionStorage.setItem(KEY, Date.now());
    const check = () => {
      const last = Number(sessionStorage.getItem(KEY)||0);
      if (last && Date.now() - last > 8*60*60*1000) logout();
    };
    update();
    ['click','keydown','touchstart'].forEach(e=>window.addEventListener(e,update,{passive:true}));
    const t = setInterval(check, 60000);
    return () => { clearInterval(t); ['click','keydown','touchstart'].forEach(e=>window.removeEventListener(e,update)); };
  },[auth]);

  if (!auth) return <Login onLogin={()=>setAuth(true)} />;

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:40,height:40,border:'3px solid var(--border)',borderTopColor:'var(--red-b)',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}}/>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--muted)'}}>carregando...</div>
      </div>
    </div>
  );

  const closeNav = () => setSidebarOpen(false);

  return (
    <div style={S.layout}>
      {/* Mobile overlay */}
      {sidebarOpen && <div className="ng-overlay" onClick={closeNav} />}

      {/* Sidebar */}
      <div className={`ng-sidebar${sidebarOpen?' open':''}`} style={S.sidebar}>
        <div style={{padding:'14px 12px 12px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontFamily:'Press Start 2P, monospace',fontSize:9,color:'var(--red-b)',lineHeight:1.8,textShadow:'0 0 10px rgba(204,20,20,.5)'}}>🏰 NOSFERATU</div>
          <div style={{fontFamily:'Rajdhani, sans-serif',fontSize:10,color:'var(--gold)',letterSpacing:'0.2em'}}>ADMIN PANEL</div>
        </div>
        <nav style={{flex:1,padding:'8px 8px',display:'flex',flexDirection:'column',gap:2,overflowY:'auto'}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>{setTab(n.id);closeNav();}} style={{...S.btn,justifyContent:'flex-start',padding:'6px 10px',background:tab===n.id?'rgba(204,20,20,.15)':'transparent',border:`1px solid ${tab===n.id?'rgba(204,20,20,.3)':'transparent'}`,color:tab===n.id?'var(--red-b)':'var(--dim)',borderRadius:4,fontSize:12}}>
              <span>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:'8px 10px',borderTop:'1px solid var(--border)'}}>
          <a href="index.html" target="_blank" style={{...S.btn,justifyContent:'center',width:'100%',background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.3)',color:'var(--green)',textDecoration:'none',marginBottom:4,fontSize:11,padding:'6px 10px'}}>↗ Ver site</a>
          <button onClick={logout} style={{...S.btn,justifyContent:'center',width:'100%',background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',fontSize:11,padding:'6px 10px'}}>Sair</button>
        </div>
      </div>

      {/* Main */}
      <div className="ng-main" style={S.main}>
        <div style={S.topbar}>
          <button className="ng-hamburger" onClick={()=>setSidebarOpen(s=>!s)}>☰</button>
          <div className="ng-topbar-date" style={{flex:1,fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)'}}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</div>
          <button onClick={()=>setBuscaAberta(true)} style={{...S.btn,padding:'5px 12px',fontSize:12,background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',gap:6}}>🔍 <span style={{fontFamily:'Share Tech Mono, monospace',fontSize:10}}>Ctrl+K</span></button>
          <div style={{fontSize:11,color:'var(--dim)',textAlign:'right',whiteSpace:'nowrap'}}>
            <span style={{color:'#4ade80',fontSize:10}}>●</span> {produtos.filter(p=>p.ativo!==false&&!p.vendido).length} ativos · {visitas.filter(v=>new Date(v.created_at).toDateString()===new Date().toDateString()).length} hoje
          </div>
        </div>
        <div className="ng-content" style={S.content}>
          {tab==='dashboard' && <Dashboard produtos={produtos} visitas={visitas} />}
          {tab==='publicar'  && <PublicarPage />}
          {tab==='produtos'  && <ProductsPage produtos={produtos} reload={loadProdutos} />}
          {tab==='pedidos'   && <PedidosPage />}
          {tab==='clientes'  && <ClientesPage />}
          {tab==='rastreios' && <RastreiosPage />}
          {tab==='cupons'    && <CuponsPage />}
          {tab==='csv'       && <UploadCSVPage />}
          {tab==='garimpo'   && <GarimpoPage />}

          {tab==='hermes'    && <HermesPage />}
          {tab==='analytics' && <Analytics visitas={visitas} />}
          {tab==='infra'     && <InfraPage />}
          {tab==='financeiro' && <FinanceiroPage />}
          {tab==='log'       && <LogPage />}
          {tab==='config'    && <Config />}
          {buscaAberta && <BuscaGlobal produtos={produtos} setTab={setTab} fechar={()=>setBuscaAberta(false)} />}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
