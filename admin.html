// ── PI MONITOR ───────────────────────────────────────────────
// ════════════════════════════════════════════════════════════

const PiMonitor = () => {
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [offline, setOffline] = useState(false);

  const carregar = async () => {
    try {
      const r = await supa('pi_stats?order=criado_em.desc&limit=1');
      const d = r?.[0];
      if (!d) { setOffline(true); setLoading(false); return; }
      const diff = (Date.now() - new Date(d.criado_em)) / 60000;
      setOffline(diff > 5);
      setStats(d);
    } catch { setOffline(true); }
    setLoading(false);
  };

  useEffect(() => { carregar(); const t = setInterval(carregar, 10000); return () => clearInterval(t); }, []);

  const Bar = ({ value, max = 100 }) => {
    const pct = Math.min((value / max) * 100, 100);
    const color = pct > 80 ? 'var(--red-b)' : pct > 60 ? 'var(--amber)' : 'var(--green)';
    return (
      <div style={{ height: 8, background: 'var(--surface2)', borderRadius: 4, overflow: 'hidden', marginTop: 8 }}>
        <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 4, transition: 'width 0.5s' }} />
      </div>
    );
  };

  const fmtUptime = (s) => {
    if (!s) return '—';
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    return `${d}d ${h}h ${m}m`;
  };

  if (loading) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:300 }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ width:32, height:32, border:'3px solid var(--border)', borderTopColor:'var(--red-b)', borderRadius:'50%', animation:'spin 0.8s linear infinite', margin:'0 auto 12px' }} />
        <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--muted)' }}>Carregando dados da Pi...</div>
      </div>
    </div>
  );

  if (offline || !stats) return (
    <div style={{ ...S.card, borderLeft:'3px solid var(--red-b)', padding:24 }}>
      <div style={{ display:'flex', alignItems:'center', gap:16 }}>
        <div style={{ fontSize:32 }}>🍓</div>
        <div>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--red-b)', marginBottom:4 }}>PI SEM DADOS</div>
          <div style={{ fontSize:13, color:'var(--dim)' }}>pi_monitor.py rodando? <code style={{ color:'var(--cyan)' }}>sudo systemctl status pi-monitor</code></div>
        </div>
      </div>
    </div>
  );

  const memPct = (stats.mem_usado_mb / stats.mem_total_mb) * 100;
  const discoPct = (stats.disco_usado_gb / stats.disco_total_gb) * 100;

  return (
    <div>
      <div style={{ marginBottom:20, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontSize:24 }}>🍓</div>
          <div>
            <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:11, color:'var(--text)', marginBottom:2 }}>Raspberry Pi</div>
            <div style={{ fontSize:12, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace' }}><span style={{ color:'var(--green)' }}>● ONLINE</span> · {fmtDateFull(stats.criado_em)}</div>
          </div>
        </div>
        <Btn color="ghost" onClick={carregar} style={{ fontSize:12 }}>↻</Btn>
      </div>
      <div className="ng-grid4" style={S.grid4}>
        <div style={{ ...S.card, borderTop:`3px solid ${stats.cpu_percent > 80 ? 'var(--red-b)' : stats.cpu_percent > 60 ? 'var(--amber)' : 'var(--green)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>CPU</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:22, color:stats.cpu_percent > 80 ? 'var(--red-b)' : stats.cpu_percent > 60 ? 'var(--amber)' : 'var(--green)', marginBottom:4 }}>{stats.cpu_percent}%</div>
          <Bar value={stats.cpu_percent} />
        </div>
        <div style={{ ...S.card, borderTop:`3px solid ${memPct > 80 ? 'var(--red-b)' : memPct > 60 ? 'var(--amber)' : 'var(--purple)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>Memória</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:18, color:memPct > 80 ? 'var(--red-b)' : 'var(--purple)', marginBottom:4 }}>{Math.round(stats.mem_usado_mb)}MB</div>
          <div style={{ fontSize:11, color:'var(--muted)', marginBottom:2 }}>de {Math.round(stats.mem_total_mb)}MB ({Math.round(memPct)}%)</div>
          <Bar value={memPct} />
        </div>
        <div style={{ ...S.card, borderTop:`3px solid ${stats.temp_cpu > 70 ? 'var(--red-b)' : stats.temp_cpu > 55 ? 'var(--amber)' : 'var(--gold)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>Temperatura</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:22, color:stats.temp_cpu > 70 ? 'var(--red-b)' : 'var(--gold)', marginBottom:4 }}>{stats.temp_cpu ? `${stats.temp_cpu}°C` : '—'}</div>
          {stats.temp_cpu && <Bar value={stats.temp_cpu} max={85} />}
        </div>
        <div style={{ ...S.card, borderTop:`3px solid ${discoPct > 80 ? 'var(--red-b)' : discoPct > 60 ? 'var(--amber)' : 'var(--cyan)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>SD Card</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:18, color:'var(--cyan)', marginBottom:4 }}>{stats.disco_usado_gb}GB</div>
          <div style={{ fontSize:11, color:'var(--muted)', marginBottom:2 }}>de {stats.disco_total_gb}GB ({Math.round(discoPct)}%)</div>
          <Bar value={discoPct} />
        </div>
      </div>
      <div style={S.card}>
        <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--dim)', letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:12 }}>// Uptime</div>
        <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:16, color:'var(--gold)' }}>{fmtUptime(stats.uptime_segundos)}</div>
      </div>
      {(stats.cpu_percent > 80 || memPct > 85 || discoPct > 85 || (stats.temp_cpu && stats.temp_cpu > 70)) && (
        <div style={{ ...S.card, borderLeft:'3px solid var(--amber)', marginTop:16 }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--amber)', marginBottom:8 }}>⚠ ALERTAS</div>
          {stats.cpu_percent > 80 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>🔥 CPU alta ({stats.cpu_percent}%) — reduza WORKERS para 2</div>}
          {memPct > 85 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>💾 Memória alta ({Math.round(memPct)}%) — reinicie containers</div>}
          {discoPct > 85 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>💿 SD Card quase cheio ({Math.round(discoPct)}%)</div>}
          {stats.temp_cpu > 70 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>🌡️ Temperatura alta ({stats.temp_cpu}°C)</div>}
        </div>
      )}
    </div>
  );
};

const EMPTY_FIN = { produto:'', console:'PS4', preco_compra:'', preco_venda:'', custo_extra:'', data_compra: new Date().toISOString().slice(0,10), origem:'proprio', status:'estoque', forma_pagamento:'pix', observacao:'' };

// dias entre a compra e (venda, se vendido) ou hoje (se em estoque)
function diasNoEstoque(item){
  const ini = item.data_compra || item.criado_em;
  if(!ini) return 0;
  const fim = (item.status==='vendido' && item.data_venda) ? new Date(item.data_venda) : new Date();
  const d = Math.floor((fim - new Date(ini)) / 86400000);
  return isNaN(d) ? 0 : Math.max(0, d);
}

const FinanceiroPage = () => {
  const [itens, setItens]           = useState([]);
  const [loading, setLoading]       = useState(true);
  const [editando, setEditando]     = useState(null);
  const [saving, setSaving]         = useState(false);
  const [filtroMes, setFiltroMes]   = useState(new Date().toISOString().slice(0,7));
  const [filtroStatus, setFiltroStatus] = useState('todos');
  const [subTab, setSubTab]         = useState('tabela');
  const [metaMes, setMetaMes]       = useState(() => Number(localStorage.getItem('fin_meta')||0));
  const [editMeta, setEditMeta]     = useState(false);
  const [metaInput, setMetaInput]   = useState('');
  const [toast, setToast]           = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''), 3000); };

  const carregar = async () => {
    setLoading(true);
    try {
      const [fin, gar] = await Promise.all([
        supa('financeiro?order=criado_em.desc&limit=500'),
        supa('compras_garimpo?order=data_compra.desc&limit=2000')
      ]);
      const garItens = (gar||[]).filter(g => !/cancel|fail|recus|mediac|n[aã]o.?aprov|reembols|estorn/i.test(g.status||'')).map(g => ({ id:g.id, _garimpo:true, foto:g.foto, fotos:g.fotos, produto:g.produto, console:g.plataforma||'OLX', preco_compra:g.valor_pago, preco_venda:null, custo_extra:0, data_compra:g.data_compra, data_venda:null, origem:'olx_garimpo', status:'estoque' }));
      setItens([...(fin||[]), ...garItens]);
    }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  useEffect(() => { carregar(); }, []);

  const marcarVendido = async (item) => {
    const pv = prompt('Preco de venda (R$):', item.preco_venda || '');
    if (pv === null) return;
    const preco_venda = Number(String(pv).replace(',', '.')) || item.preco_venda || 0;
    try { await supa(`financeiro?id=eq.${item.id}`, { method:'PATCH', body: JSON.stringify({ status:'vendido', preco_venda, data_venda: new Date().toISOString().slice(0,10) }) }); showToast('Vendido'); carregar(); }
    catch(e){ showToast('Erro: '+e.message); }
  };

  const deletar = async (item) => {
    const it = (item && typeof item === 'object') ? item : { id: item };
    const tabela = it._garimpo ? 'compras_garimpo' : 'financeiro';
    if (!confirm('Excluir este item' + (it._garimpo ? ' (compra do garimpo)' : '') + '?')) return;
    try { await supa(`${tabela}?id=eq.${it.id}`, { method:'DELETE' }); showToast('Excluido'); carregar(); }
    catch(e){ showToast('Erro: '+e.message); }
  };

  const criarProduto = async (item) => {
    if (!item._garimpo) { showToast('So para compras do garimpo'); return; }
    showToast('Criando produto...');
    const dados = { nome:item.produto, console:'Acessórios', condicao:'Usado', preco:null, descricao:'', imagem_url:((item.fotos&&item.fotos[0])||item.foto||''), imagens:((item.fotos&&item.fotos.length)?item.fotos:(item.foto?[item.foto]:[])), compra_id:item.id, custo_compra:Number(item.preco_compra)||0, ativo:false, vendido:false };
    try {
      if (item.foto) {
        try {
          const bl = await (await fetch(item.foto)).blob();
          const b64 = await new Promise((res,rej)=>{const fr=new FileReader();fr.onloadend=()=>res(String(fr.result).split(',')[1]);fr.onerror=rej;fr.readAsDataURL(bl);});
          const r = await fetch('/api/identificar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_base64:b64,media_type:bl.type||'image/jpeg'})});
          if (r.ok){ const d=await r.json(); if(d.nome)dados.nome=d.nome; if(d.console)dados.console=d.console; if(d.condicao)dados.condicao=d.condicao; if(d.descricao)dados.descricao=d.descricao; }
        } catch(e){}
      }
      await supa('produtos',{method:'POST',body:JSON.stringify(dados)});
      showToast('✅ Produto criado (rascunho) — veja na aba Produtos');
    } catch(e){ showToast('Erro: '+e.message); }
  };

  const ORIGENS = ['proprio','olx_garimpo','facebook','enjoei','mercadolivre','site','fornecedor','troca'];
  const ORIGEM_LABEL = { proprio:'Próprio', olx_garimpo:'🎯 OLX', facebook:'📘 Facebook', enjoei:'🛍 Enjoei', mercadolivre:'🛒 ML', site:'🏰 Site', fornecedor:'Fornecedor', troca:'Troca' };
  const ORIGEM_COLOR = { olx_garimpo:'var(--purple)', facebook:'#1877F2', enjoei:'#E91E8C', mercadolivre:'#FFE600', site:'var(--gold)' };
  const CONSOLES_FIN = ['PS5','PS4 Pro','PS4 Slim','PS4 Fat','PS3','PS2','PSP','Xbox Series S','Xbox One','Xbox 360','Switch OLED','Switch V2','Switch Lite','Switch','3DS','DS','Wii U','Wii','Outro'];
  const FORMAS_PAG = ['pix','dinheiro','cartao','transferencia'];
  const FORMA_LABEL = { pix:'PIX', dinheiro:'Dinheiro', cartao:'Cartão', transferencia:'Transferência' };

  const gerarPDF = () => {
    const mesLabel = new Date(filtroMes + '-02').toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    const doMesPDF = itens.filter(i => { const ref = i.data_venda || i.data_compra || ''; return ref.startsWith(filtroMes); });
    const totalC = doMesPDF.reduce((a,i) => a + Number(i.preco_compra||0), 0);
    const totalE = doMesPDF.reduce((a,i) => a + Number(i.custo_extra||0), 0);
    const totalV = doMesPDF.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_venda||0), 0);
    const lucroL = totalV - doMesPDF.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_compra||0) + Number(i.custo_extra||0), 0);
    const fmt = v => 'R$' + Math.round(v).toLocaleString('pt-BR');
    const rows = filtrados.map(function(item) {
      const li = item.status==='vendido' ? Number(item.preco_venda||0) - Number(item.preco_compra||0) - Number(item.custo_extra||0) : null;
      const lc = li===null?'#888':li>=0?'#27ae60':'#c0392b';
      const origem = ORIGEM_LABEL[item.origem]||item.origem;
      const sbg = item.status==='vendido'?'#d5f5e3':'#fef9e7';
      const sc = item.status==='vendido'?'#1e8449':'#b7950b';
      const st = item.status==='vendido'?'VENDIDO':'ESTOQUE';
      const dias = diasNoEstoque(item);
      return '<tr><td style="padding:8px 10px;border-bottom:1px solid #eee;font-weight:600">'+item.produto+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#666">'+( item.console||'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee">'+origem+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#CC1414;font-family:monospace">'+fmt(item.preco_compra||0)+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#e67e22;font-family:monospace">'+(item.custo_extra>0?fmt(item.custo_extra):'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#27ae60;font-family:monospace">'+(item.preco_venda?fmt(item.preco_venda):'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:'+lc+';font-family:monospace;font-weight:bold">'+(li===null?'--':(li>=0?'+':'')+fmt(li))+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee"><span style="background:'+sbg+';color:'+sc+';padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">'+st+'</span></td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-size:12px">'+(item.data_venda||item.data_compra||'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-size:12px">'+(item.status==='estoque'&&dias!==null?dias+'d':'--')+'</td></tr>';
    }).join('');
    const geradoEm = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Financeiro Nosferatu Games</title>'
      +'<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;background:#fff;color:#222;padding:32px}'
      +'table.data{width:100%;border-collapse:collapse;font-size:13px}'
      +'table.data thead tr{background:#1a1a2e;color:#fff}'
      +'table.data th{padding:10px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}'
      +'table.data td{padding:9px 10px;vertical-align:middle;border-bottom:1px solid #eee}'
      +'table.data tr:nth-child(even) td{background:#f9f9fb}'
      +'.footer{margin-top:24px;font-size:11px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:12px}'
      +'@media print{body{padding:16px}}</style></head><body>'
      +'<table style="width:100%;border-collapse:collapse;background:#1a1a2e;margin-bottom:20px"><tr>'
      +'<td style="padding:18px 24px"><div style="font-size:20px;font-weight:900;color:#CC1414;letter-spacing:2px">NOSFERATU <span style="color:#FFB800">GAMES</span></div><div style="font-size:11px;color:#888;margin-top:3px">Relatorio Financeiro Mensal</div></td>'
      +'<td style="padding:18px 24px;text-align:right"><div style="font-size:14px;font-weight:700;color:#fff">'+mesLabel.toUpperCase()+'</div><div style="font-size:11px;color:#777;margin-top:3px">Gerado em '+geradoEm+'</div></td>'
      +'</tr></table>'
      +'<table style="width:100%;border-collapse:separate;border-spacing:10px;margin-bottom:20px"><tr>'
      +'<td style="background:#fdf2f2;border-left:4px solid #CC1414;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Total Compras</div><div style="font-size:20px;font-weight:900;color:#CC1414">'+fmt(totalC)+'</div></td>'
      +'<td style="background:#fdf6ec;border-left:4px solid #e67e22;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Custos Extras</div><div style="font-size:20px;font-weight:900;color:#e67e22">'+fmt(totalE)+'</div></td>'
      +'<td style="background:#eafaf1;border-left:4px solid #27ae60;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Total Vendas</div><div style="font-size:20px;font-weight:900;color:#27ae60">'+fmt(totalV)+'</div></td>'
      +'<td style="background:'+(lucroL>=0?'#fefbd8':'#fdf2f2')+';border-left:4px solid '+(lucroL>=0?'#FFB800':'#CC1414')+';border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Lucro Liquido</div><div style="font-size:20px;font-weight:900;color:'+(lucroL>=0?'#b7950b':'#CC1414')+'">'+(lucroL>=0?'+':'')+fmt(lucroL)+'</div></td>'
      +'</tr></table>'
      +'<table class="data"><thead><tr><th>Produto</th><th>Console</th><th>Origem</th><th>Compra</th><th>Extras</th><th>Venda</th><th>Lucro</th><th>Status</th><th>Data</th><th>Dias</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table>'
      +'<div class="footer">Nosferatu Games &middot; Porto Alegre, RS &middot; nosferatugames.com.br</div>'
      +'<script>window.onload=function(){window.print();}<\/script>'
      +'</body></html>';
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
  };

  // ── Métricas ──────────────────────────────────────────────────
  const doMes       = itens.filter(i => { const ref = i.data_venda || i.data_compra || ''; return ref.startsWith(filtroMes); });
  const totalCompras = doMes.reduce((a,i) => a + Number(i.preco_compra||0), 0);
  const totalVendas  = doMes.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_venda||0), 0);
  const lucro        = totalVendas - doMes.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_compra||0) + Number(i.custo_extra||0), 0);
  const emEstoque    = itens.filter(i=>i.status==='estoque').length;
  const vendidosMes  = doMes.filter(i=>i.status==='vendido');
  const ticketMedio  = vendidosMes.length ? Math.round(vendidosMes.reduce((a,i)=>a+Number(i.preco_venda||0),0)/vendidosMes.length) : 0;
  const parados90    = itens.filter(i=>i.status==='estoque' && diasNoEstoque(i) >= 90);

  const filtrados = itens.filter(i => {
    const mesOk = i.status==='estoque' || !filtroMes || (i.data_compra||'').startsWith(filtroMes) || (i.data_venda||i.created_at||'').startsWith(filtroMes);
    const statusOk = filtroStatus === 'todos' || i.status === filtroStatus;
    return mesOk && statusOk;
  });

  // Gráfico últimos 6 meses
  const ultimos6 = Array.from({length:6},(_,i)=>{ const d=new Date(); d.setMonth(d.getMonth()-5+i); return d.toISOString().slice(0,7); });
  const dadosMeses = ultimos6.map(mes=>{
    const it = itens.filter(i=>(i.data_venda||i.data_compra||'').startsWith(mes));
    const v = it.filter(i=>i.status==='vendido').reduce((a,i)=>a+Number(i.preco_venda||0),0);
    const c = it.filter(i=>i.status==='vendido').reduce((a,i)=>a+Number(i.preco_compra||0)+Number(i.custo_extra||0),0);
    const label = new Date(mes+'-02').toLocaleDateString('pt-BR',{month:'short'}).slice(0,3);
    return { mes, label, lucro: v-c, vendas: v };
  });
  const maxLucro = Math.max(...dadosMeses.map(d=>Math.abs(d.lucro)), 1);

  // Ranking por console
  const rankConsole = Object.entries(
    itens.filter(i=>i.status==='vendido').reduce((acc,i)=>{
      const c = i.console||'Outro';
      if(!acc[c]) acc[c]={lucro:0,qtd:0};
      acc[c].lucro += Number(i.preco_venda||0)-Number(i.preco_compra||0)-Number(i.custo_extra||0);
      acc[c].qtd++;
      return acc;
    },{})
  ).sort((a,b)=>b[1].lucro-a[1].lucro).slice(0,6);
  const maxRank = rankConsole.length ? Math.max(...rankConsole.map(r=>r[1].lucro),1) : 1;

  return (
    <div>
      {toast && <div style={{ position:'fixed', top:70, right:24, zIndex:2000, background:'var(--surface2)', border:'1px solid var(--border)', padding:'10px 18px', borderRadius:4, fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--text)' }}>{toast}</div>}

      {/* Header */}
      <div style={{ marginBottom:20, display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
        <div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:14, color:'var(--text)', marginBottom:4 }}>Financeiro</div>
          <div style={{ fontSize:14, color:'var(--muted)' }}>Controle de compra e venda</div>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          <input type="month" value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={{ ...S.input, width:160, height:36, fontSize:13 }} />
          <Btn color="ghost" onClick={gerarPDF}>📄 PDF</Btn>
          <Btn onClick={()=>setEditando({...EMPTY_FIN})}>+ Novo</Btn>
        </div>
      </div>

      {/* Alerta parados 90 dias */}
      {parados90.length > 0 && (
        <div style={{ background:'rgba(204,20,20,.1)', border:'1px solid var(--red-b)', borderRadius:6, padding:'12px 16px', marginBottom:16, display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:20 }}>⚠️</span>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:'var(--red-b)', marginBottom:2 }}>{parados90.length} produto{parados90.length>1?'s':''} parado{parados90.length>1?'s':''} há mais de 90 dias</div>
            <div style={{ fontSize:12, color:'var(--dim)' }}>{parados90.map(i=>i.produto).join(', ')}</div>
          </div>
        </div>
      )}

      {/* Métricas */}
      <div className="ng-grid4" style={S.grid4}>
        <StatCard label="Compras no mês"  value={"R$"+Math.round(totalCompras).toLocaleString('pt-BR')}  color="var(--red-b)"  icon="📥"/>
        <StatCard label="Vendas no mês"   value={"R$"+Math.round(totalVendas).toLocaleString('pt-BR')}   color="var(--green)" icon="📤"/>
        <StatCard label="Lucro no mês"    value={"R$"+Math.round(lucro).toLocaleString('pt-BR')}          color={lucro>=0?'var(--gold)':'var(--red-b)'} icon="💰"/>
        <StatCard label="Em estoque"      value={emEstoque}                                                  color="var(--purple)" icon="📦"/>
      </div>

      {/* Meta mensal */}
      <div style={{ ...S.card, marginBottom:16, padding:'14px 18px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <span style={{ fontSize:16 }}>🎯</span>
            <div>
              <div style={{ fontSize:11, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace', letterSpacing:'0.1em' }}>META DO MÊS</div>
              {editMeta
                ? <div style={{ display:'flex', gap:6, marginTop:4 }}>
                    <input type="number" value={metaInput} onChange={e=>setMetaInput(e.target.value)} placeholder="Ex: 2000" style={{ ...S.input, width:120, height:30, fontSize:13 }} autoFocus />
                    <Btn onClick={salvarMeta}>OK</Btn>
                    <Btn color="ghost" onClick={()=>setEditMeta(false)}>✕</Btn>
                  </div>
                : <div style={{ fontSize:16, fontWeight:700, color:'var(--gold)', cursor:'pointer' }} onClick={()=>{setMetaInput(metaMes||0);setEditMeta(true);}}>
                    {metaMes>0 ? 'R$'+metaMes.toLocaleString('pt-BR') : <span style={{color:'var(--muted)',fontSize:13}}>Clique para definir</span>}
                  </div>
              }
            </div>
          </div>
          {metaMes > 0 && !editMeta && (
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--muted)', marginBottom:4, fontFamily:'Share Tech Mono, monospace' }}>
                <span>{Math.round(lucro).toLocaleString('pt-BR')} / {metaMes.toLocaleString('pt-BR')}</span>
                <span>{Math.min(100,Math.round((lucro/metaMes)*100))}%</span>
              </div>
              <div style={{ height:8, background:'var(--bg3)', borderRadius:4, overflow:'hidden' }}>
                <div style={{ height:'100%', width:Math.min(100,Math.max(0,(lucro/metaMes)*100))+'%', background:lucro>=metaMes?'var(--green)':'var(--gold)', borderRadius:4, transition:'width .5s' }}/>
              </div>
            </div>
          )}
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace' }}>TICKET MÉDIO</div>
            <div style={{ fontSize:16, fontWeight:700, color:'var(--purple)' }}>R${ticketMedio.toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>

      {/* Sub-tabs */}
      <div style={{ display:'flex', gap:8, marginBottom:16, flexWrap:'wrap' }}>
        {['tabela','relatorios'].map(t=>(
          <button key={t} onClick={()=>setSubTab(t)} style={{ ...S.btn, height:34, fontSize:12, background:subTab===t?'rgba(204,20,20,.15)':'var(--surface)', border:`1px solid ${subTab===t?'var(--red)':'var(--border)'}`, color:subTab===t?'#fff':'var(--dim)' }}>
            {t==='tabela'?'📋 Itens':'📊 Relatórios'}
          </button>
        ))}
        {subTab==='tabela' && ['todos','estoque','vendido'].map(s=>(
          <button key={s} onClick={()=>setFiltroStatus(s)} style={{ ...S.btn, height:34, fontSize:12, background:filtroStatus===s?'rgba(123,0,255,.15)':'var(--surface)', border:`1px solid ${filtroStatus===s?'var(--purple)':'var(--border)'}`, color:filtroStatus===s?'var(--purple)':'var(--dim)' }}>
            {s==='todos'?'Todos':s==='estoque'?'📦 Estoque':'✅ Vendidos'}
          </button>
        ))}
        {subTab==='tabela' && <div style={{ marginLeft:'auto', fontSize:12, color:'var(--muted)', alignSelf:'center', fontFamily:'Share Tech Mono, monospace' }}>{filtrados.length} itens</div>}
      </div>

      {/* TABELA */}
      {subTab==='tabela' && (loading
        ? <div style={{ textAlign:'center', padding:40, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace', fontSize:12 }}>Carregando...</div>
        : <div style={{ ...S.card, padding:0, overflow:'hidden' }}>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', borderCollapse:'collapse', minWidth:900 }}>
                <thead>
                  <tr style={{ background:'var(--bg3)' }}>
                    {['Produto','Console','Origem','Compra','Venda','Lucro','Margem','Status','Dias','Ações'].map(h=>(
                      <th key={h} style={{ padding:'10px 14px', textAlign:'left', fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', letterSpacing:'0.15em', textTransform:'uppercase', whiteSpace:'nowrap' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtrados.length===0 && <tr><td colSpan={10} style={{ padding:'2rem', textAlign:'center', color:'var(--muted)', fontFamily:'Share Tech Mono, monospace', fontSize:13 }}>nenhum item encontrado</td></tr>}
                  {filtrados.map(item => {
                    const lucroItem = item.status==='vendido' ? Number(item.preco_venda||0) - Number(item.preco_compra||0) - Number(item.custo_extra||0) : null;
                    const margemPct = lucroItem!==null && item.preco_compra>0 ? Math.round((lucroItem/(Number(item.preco_compra)+Number(item.custo_extra||0)))*100) : null;
                    const dias = diasNoEstoque(item);
                    const parado = item.status==='estoque' && dias !== null && dias >= 90;
                    const oc = ORIGEM_COLOR[item.origem]||'var(--dim)';
                    return (
                      <tr key={item.id} style={{ borderTop:'1px solid var(--border)', background:parado?'rgba(204,20,20,.04)':'transparent' }}>
                        <td style={{ padding:'10px 14px', fontSize:13, fontWeight:700, color:'var(--text)' }}>
                          {parado && <span title="Parado 90+ dias" style={{marginRight:4}}>🔴</span>}{item.produto}
                        </td>
                        <td style={{ padding:'10px 14px', fontSize:12, color:'var(--dim)' }}>{item.console||'—'}</td>
                        <td style={{ padding:'10px 14px' }}>
                          <span style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, padding:'2px 6px', borderRadius:2, background:'var(--surface2)', color:oc, border:'1px solid var(--border)' }}>
                            {ORIGEM_LABEL[item.origem]||item.origem}
                          </span>
                        </td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:13, color:'var(--red-b)' }}>{item.preco_compra ? 'R$'+Number(item.preco_compra).toLocaleString('pt-BR') : '—'}</td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:13, color:'var(--green)' }}>{item.preco_venda ? 'R$'+Number(item.preco_venda).toLocaleString('pt-BR') : '—'}</td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:13, color:lucroItem===null?'var(--muted)':lucroItem>=0?'var(--gold)':'var(--red-b)' }}>
                          {lucroItem===null ? '—' : (lucroItem>=0?'+':'')+'R$'+lucroItem.toLocaleString('pt-BR')}
                        </td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:12, color:margemPct===null?'var(--muted)':margemPct>=30?'var(--green)':margemPct>=15?'var(--gold)':'var(--red-b)' }}>
                          {margemPct===null ? '—' : margemPct+'%'}
                        </td>
                        <td style={{ padding:'10px 14px' }}>
                          <span style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, padding:'2px 8px', borderRadius:2, background:item.status==='vendido'?'rgba(37,211,102,.12)':'rgba(255,184,0,.12)', color:item.status==='vendido'?'var(--green)':'var(--gold)', border:`1px solid ${item.status==='vendido'?'rgba(37,211,102,.3)':'rgba(255,184,0,.3)'}`}}>
                            {item.status==='vendido'?'✅ VENDIDO':'📦 ESTOQUE'}
                          </span>
                        </td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:12, color:parado?'var(--red-b)':'var(--muted)', whiteSpace:'nowrap' }}>
                          {item.status==='estoque' && dias!==null ? dias+'d' : item.data_venda||'—'}
                        </td>
                        <td style={{ padding:'10px 14px' }}>
                          <div style={{ display:'flex', gap:4 }}>
                            {!item._garimpo && <button onClick={()=>setEditando(item)} style={{ ...S.btn, padding:'4px 8px', fontSize:12, background:'var(--surface2)', border:'1px solid var(--border)', color:'var(--dim)' }}>✏</button>}
                            {!item._garimpo && item.status==='estoque' && <button onClick={()=>marcarVendido(item)} style={{ ...S.btn, padding:'4px 8px', fontSize:12, background:'rgba(37,211,102,.1)', border:'1px solid rgba(37,211,102,.3)', color:'var(--green)' }}>✅</button>}
                            {item._garimpo && <button onClick={()=>criarProduto(item)} style={{ ...S.btn, padding:'4px 8px', fontSize:12, background:'rgba(124,58,237,.15)', border:'1px solid var(--purple)', color:'var(--purple)' }}>📤</button>}<button onClick={()=>deletar(item)} style={{ ...S.btn, padding:'4px 8px', fontSize:12, background:'rgba(204,20,20,.1)', border:'1px solid var(--border-r)', color:'var(--red-b)' }}>🗑</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
      )}

      {/* RELATÓRIOS */}
      {subTab==='relatorios' && (
        <div>
          {/* Gráfico de lucro últimos 6 meses */}
          <div style={{ ...S.card, marginBottom:16 }}>
            <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--dim)', letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:16 }}>// Lucro — últimos 6 meses</div>
            <div style={{ display:'flex', alignItems:'flex-end', gap:8, height:120 }}>
              {dadosMeses.map(d=>{
                const h = Math.round((Math.abs(d.lucro)/maxLucro)*100);
                const positivo = d.lucro >= 0;
                const atual = d.mes === new Date().toISOString().slice(0,7);
                return (
                  <div key={d.mes} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                    <div style={{ fontSize:10, fontFamily:'Share Tech Mono, monospace', color:positivo?'var(--gold)':'var(--red-b)' }}>{d.lucro!==0?(positivo?'+':'')+'R$'+Math.abs(Math.round(d.lucro)).toLocaleString('pt-BR'):''}</div>
                    <div style={{ width:'100%', height:h+'%', background:positivo?'var(--gold)':'var(--red-b)', borderRadius:'3px 3px 0 0', opacity:atual?1:0.6, minHeight:4 }}/>
                    <div style={{ fontSize:10, color:atual?'var(--text)':'var(--muted)', fontFamily:'Share Tech Mono, monospace' }}>{d.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Ranking por console */}
          <div style={{ ...S.card }}>
            <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--dim)', letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:16 }}>// Ranking — console mais lucrativo</div>
            {rankConsole.length===0
              ? <div style={{ fontSize:13, color:'var(--muted)', textAlign:'center', padding:20 }}>Sem vendas registradas ainda.</div>
              : rankConsole.map(([console, dados], i) => (
                <div key={console} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                  <div style={{ width:20, fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--muted)' }}>#{i+1}</div>
                  <div style={{ width:120, fontSize:13, color:'var(--text)', fontWeight:i===0?700:400 }}>{console}</div>
                  <div style={{ flex:1, height:8, background:'var(--bg3)', borderRadius:4, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:Math.round((dados.lucro/maxRank)*100)+'%', background:i===0?'var(--gold)':'var(--purple)', borderRadius:4 }}/>
                  </div>
                  <div style={{ width:100, textAlign:'right', fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--gold)' }}>+R${Math.round(dados.lucro).toLocaleString('pt-BR')}</div>
                  <div style={{ width:50, textAlign:'right', fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--muted)' }}>{dados.qtd} vnd</div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* Modal */}
      {editando && (
        <FinanceiroModal
          editando={editando}
          setEditando={setEditando}
          salvar={salvar}
          saving={saving}
          ORIGENS={ORIGENS}
          ORIGEM_LABEL={ORIGEM_LABEL}
          CONSOLES_FIN={CONSOLES_FIN}
          FORMAS_PAG={FORMAS_PAG}
          FORMA_LABEL={FORMA_LABEL}
        />
      )}

    </div>
  );
};

// ════════════════════════════════════════════════════════════
// ── INFRA PAGE ────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════

const InfraPage = () => {
  const VPS_IP     = '2.24.217.31';
  const VPS_DOMAIN = 'nosferatugames.com.br';
  const N8N_URL    = `https://n8n.${VPS_DOMAIN}`;
  const HERMES_URL = `https://hermes.${VPS_DOMAIN}`;
  const HERMES_KEY = 'hermes-n8n-key-2026';
  const _activeSessionTokenRef = useRef(null);
  const getActiveToken = async () => {
    if (_activeSessionTokenRef.current) return _activeSessionTokenRef.current;
    try {
      const r = await fetch(`${HERMES_URL}/api/public/token`, { signal: AbortSignal.timeout(5000) });
      if (r.ok) {
        const data = await r.json();
        _activeSessionTokenRef.current = data.token;
        return _activeSessionTokenRef.current;
      }
    } catch (e) {
      console.error('Failed to fetch public token:', e);
    }
    return HERMES_KEY;
  };

  const [sub, setSub]               = useState('status');
  const [loading, setLoading]       = useState(false);

  // ── Hermes data ──
  const [health, setHealth]         = useState(null);       // /health
  const [healthEx, setHealthEx]     = useState(null);       // /health/extended
  const [caps, setCaps]             = useState(null);       // /capabilities
  const [model, setModel]           = useState(null);       // /v1/models
  const [dashStatus, setDashStatus] = useState(null);       // /api/dashboard/status
  const [sessions, setSessions]     = useState([]);         // /api/dashboard/sessions
  const [jobs, setJobs]             = useState([]);         // /api/jobs
  const [lastRefresh, setLastRefresh] = useState(null);

  // ── Chat ──
  const [hermesMsg, setHermesMsg]   = useState('');
  const [hermesChat, setHermesChat] = useState([]);
  const [hermesLoading, setHermesLoading] = useState(false);
  const chatEndRef = useRef();

  // ── Toast ──
  const [toast, setToast]           = useState('');
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3500); };

  // ── Fetch helpers ──
  const hermesGet = async (path) => {
    const isApi = path.startsWith('/api/');
    const token = isApi ? await getActiveToken() : HERMES_KEY;
    const headers = { 'Authorization': `Bearer ${token}` };
    if (isApi) {
      headers['X-Hermes-Session-Token'] = token;
    }
    const r = await fetch(`${HERMES_URL}${path}`, {
      headers: headers,
      signal: AbortSignal.timeout(6000)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  };

  const fetchAll = async () => {
    setLoading(true);
    const results = await Promise.allSettled([
      hermesGet('/health'),
      hermesGet('/health/extended'),
      hermesGet('/capabilities'),
      hermesGet('/v1/models'),
      hermesGet('/api/status'),
      hermesGet('/api/sessions'),
      hermesGet('/api/cron/jobs'),
    ]);
    const [h, hx, cp, md, ds, ss, jj] = results;
    if (h.status  === 'fulfilled') setHealth(h.value);
    if (hx.status === 'fulfilled') setHealthEx(hx.value);
    if (cp.status === 'fulfilled') setCaps(cp.value);
    if (md.status === 'fulfilled') setModel(md.value);
    if (ds.status === 'fulfilled') setDashStatus(ds.value);
    if (ss.status === 'fulfilled') setSessions(ss.value?.sessions || ss.value || []);
    if (jj.status === 'fulfilled') setJobs(jj.value?.jobs || jj.value || []);
    setLastRefresh(new Date());
    setLoading(false);
  };

  useEffect(() => { fetchAll(); }, []);
  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [hermesChat]);

  // ── Chat ──
  const sendHermes = async () => {
    if (!hermesMsg.trim() || hermesLoading) return;
    const msg = hermesMsg.trim();
    setHermesMsg('');
    setHermesChat(c => [...c, { role: 'user', content: msg }]);
    setHermesLoading(true);
    try {
      const r = await fetch(`${HERMES_URL}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${HERMES_KEY}` },
        body: JSON.stringify({ model: 'hermes-agent', messages: [{ role: 'user', content: msg }] }),
        signal: AbortSignal.timeout(60000)
      });
      const d = await r.json();
      const reply = d?.choices?.[0]?.message?.content || '(sem resposta)';
      setHermesChat(c => [...c, { role: 'assistant', content: reply }]);
    } catch (e) {
      setHermesChat(c => [...c, { role: 'assistant', content: `✕ Erro: ${e.message}` }]);
    }
    setHermesLoading(false);
  };

  // ── Toggle job ──
  const toggleJob = async (job) => {
    try {
      const action = job.paused ? 'resume' : 'pause';
      const token = await getActiveToken();
      await fetch(`${HERMES_URL}/api/cron/jobs/${job.id}/${action}`, {
        method: 'POST',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'X-Hermes-Session-Token': token
        },
        signal: AbortSignal.timeout(5000)
      });
      showToast(`✔ Job ${action === 'pause' ? 'pausado' : 'retomado'}`);
      fetchAll();
    } catch (e) { showToast('✕ ' + e.message); }
  };

  const runJobNow = async (job) => {
    try {
      const token = await getActiveToken();
      await fetch(`${HERMES_URL}/api/cron/jobs/${job.id}/trigger`, {
        method: 'POST',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'X-Hermes-Session-Token': token
        },
        signal: AbortSignal.timeout(5000)
      });
      showToast('🚀 Job disparado!');
    } catch (e) { showToast('✕ ' + e.message); }
  };



  // ── Derived state ──
  const hermesOk    = health?.status === 'ok';
  const activeSess  = healthEx?.active_sessions ?? dashStatus?.active_session_count ?? '—';
  const runningAg   = healthEx?.running_agents ?? '—';
  const memUsage    = healthEx?.resource_usage?.memory_mb
    ? `${Math.round(healthEx.resource_usage.memory_mb)} MB`
    : '—';
  const cpuUsage    = healthEx?.resource_usage?.cpu_percent != null
    ? `${healthEx.resource_usage.cpu_percent.toFixed(1)}%`
    : '—';
  const hermesVer   = dashStatus?.version ?? '—';
  const activeJobs  = jobs.filter(j => !j.paused).length;

  // ── Feature badges ──
  const features = caps?.features || {};
  const FEATURE_LABELS = {
    chat_completions: 'Chat',
    responses_api: 'Responses',
    run_submission: 'Runs',
    run_status: 'Run Status',
    run_events_sse: 'SSE Stream',
    run_stop: 'Interrupt',
  };

  const INFRA_TABS = [
    { id: 'status',   label: 'Status',   icon: '📊' },
    { id: 'minipc',   label: '🖥 Mini PC', icon: '🖥' },
    { id: 'pi',       label: '🍓 Pi',     icon: '🍓' },
    { id: 'sessions', label: loading ? 'Sessões...' : `Sessões (${sessions.length})`, icon: '💬' },
    { id: 'jobs',     label: loading ? 'Jobs...' : `Jobs (${activeJobs}/${jobs.length})`, icon: '⏱️' },
    { id: 'hermes',   label: 'Chat',     icon: '🤖' },
    { id: 'n8n',      label: 'N8N',      icon: '🔄' },
    { id: 'ssh',      label: 'SSH Ref',  icon: '🖥️' },
  ];

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{ position: 'fixed', top: 70, right: 24, zIndex: 2000, background: 'var(--surface2)', border: '1px solid var(--border)', padding: '10px 18px', borderRadius: 4, fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--text)', animation: 'slideIn .2s ease', maxWidth: 320 }}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{ marginBottom: 20, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
        <div>
          <div style={{ fontFamily: 'Press Start 2P, monospace', fontSize: 14, color: 'var(--text)', marginBottom: 4 }}>Infraestrutura</div>
          <div style={{ fontSize: 14, color: 'var(--muted)' }}>
            Hermes {hermesVer} · VPS {VPS_IP} · {lastRefresh ? `atualizado ${lastRefresh.toLocaleTimeString('pt-BR')}` : 'carregando...'}
          </div>
        </div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <Btn color="ghost" onClick={fetchAll} disabled={loading}>{loading ? '...' : '↻ Refresh'}</Btn>
          <a href={N8N_URL} target="_blank" rel="noopener" style={{ ...S.btn, background: 'rgba(255,140,0,.12)', border: '1px solid rgba(255,140,0,.35)', color: '#ff9500', textDecoration: 'none', fontSize: 13 }}>↗ N8N</a>
        </div>
      </div>

      {/* Sub-tabs */}
      <div style={{ display: 'flex', gap: 2, borderBottom: '1px solid var(--border)', marginBottom: 24, overflowX: 'auto' }}>
        {INFRA_TABS.map(t => (
          <button key={t.id} onClick={() => setSub(t.id)} style={{ ...S.btn, padding: '8px 14px', fontSize: 11, background: 'none', border: 'none', borderBottom: `2px solid ${sub === t.id ? 'var(--red)' : 'transparent'}`, borderRadius: 0, color: sub === t.id ? 'var(--red-b)':'var(--dim)', marginBottom: -1, whiteSpace: 'nowrap', gap: 6 }}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* ── STATUS ── */}
      {sub === 'status' && (
        <div>
          {/* Stat cards */}
          <div className="ng-grid4" style={S.grid4}>
            <StatCard
              label="Hermes Agent"
              value={hermesOk ? 'OK' : loading ? '...' : 'ERR'}
              sub={hermesOk ? `v${hermesVer} · online` : 'Sem resposta'}
              color={hermesOk ? 'var(--green)' : loading ? 'var(--dim)' : 'var(--red-b)'}
              icon="🤖"
            />
            <StatCard
              label="Sessões ativas"
              value={activeSess}
              sub={`${runningAg} agentes rodando`}
              color="var(--cyan)"
              icon="💬"
            />
            <StatCard
              label="Memória"
              value={memUsage}
              sub={`CPU: ${cpuUsage}`}
              color="var(--purple)"
              icon="🖥️"
            />
            <StatCard
              label="Cron Jobs"
              value={activeJobs}
              sub={`de ${jobs.length} total`}
              color="var(--gold)"
              icon="⏱️"
            />
          </div>

          {/* Conectividade */}
          <div style={{ ...S.card, marginBottom: 16 }}>
            <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--dim)', letterSpacing: '0.2em', textTransform: 'uppercase', marginBottom: 16 }}>// Mapa de Conectividade</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, alignItems: 'center', justifyContent: 'center', padding: '8px 0' }}>
              {[
                { label: 'Admin', color: 'var(--red-b)', icon: '🏰', ok: true },
                { label: '→', color: 'var(--muted)', icon: '', ok: true, arrow: true },
                { label: 'Hermes', color: hermesOk ? 'var(--green)' : 'var(--red-b)', icon: '🤖', ok: hermesOk },
                { label: '→', color: 'var(--muted)', icon: '', ok: true, arrow: true },
                { label: 'N8N', color: 'var(--gold)', icon: '🔄', ok: true },
                { label: '→', color: 'var(--muted)', icon: '', ok: true, arrow: true },
                { label: 'WhatsApp', color: 'var(--green)', icon: '💬', ok: true },
              ].map((node, i) =>
                node.arrow ? (
                  <div key={i} style={{ color: 'var(--border)', fontSize: 20, fontWeight: 300 }}>→</div>
                ) : (
                  <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 56, height: 56, borderRadius: 8, background: `${node.color}18`, border: `2px solid ${node.color}55`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>{node.icon}</div>
                    <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 10, color: node.color }}>{node.label}</div>
                    <div style={{ width: 6, height: 6, borderRadius: '50%', background: node.ok ? 'var(--green)' : 'var(--red-b)', boxShadow: `0 0 6px ${node.ok ? 'var(--green)' : 'var(--red-b)'}` }} />
                  </div>
                )
              )}
            </div>
            <div style={{ marginTop: 16, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {[
                { label: 'Supabase', url: 'https://supabase.com', color: 'var(--green)', icon: '🗄️' },
                { label: 'Cloudinary', url: 'https://cloudinary.com', color: 'var(--cyan)', icon: '🖼️' },
                { label: 'Vercel', url: 'https://vercel.com', color: 'var(--dim)', icon: '▲' },
              ].map(s => (
                <a key={s.label} href={s.url} target="_blank" rel="noopener" style={{ ...S.btn, padding: '5px 12px', fontSize: 12, background: `${s.color}12`, border: `1px solid ${s.color}40`, color: s.color, textDecoration: 'none', gap: 6 }}>
                  {s.icon} {s.label}
                </a>
              ))}
            </div>
          </div>

          {/* Features do Hermes */}
          {caps && (
            <div style={{ ...S.card, marginBottom: 16 }}>
              <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--dim)', letterSpacing: '0.2em', textTransform: 'uppercase', marginBottom: 12 }}>// Capabilities do Hermes</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {Object.entries(FEATURE_LABELS).map(([key, label]) => (
                  <span key={key} style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, padding: '4px 10px', borderRadius: 2, background: features[key] ? 'rgba(37,211,102,.1)' : 'var(--surface2)', border: `1px solid ${features[key] ? 'rgba(37,211,102,.3)' : 'var(--border)'}`, color: features[key] ? 'var(--green)' : 'var(--muted)' }}>
                    {features[key] ? '✔' : '✕'} {label}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* Modelo ativo */}
          {model && (
            <div style={{ ...S.card }}>
              <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--dim)', letterSpacing: '0.2em', textTransform: 'uppercase', marginBottom: 12 }}>// Modelo LLM ativo</div>
              {(model.data || [model]).map((m, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--green)', flexShrink: 0 }} />
                  <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 13, color: 'var(--cyan)' }}>{m.id || m.model || 'hermes-agent'}</div>
                  {m.created && <div style={{ fontSize: 11, color: 'var(--muted)', marginLeft: 'auto' }}>{new Date(m.created * 1000).toLocaleDateString('pt-BR')}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── SESSIONS ── */}
      {sub === 'sessions' && (
        <div>
          <div style={{ marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ fontSize: 14, color: 'var(--muted)' }}>{sessions.length} sessões recentes</div>
            {sessions.length === 0 && !loading && (
              <MonoTag color="var(--amber)">⚠ Endpoint /api/dashboard/sessions pode não estar ativo nesta versão</MonoTag>
            )}
          </div>
          {sessions.length === 0 ? (
            <div style={{ ...S.card, borderLeft: '3px solid var(--amber)', padding: 24 }}>
              <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--amber)', marginBottom: 8 }}>SEM DADOS</div>
              <div style={{ fontSize: 13, color: 'var(--dim)', lineHeight: 1.8 }}>
                O endpoint <code style={{ background: 'var(--bg3)', padding: '1px 6px', borderRadius: 3, color: 'var(--text)' }}>/api/dashboard/sessions</code> retornou vazio.<br />
                Isso acontece se o dashboard plugin não estiver instalado (<code style={{ background: 'var(--bg3)', padding: '1px 6px', borderRadius: 3, color: 'var(--text)' }}>hermes dashboard</code>).<br />
                O Hermes em si está funcionando normalmente.
              </div>
            </div>
          ) : (
            <div style={{ ...S.card, padding: 0, overflow: 'hidden' }}>
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 600 }}>
                  <thead>
                    <tr style={{ background: 'var(--bg3)' }}>
                      {['Plataforma', 'Título', 'Modelo', 'Msgs', 'Tokens', 'Última atividade'].map(h => (
                        <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontFamily: 'Share Tech Mono, monospace', fontSize: 10, color: 'var(--muted)', letterSpacing: '0.15em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sessions.map((s, i) => {
                      const PLATFORM_ICON = { telegram: '✈️', discord: '🎮', whatsapp: '📱', cli: '💻', slack: '💼', cron: '⏱️' };
                      return (
                        <tr key={s.id || i} style={{ borderTop: '1px solid var(--border)' }}>
                          <td style={{ padding: '10px 14px' }}>
                            <span style={{ fontSize: 18 }}>{PLATFORM_ICON[s.platform] || '💬'}</span>
                          </td>
                          <td style={{ padding: '10px 14px', maxWidth: 200 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.title || s.id || '—'}</div>
                            {s.live && <span style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 9, color: 'var(--green)', animation: 'pulse 1s infinite' }}>● LIVE</span>}
                          </td>
                          <td style={{ padding: '10px 14px', fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--cyan)' }}>{s.model || '—'}</td>
                          <td style={{ padding: '10px 14px', fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--dim)' }}>{s.message_count ?? '—'}</td>
                          <td style={{ padding: '10px 14px', fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--purple)' }}>{s.total_tokens ? s.total_tokens.toLocaleString('pt-BR') : '—'}</td>
                          <td style={{ padding: '10px 14px', fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--muted)' }}>{s.updated_at || s.last_active ? fmtDateFull(s.updated_at || s.last_active) : '—'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── JOBS ── */}
      {sub === 'jobs' && (
        <div>
          <div style={{ marginBottom: 16, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ fontSize: 14, color: 'var(--muted)' }}>{activeJobs} ativos · {jobs.filter(j => j.paused).length} pausados</div>
          </div>
          {jobs.length === 0 ? (
            <div style={{ ...S.card, borderLeft: '3px solid var(--dim)', padding: 24 }}>
              <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--muted)', marginBottom: 8 }}>NENHUM JOB CADASTRADO</div>
              <div style={{ fontSize: 13, color: 'var(--dim)', lineHeight: 1.8 }}>
                Crie cron jobs pelo Hermes com <code style={{ background: 'var(--bg3)', padding: '1px 6px', borderRadius: 3, color: 'var(--text)' }}>hermes cron</code> ou via POST em <code style={{ background: 'var(--bg3)', padding: '1px 6px', borderRadius: 3, color: 'var(--text)' }}>/api/jobs</code>.
              </div>
            </div>
          ) : (
            <div style={{ ...S.card, padding: 0, overflow: 'hidden' }}>
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 650 }}>
                  <thead>
                    <tr style={{ background: 'var(--bg3)' }}>
                      {['Status', 'Nome', 'Schedule', 'Próxima execução', 'Última execução', 'Ações'].map(h => (
                        <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontFamily: 'Share Tech Mono, monospace', fontSize: 10, color: 'var(--muted)', letterSpacing: '0.15em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {jobs.map((j, i) => (
                      <tr key={j.id || i} style={{ borderTop: '1px solid var(--border)', opacity: j.paused ? 0.5 : 1 }}>
                        <td style={{ padding: '10px 14px' }}>
                          <span style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 10, padding: '2px 8px', borderRadius: 2, background: j.paused ? 'var(--surface2)' : 'rgba(37,211,102,.1)', border: `1px solid ${j.paused ? 'var(--border)' : 'rgba(37,211,102,.3)'}`, color: j.paused ? 'var(--muted)' : 'var(--green)' }}>
                            {j.paused ? 'PAUSADO' : 'ATIVO'}
                          </span>
                        </td>
                        <td style={{ padding: '10px 14px', maxWidth: 200 }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{j.name || j.prompt?.slice(0, 40) || j.id}</div>
                          {j.platform && <div style={{ fontSize: 11, color: 'var(--dim)', fontFamily: 'Share Tech Mono, monospace' }}>→ {j.platform}</div>}
                        </td>
                        <td style={{ padding: '10px 14px', fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--cyan)' }}>{j.schedule || '—'}</td>
                        <td style={{ padding: '10px 14px', fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--gold)' }}>{j.next_run ? fmtDateFull(j.next_run) : '—'}</td>
                        <td style={{ padding: '10px 14px', fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--muted)' }}>{j.last_run ? fmtDateFull(j.last_run) : 'nunca'}</td>
                        <td style={{ padding: '10px 14px' }}>
                          <div style={{ display: 'flex', gap: 4 }}>
                            <button onClick={() => runJobNow(j)} title="Executar agora" style={{ ...S.btn, padding: '4px 8px', fontSize: 11, background: 'rgba(255,184,0,.1)', border: '1px solid rgba(255,184,0,.3)', color: 'var(--gold)' }}>▶</button>
                            <button onClick={() => toggleJob(j)} title={j.paused ? 'Retomar' : 'Pausar'} style={{ ...S.btn, padding: '4px 8px', fontSize: 11, background: 'var(--surface2)', border: '1px solid var(--border)', color: 'var(--dim)' }}>{j.paused ? '▶▶' : '⏸'}</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── CHAT HERMES ── */}
      {sub === 'hermes' && (
        <div>
          <div style={{ ...S.card, borderTop: '3px solid var(--cyan)', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
              <div style={{ fontSize: 24 }}>🤖</div>
              <div>
                <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--cyan)', letterSpacing: '0.2em', marginBottom: 2 }}>// HERMES AGENT CHAT</div>
                <div style={{ fontSize: 13, color: 'var(--dim)' }}>{HERMES_URL} · {hermesOk ? <span style={{ color: 'var(--green)' }}>● online</span> : <span style={{ color: 'var(--red-b)' }}>● offline</span>}</div>
              </div>
              <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {['docker ps', 'free -h', 'df -h /', 'uptime'].map(cmd => (
                  <button key={cmd} onClick={() => setHermesMsg(cmd)} style={{ ...S.btn, padding: '4px 10px', fontSize: 11, background: 'rgba(0,255,255,.06)', border: '1px solid rgba(0,255,255,.2)', color: 'var(--cyan)' }}>{cmd}</button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ ...S.card, padding: 0, display: 'flex', flexDirection: 'column', height: 520 }}>
            <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 10, color: 'var(--dim)', letterSpacing: '0.15em', padding: '10px 16px', borderBottom: '1px solid var(--border)', background: 'var(--bg3)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span>// HERMES TERMINAL</span>
              {hermesChat.length > 0 && <button onClick={() => setHermesChat([])} style={{ ...S.btn, padding: '2px 8px', fontSize: 10, background: 'none', border: '1px solid var(--border)', color: 'var(--muted)' }}>limpar</button>}
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
              {hermesChat.length === 0 && (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--muted)', fontFamily: 'Share Tech Mono, monospace', fontSize: 12 }}>
                  💬 Chat direto com o Hermes Agent<br /><br />
                  <span style={{ fontSize: 10 }}>Pergunte sobre status dos serviços, execute comandos, consulte logs...</span>
                </div>
              )}
              {hermesChat.map((m, i) => (
                <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', flexDirection: m.role === 'user' ? 'row-reverse' : 'row' }}>
                  <div style={{ flexShrink: 0, width: 28, height: 28, borderRadius: '50%', background: m.role === 'user' ? 'var(--red)' : 'rgba(0,255,255,.15)', border: `1px solid ${m.role === 'user' ? 'var(--red-b)' : 'rgba(0,255,255,.3)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>
                    {m.role === 'user' ? '👤' : '🤖'}
                  </div>
                  <div style={{ maxWidth: '75%', padding: '10px 14px', borderRadius: m.role === 'user' ? '12px 4px 12px 12px' : '4px 12px 12px 12px', background: m.role === 'user' ? 'rgba(204,20,20,.15)' : 'var(--surface2)', border: `1px solid ${m.role === 'user' ? 'rgba(204,20,20,.3)' : 'var(--border)'}`, fontSize: 13, color: 'var(--text)', lineHeight: 1.6, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
                    {m.content}
                  </div>
                </div>
              ))}
              {hermesLoading && (
                <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgba(0,255,255,.15)', border: '1px solid rgba(0,255,255,.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>🤖</div>
                  <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--dim)', animation: 'pulse 1s infinite' }}>processando...</div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>
            <div style={{ padding: 12, borderTop: '1px solid var(--border)', display: 'flex', gap: 8, background: 'var(--bg3)' }}>
              <input
                value={hermesMsg}
                onChange={e => setHermesMsg(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && !e.shiftKey && sendHermes()}
                placeholder="Mensagem para o Hermes... (Enter)"
                style={{ ...S.input, flex: 1 }}
              />
              <button onClick={sendHermes} disabled={hermesLoading || !hermesMsg.trim()} style={{ ...S.btn, background: 'rgba(0,255,255,.12)', border: '1px solid rgba(0,255,255,.3)', color: 'var(--cyan)', opacity: (hermesLoading || !hermesMsg.trim()) ? .5 : 1 }}>Enviar</button>
            </div>
          </div>
        </div>
      )}

      {/* ── N8N ── */}
      {sub === 'n8n' && (
        <div>
          <div style={{ ...S.card, borderTop: '3px solid #ff9500', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 24 }}>🔄</div>
              <div>
                <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: '#ff9500', letterSpacing: '0.2em', marginBottom: 2 }}>// N8N SELF-HOSTED</div>
                <div style={{ fontSize: 13, color: 'var(--dim)' }}>Docker · {N8N_URL}</div>
              </div>
              <span style={{ marginLeft: 'auto', fontFamily: 'Share Tech Mono, monospace', fontSize: 10, padding: '3px 10px', borderRadius: 2, background: 'rgba(37,211,102,.12)', border: '1px solid rgba(37,211,102,.3)', color: 'var(--green)' }}>● ONLINE</span>
            </div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <a href={N8N_URL} target="_blank" rel="noopener" style={{ ...S.btn, background: 'rgba(255,140,0,.15)', border: '1px solid rgba(255,140,0,.4)', color: '#ff9500', textDecoration: 'none' }}>↗ Abrir N8N</a>
              <a href={`${N8N_URL}/workflows`} target="_blank" rel="noopener" style={{ ...S.btn, background: 'var(--surface2)', border: '1px solid var(--border)', color: 'var(--dim)', textDecoration: 'none', fontSize: 13 }}>📋 Workflows</a>
              <a href={`${N8N_URL}/credentials`} target="_blank" rel="noopener" style={{ ...S.btn, background: 'var(--surface2)', border: '1px solid var(--border)', color: 'var(--dim)', textDecoration: 'none', fontSize: 13 }}>🔑 Credenciais</a>
            </div>
          </div>
          <div style={{ ...S.card, borderTop: '3px solid var(--purple)' }}>
            <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--purple)', letterSpacing: '0.2em', marginBottom: 16 }}>// IFRAME DIRETO</div>
            <div style={{ background: 'var(--bg)', borderRadius: 6, overflow: 'hidden', border: '1px solid var(--border)', height: 560 }}>
              <iframe src={N8N_URL} style={{ width: '100%', height: '100%', border: 'none' }} title="N8N" />
            </div>
            <div style={{ marginTop: 8, fontSize: 12, color: 'var(--muted)', fontFamily: 'Share Tech Mono, monospace' }}>
              ⚠ Se o iframe não carregar, use "↗ Abrir N8N" acima.
            </div>
          </div>
        </div>
      )}

      {/* ── PI MONITOR ── */}
      {sub === 'minipc' && (() => {
        const ru = healthEx?.resource_usage;
        const MBar = ({pct}) => { const c = pct>=85?'var(--red-b)':pct>=70?'var(--amber)':'var(--green)'; return <div style={{background:'var(--bg3)',borderRadius:4,height:8,marginTop:8,overflow:'hidden'}}><div style={{width:`${Math.min(pct||0,100)}%`,height:'100%',background:c,borderRadius:4,transition:'width .4s'}}/></div>; };
        if (!healthEx) return <div style={{...S.card,borderLeft:'3px solid var(--red-b)',padding:24}}><div style={{fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--red-b)'}}>MINI PC SEM DADOS — Hermes offline?</div></div>;
        const cpuPct = ru?.cpu_percent != null ? Math.round(ru.cpu_percent) : null;
        const memPct = ru?.memory_mb && ru?.memory_total_mb ? Math.round(ru.memory_mb/ru.memory_total_mb*100) : (ru?.memory_percent != null ? Math.round(ru.memory_percent) : null);
        const hdPct  = ru?.disk_percent != null ? Math.round(ru.disk_percent) : (ru?.disk_used_gb && ru?.disk_total_gb ? Math.round(ru.disk_used_gb/ru.disk_total_gb*100) : null);
        const col = v => v==null?'var(--dim)':v>=85?'var(--red-b)':v>=70?'var(--amber)':'var(--green)';
        return (
          <div>
            <div style={{marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{fontSize:24}}>🖥</div>
                <div>
                  <div style={{fontFamily:'Press Start 2P, monospace',fontSize:11,color:'var(--text)',marginBottom:2}}>Mini PC</div>
                  <div style={{fontSize:12,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}><span style={{color:hermesOk?'var(--green)':'var(--amber)'}}>{hermesOk?'● ONLINE':'⚠ HERMES SEM RESPOSTA'}</span> · via /health/extended · {lastRefresh?lastRefresh.toLocaleTimeString('pt-BR'):'—'}</div>
                </div>
              </div>
              <Btn color="ghost" onClick={fetchAll} disabled={loading}>{loading?'...':'↻'}</Btn>
            </div>
            <div className="ng-grid4" style={S.grid4}>
              {[
                {label:'CPU', pct:cpuPct, sub:cpuPct!=null?`${cpuPct}% utilização`:'sem dado'},
                {label:'RAM', pct:memPct, sub:ru?.memory_mb?`${Math.round(ru.memory_mb)}/${Math.round(ru.memory_total_mb||0)}MB`:(memPct!=null?`${memPct}%`:'sem dado')},
                {label:'HD',  pct:hdPct,  sub:ru?.disk_used_gb?`${ru.disk_used_gb.toFixed(1)}/${ru.disk_total_gb?.toFixed(0)||'?'}GB`:(hdPct!=null?`${hdPct}%`:'não exposto')},
                {label:'Agentes', pct:null, sub:`${healthEx.running_agents??'—'} rodando`, val:healthEx.active_sessions??'—'},
              ].map(({label,pct,sub,val})=>(
                <div key={label} style={{...S.card,borderTop:`3px solid ${col(pct)}`}}>
                  <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--muted)',textTransform:'uppercase',marginBottom:8,letterSpacing:'0.15em'}}>{label}</div>
                  <div style={{fontFamily:'Press Start 2P, monospace',fontSize:20,color:col(pct),marginBottom:4}}>{val!==undefined?val:(pct!=null?`${pct}%`:'—')}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>{sub}</div>
                  {pct!=null && <MBar pct={pct}/>}
                </div>
              ))}
            </div>
            {((cpuPct!=null&&cpuPct>80)||(memPct!=null&&memPct>85)||(hdPct!=null&&hdPct>85)) && (
              <div style={{...S.card,borderLeft:'3px solid var(--amber)',marginTop:16,padding:'12px 16px'}}>
                <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--amber)',letterSpacing:'0.15em',marginBottom:8}}>⚠ ALERTAS</div>
                {cpuPct!=null&&cpuPct>80 && <div style={{fontSize:13,color:'var(--dim)',marginBottom:4}}>🔥 CPU alta ({cpuPct}%) — reduza WORKERS no Hermes</div>}
                {memPct!=null&&memPct>85 && <div style={{fontSize:13,color:'var(--dim)',marginBottom:4}}>🧠 RAM alta ({memPct}%)</div>}
                {hdPct!=null&&hdPct>85   && <div style={{fontSize:13,color:'var(--dim)'}}>💾 HD quase cheio ({hdPct}%)</div>}
              </div>
            )}
          </div>
        );
      })()}
      {sub === 'pi' && <PiMonitor />}

      {/* ── SSH REFERENCE ── */}
      {sub === 'ssh' && (
        <div>
          <div className="ng-grid4" style={S.grid4}>
            <StatCard label="IP VPS" value="2.24.217" sub=".31 — Hostinger" color="var(--cyan)" icon="🌐" />
            <StatCard label="Hermes" value=":8642" sub="API Server" color="var(--purple)" icon="🤖" />
            <StatCard label="N8N" value=":5678" sub="Docker" color="#ff9500" icon="🔄" />
            <StatCard label="Nginx" value=":443" sub="Reverse Proxy" color="var(--dim)" icon="🔒" />
          </div>
          <div style={{ ...S.card }}>
            <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--dim)', letterSpacing: '0.2em', marginBottom: 16 }}>// REFERÊNCIA SSH RÁPIDA</div>
            {[
              { label: 'SSH na VPS',           cmd: `ssh root@${VPS_IP}` },
              { label: 'Status Hermes',         cmd: 'systemctl status hermes-gateway' },
              { label: 'Reiniciar Hermes',      cmd: 'systemctl restart hermes-gateway' },
              { label: 'Logs Hermes (live)',    cmd: 'journalctl -u hermes-gateway -f' },
              { label: 'Status N8N',            cmd: 'docker ps | grep n8n' },
              { label: 'Reiniciar N8N',         cmd: 'cd /root/n8n && docker compose restart' },
              { label: 'Logs N8N',              cmd: 'docker logs n8n-n8n-1 -f --tail=50' },
              { label: 'Uso de memória',        cmd: 'free -h' },
              { label: 'Uso de disco',          cmd: 'df -h /' },
              { label: 'Processos top',         cmd: 'htop' },
              { label: 'Testar Hermes /health', cmd: `curl ${HERMES_URL}/health` },
              { label: 'Testar Hermes /ext',    cmd: `curl -H "Authorization: Bearer hermes-n8n-key-2026" ${HERMES_URL}/health/extended` },
            ].map(({ label, cmd }) => (
              <div key={cmd} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
                <div style={{ fontSize: 12, color: 'var(--dim)', minWidth: 180, flexShrink: 0 }}>{label}</div>
                <code style={{ flex: 1, fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: 'var(--cyan)', background: 'rgba(0,0,0,.3)', padding: '4px 10px', borderRadius: 3, overflow: 'auto', whiteSpace: 'nowrap' }}>{cmd}</code>
                <button onClick={() => { navigator.clipboard?.writeText(cmd); showToast('📋 Copiado!'); }} style={{ ...S.btn, padding: '4px 8px', fontSize: 11, background: 'var(--surface2)', border: '1px solid var(--border)', color: 'var(--muted)', flexShrink: 0 }}>📋</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// ── App ───────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════


// ── HermesPage ───────────────────────────────────────────────
const HermesPage = () => {
  const [tab, setTab]             = React.useState('espera');
  const [espera, setEspera]       = React.useState([]);
  const [conversas, setConversas] = React.useState([]);
  const [blacklist, setBlacklist] = React.useState([]);
  const [loading, setLoading]     = React.useState(true);
  const [toast, setToast]         = React.useState('');
  const [novoBlack, setNovoBlack] = React.useState({ phone:'', motivo:'' });

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const load = async () => {
    setLoading(true);
    try {
      const [e, c, b] = await Promise.all([
        supa('lista_espera?order=created_at.desc&limit=100'),
        supa('conversas_ativas?order=ultima_mensagem_at.desc&limit=100'),
        supa('blacklist?order=created_at.desc'),
      ]);
      setEspera(e||[]);
      setConversas(c||[]);
      setBlacklist(b||[]);
    } catch(err) { showToast('✕ Erro ao carregar: '+err.message); }
    setLoading(false);
  };

  React.useEffect(()=>{ load(); }, []);

  const removerEspera = async (id) => {
    await supa(`lista_espera?id=eq.${id}`, { method:'DELETE' });
    showToast('✅ Removido da lista de espera');
    load();
  };

  const marcarConverteu = async (id) => {
    await supa(`conversas_ativas?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({ converteu: true }) });
    showToast('✅ Marcado como convertido');
    load();
  };

  const addBlacklist = async () => {
    if (!novoBlack.phone) { showToast('✕ Informe o número'); return; }
    const phone = novoBlack.phone.replace(/\D/g,'');
    await supa('blacklist', { method:'POST', body: JSON.stringify({ phone, motivo: novoBlack.motivo, ativo: true }) });
    showToast('✅ Número bloqueado');
    setNovoBlack({ phone:'', motivo:'' });
    load();
  };

  const toggleBlacklist = async (id, ativo) => {
    await supa(`blacklist?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({ ativo: !ativo }) });
    showToast(ativo ? '⚠️ Desbloqueado' : '🚫 Bloqueado');
    load();
  };

  const TABS = [
    { id:'espera',    label:'Lista de Espera',   icon:'⏳' },
    { id:'conversas', label:'Conversas Ativas',  icon:'💬' },
    { id:'blacklist', label:'Blacklist',          icon:'🚫' },
  ];

  if (loading) return <div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Carregando...</div>;

  return (
    <div>
      {toast && <div style={{position:'fixed',top:20,right:20,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'12px 20px',zIndex:999,fontFamily:'Share Tech Mono, monospace',fontSize:13,color:'var(--text)',animation:'slideIn .2s ease'}}>{toast}</div>}

      <div style={{marginBottom:20}}>
        <div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>🦇 Hermes Bot</div>
        <div style={{fontSize:14,color:'var(--muted)'}}>Lista de espera · Conversas · Blacklist</div>
      </div>

      {/* Stats */}
      <div className="ng-grid4" style={{...S.grid4, marginBottom:20}}>
        <StatCard label="Aguardando produto" value={espera.filter(e=>!e.notificado).length} sub={`${espera.length} total`} color="var(--gold)" icon="⏳"/>
