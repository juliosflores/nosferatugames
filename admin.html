<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Nosferatu Games</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CC1414;--red-b:#FF2222;--gold:#FFB800;--purple:#A855F7;
  --bg:#050508;--bg2:#0A0A12;--bg3:#0F0F1A;
  --surface:#12121E;--surface2:#1A1A2E;
  --border:#2A1A3A;--border-r:#4A0A0A;
  --text:#E8E0F0;--dim:#9080A0;--muted:#5A4A6A;
  --green:#25D366;--green-d:#1a5c2a;
}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea,button{font-family:'Rajdhani',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Config ───────────────────────────────────────────────────
// Cloudinary (pré-configurado)
if (!localStorage.getItem('ng_cloud_name'))    localStorage.setItem('ng_cloud_name',    'ddadz8ut');
if (!localStorage.getItem('ng_upload_preset')) localStorage.setItem('ng_upload_preset', 'ytsmjlb');

const SUPA_URL  = 'https://jcnncmfbodglvoyytgok.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impjbm5jbWZib2RnbHZveXl0Z29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTg0NDgsImV4cCI6MjA5MTE5NDQ0OH0.YpStoaxT86MQY06KiKVhUXdlcF-CVsu4DOFuUTLv4u0';
// Senha validada via API segura
const HEADERS   = { apikey: SUPA_ANON, Authorization: `Bearer ${SUPA_ANON}`, 'Content-Type': 'application/json', Prefer: 'return=representation' };

const supa = async (path, opts={}) => {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: HEADERS, ...opts });
  if (!r.ok) { const e = await r.json().catch(()=>{}); throw new Error(e?.message||r.status); }
  if (r.status === 204) return null;
  return r.json();
};

const rpc = async (fn, params={}) => {
  const r = await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`, { method:'POST', headers: HEADERS, body: JSON.stringify(params) });
  return r.json();
};

// ── Helpers ──────────────────────────────────────────────────
const fmtBRL  = v => v ? `R$ ${Number(v).toLocaleString('pt-BR')}` : '—';
const fmtDate = d => new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const CONSOLES = ['PS5','PS4','Nintendo Switch','Nintendo 3DS','Retrô','Pokémon TCG','Acessórios'];
const CONDICOES= ['Novo','Seminovo','Usado'];

// Cloudinary upload
const cloudUpload = async (file) => {
  const cloud  = localStorage.getItem('ng_cloud_name');
  const preset = localStorage.getItem('ng_upload_preset');
  if (!cloud||!preset) throw new Error('Configure Cloudinary nas Configurações');
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', preset);
  fd.append('folder', 'nosferatu-games');
  const r = await fetch(`https://api.cloudinary.com/v1_1/${cloud}/image/upload`, { method:'POST', body:fd });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.secure_url;
};

// ── UI primitives ────────────────────────────────────────────
const S = {
  layout: { display:'flex', height:'100vh', overflow:'hidden' },
  sidebar: { width:220, background:'var(--bg2)', borderRight:'1px solid var(--border-r)', display:'flex', flexDirection:'column', flexShrink:0 },
  main:    { flex:1, overflow:'auto', background:'var(--bg)', display:'flex', flexDirection:'column' },
  topbar:  { height:56, background:'var(--bg2)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 24px', gap:12, flexShrink:0 },
  content: { flex:1, padding:24, overflow:'auto' },
  card:    { background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:20 },
  grid4:   { display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:16, marginBottom:24 },
  grid2:   { display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 },
  label:   { display:'block', fontSize:12, fontWeight:600, letterSpacing:'0.1em', color:'var(--dim)', textTransform:'uppercase', marginBottom:6, fontFamily:'Share Tech Mono, monospace' },
  input:   { width:'100%', padding:'9px 12px', background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:4, color:'var(--text)', fontSize:15, outline:'none' },
  btn:     { padding:'9px 18px', borderRadius:4, border:'none', cursor:'pointer', fontWeight:700, fontSize:14, letterSpacing:'0.05em', display:'inline-flex', alignItems:'center', gap:6, transition:'all 0.15s' },
  row:     { display:'flex', alignItems:'center', gap:10 },
  tag:     (c) => ({ padding:'2px 8px', borderRadius:2, fontSize:11, fontWeight:700, fontFamily:'Share Tech Mono, monospace', background:c==='Novo'?'rgba(74,222,128,.15)':c==='Seminovo'?'rgba(168,85,247,.15)':'rgba(255,184,0,.15)', color:c==='Novo'?'#4ade80':c==='Seminovo'?'var(--purple)':'var(--gold)', border:`1px solid ${c==='Novo'?'#166534':c==='Seminovo'?'#4c1d95':'#713f12'}` }),
};

const Btn = ({children, color='red', onClick, disabled, style={}}) => {
  const colors = { red:{bg:'var(--red)',c:'#fff',hbg:'var(--red-b)'}, ghost:{bg:'transparent',c:'var(--dim)',hbg:'var(--surface2)'}, green:{bg:'rgba(37,211,102,.15)',c:'var(--green)',hbg:'rgba(37,211,102,.25)'}, purple:{bg:'rgba(168,85,247,.15)',c:'var(--purple)',hbg:'rgba(168,85,247,.25)'}, gold:{bg:'rgba(255,184,0,.15)',c:'var(--gold)',hbg:'rgba(255,184,0,.25)'}, danger:{bg:'rgba(204,20,20,.15)',c:'var(--red-b)',hbg:'rgba(204,20,20,.3)'} };
  const cv = colors[color]||colors.ghost;
  return <button disabled={disabled} onClick={onClick} style={{...S.btn, background:cv.bg, color:cv.c, opacity:disabled?.5:1, ...style}}>{children}</button>;
};

const Input = ({label, ...props}) => (
  <div style={{marginBottom:14}}>
    {label && <label style={S.label}>{label}</label>}
    {props.as==='textarea'
      ? <textarea {...props} as={undefined} rows={props.rows||3} style={{...S.input, resize:'vertical'}} />
      : <input {...props} style={S.input} />}
  </div>
);

const Toggle = ({label, checked, onChange}) => (
  <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',userSelect:'none'}}>
    <div onClick={onChange} style={{width:36,height:20,borderRadius:10,background:checked?'var(--red)':'var(--surface2)',border:'1px solid var(--border)',position:'relative',transition:'background 0.2s',flexShrink:0}}>
      <div style={{position:'absolute',top:2,left:checked?18:2,width:14,height:14,borderRadius:'50%',background:'#fff',transition:'left 0.2s'}}/>
    </div>
    <span style={{fontSize:14,fontWeight:600,color:'var(--dim)'}}>{label}</span>
  </label>
);

const StatCard = ({label, value, sub, color='var(--red-b)', icon}) => (
  <div style={{...S.card, borderTop:`3px solid ${color}`}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:6}}>{label}</div>
        <div style={{fontFamily:'Press Start 2P, monospace',fontSize:22,color}}>{value}</div>
        {sub && <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>{sub}</div>}
      </div>
      {icon && <div style={{fontSize:28,opacity:.5}}>{icon}</div>}
    </div>
  </div>
);

// ── Login ────────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [pwd,setPwd]   = useState('');
  const [err,setErr]   = useState('');
  const [loading,setLoading] = useState(false);
  const [show,setShow] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (loading) return;
    setLoading(true);
    setErr('');

    try {
      const res = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('ng_admin_token', data.token);
        onLogin();
      } else {
        setErr(data.message || 'Senha incorreta');
      }
    } catch (e) {
      setErr('Erro ao conectar com o servidor');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div style={{...S.card,width:360,borderTop:'3px solid var(--red)'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontFamily:'Press Start 2P, monospace',fontSize:13,color:'var(--red-b)',textShadow:'0 0 20px rgba(204,20,20,.6)',lineHeight:1.6}}>NOSFERATU</div>
          <div style={{fontFamily:'Rajdhani, sans-serif',fontSize:13,color:'var(--gold)',letterSpacing:'0.3em',marginTop:4}}>PAINEL ADMIN</div>
        </div>
        <form onSubmit={submit}>
          <div style={{position:'relative',marginBottom:8}}>
            <input type={show?'text':'password'} placeholder="Senha" value={pwd} onChange={e=>{setPwd(e.target.value);setErr('')}} style={{...S.input,paddingRight:44}} autoFocus />
            <button type="button" onClick={()=>setShow(s=>!s)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:16}}>{show?'🙈':'👁'}</button>
          </div>
          {err && <div style={{color:'var(--red-b)',fontSize:13,marginBottom:10,fontFamily:'Share Tech Mono, monospace'}}>✕ {err}</div>}
          <Btn style={{width:'100%',justifyContent:'center',marginTop:4}} disabled={loading}>{loading?'Validando...':'Entrar'}</Btn>
        </form>
      </div>
    </div>
  );
};

// ── Dashboard ────────────────────────────────────────────────
const Dashboard = ({produtos, visitas}) => {
  const ativos   = produtos.filter(p=>p.ativo!==false&&!p.vendido).length;
  const vendidos = produtos.filter(p=>p.vendido).length;
  const destaque = produtos.filter(p=>p.destaque).length;
  const hoje     = new Date().toDateString();
  const visitasHoje = visitas.filter(v=>new Date(v.created_at).toDateString()===hoje).length;

  // visitas dos últimos 7 dias
  const dias = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-6+i);
    const label = d.toLocaleDateString('pt-BR',{weekday:'short'}).slice(0,3);
    const count = visitas.filter(v=>new Date(v.created_at).toDateString()===d.toDateString()).length;
    return {label,count};
  });
  const maxV = Math.max(...dias.map(d=>d.count),1);

  // mais vistos
  const topProd = [...produtos].sort((a,b)=>(b.viewed_count||0)-(a.viewed_count||0)).slice(0,5);

  // mobile vs desktop
  const mobile  = visitas.filter(v=>v.dispositivo==='mobile').length;
  const desktop = visitas.length - mobile;

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Dashboard</div>
        <div style={{fontSize:14,color:'var(--muted)'}}>Visão geral da loja</div>
      </div>

      <div style={S.grid4}>
        <StatCard label="Produtos ativos"  value={ativos}       sub={`${produtos.length} total`}    color="var(--red-b)"   icon="🎮"/>
        <StatCard label="Vendidos"          value={vendidos}     sub="marcados como vendido"          color="var(--muted)"   icon="✅"/>
        <StatCard label="Em destaque"       value={destaque}     sub="aparecem primeiro"              color="var(--gold)"    icon="⭐"/>
        <StatCard label="Visitas hoje"      value={visitasHoje}  sub={`${visitas.length} total`}      color="var(--purple)"  icon="👁"/>
      </div>

      <div style={S.grid2}>
        {/* Gráfico de visitas */}
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:16}}>// Visitas — últimos 7 dias</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,height:100}}>
            {dias.map(({label,count})=>(
              <div key={label} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{fontSize:11,color:'var(--muted)'}}>{count||''}</div>
                <div style={{width:'100%',background:'var(--red)',borderRadius:'2px 2px 0 0',height:`${Math.max((count/maxV)*80,count>0?4:0)}px`,opacity:.85,transition:'height 0.3s'}}/>
                <div style={{fontSize:10,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{label}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:16,display:'flex',gap:16}}>
            <div style={{fontSize:13,color:'var(--dim)'}}>📱 Mobile: <strong style={{color:'var(--text)'}}>{mobile}</strong></div>
            <div style={{fontSize:13,color:'var(--dim)'}}>🖥 Desktop: <strong style={{color:'var(--text)'}}>{desktop}</strong></div>
          </div>
        </div>

        {/* Mais vistos */}
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:16}}>// Produtos mais vistos</div>
          {topProd.length === 0
            ? <div style={{fontSize:13,color:'var(--muted)'}}>Nenhum dado ainda</div>
            : topProd.map((p,i)=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<4?'1px solid var(--border)':'none'}}>
                <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)',width:16}}>#{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--text)',lineHeight:1.3}}>{p.nome}</div>
                  <div style={{fontSize:12,color:'var(--muted)'}}>{p.console||'—'}</div>
                </div>
                <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--purple)'}}>{p.viewed_count||0} views</div>
              </div>
            ))}
        </div>
      </div>
    </div>
  );
};

// ── Formulário de produto ────────────────────────────────────
const EMPTY_PROD = { nome:'', preco:'', console:'PS5', condicao:'Novo', descricao:'', imagens:[], ativo:true, destaque:false, vendido:false };

const ProductForm = ({initial, onSave, onClose}) => {
  const [p,setP]       = useState(initial||EMPTY_PROD);
  const [uploading,setUploading] = useState(false);
  const [saving,setSaving]       = useState(false);
  const [toast,setToast]         = useState('');
  const fileRef = useRef();

  const set = (k,v) => setP(prev=>({...prev,[k]:v}));

  const uploadFotos = async (files) => {
    setUploading(true);
    try {
      const urls = await Promise.all([...files].map(cloudUpload));
      set('imagens', [...(p.imagens||[]), ...urls]);
    } catch(e) { setToast('✕ '+e.message); }
    setUploading(false);
  };

  const removerImg = (idx) => set('imagens', p.imagens.filter((_,i)=>i!==idx));

  const salvar = async () => {
    if (!p.nome.trim()) { setToast('✕ Nome é obrigatório'); return; }
    setSaving(true);
    try { await onSave(p); onClose(); }
    catch(e) { setToast('✕ '+e.message); setSaving(false); }
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,width:'100%',maxWidth:600,maxHeight:'90vh',overflow:'auto',padding:24,position:'relative'}}>
        <button onClick={onClose} style={{position:'absolute',top:14,right:14,background:'none',border:'none',color:'var(--dim)',fontSize:20,cursor:'pointer'}}>✕</button>
        <div style={{fontFamily:'Press Start 2P, monospace',fontSize:11,color:'var(--text)',marginBottom:20}}>{initial?.id ? 'EDITAR PRODUTO' : 'NOVO PRODUTO'}</div>

        <div style={S.grid2}>
          <Input label="Nome do produto" value={p.nome} onChange={e=>set('nome',e.target.value)} placeholder="Ex: God of War Ragnarök" />
          <Input label="Preço (R$)" type="number" value={p.preco} onChange={e=>set('preco',e.target.value)} placeholder="299" />
        </div>
        <div style={S.grid2}>
          <div style={{marginBottom:14}}>
            <label style={S.label}>Console / Plataforma</label>
            <select value={p.console} onChange={e=>set('console',e.target.value)} style={{...S.input,cursor:'pointer'}}>
              {CONSOLES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <label style={S.label}>Condição</label>
            <select value={p.condicao} onChange={e=>set('condicao',e.target.value)} style={{...S.input,cursor:'pointer'}}>
              {CONDICOES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <Input label="Descrição" as="textarea" rows={3} value={p.descricao||''} onChange={e=>set('descricao',e.target.value)} placeholder="Detalhes do produto, acompanha embalagem, etc." />

        {/* Fotos */}
        <div style={{marginBottom:14}}>
          <label style={S.label}>Fotos</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:8}}>
            {(p.imagens||[]).map((url,i)=>(
              <div key={i} style={{position:'relative',width:72,height:72}}>
                <img src={url} alt="" style={{width:72,height:72,objectFit:'cover',borderRadius:4,border:'1px solid var(--border)'}}/>
                <button onClick={()=>removerImg(i)} style={{position:'absolute',top:-6,right:-6,width:18,height:18,borderRadius:'50%',background:'var(--red)',border:'none',color:'#fff',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
              </div>
            ))}
            <button onClick={()=>fileRef.current.click()} disabled={uploading} style={{width:72,height:72,borderRadius:4,border:'2px dashed var(--border)',background:'var(--bg3)',color:'var(--muted)',cursor:'pointer',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:2}}>
              {uploading ? <span style={{fontSize:11}}>...</span> : <>+<span style={{fontSize:10}}>foto</span></>}
            </button>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>uploadFotos(e.target.files)}/>
          </div>
          {!(localStorage.getItem('ng_cloud_name')) && <div style={{fontSize:12,color:'var(--gold)',fontFamily:'Share Tech Mono, monospace'}}>⚠ Configure o Cloudinary nas Configurações para habilitar upload</div>}
        </div>

        {/* Toggles */}
        <div style={{display:'flex',gap:24,marginBottom:20,flexWrap:'wrap'}}>
          <Toggle label="Ativo (visível no site)" checked={p.ativo!==false} onChange={()=>set('ativo',!p.ativo)} />
          <Toggle label="Destaque" checked={!!p.destaque} onChange={()=>set('destaque',!p.destaque)} />
          <Toggle label="Vendido" checked={!!p.vendido} onChange={()=>set('vendido',!p.vendido)} />
        </div>

        {toast && <div style={{fontSize:13,color:'var(--red-b)',marginBottom:12,fontFamily:'Share Tech Mono, monospace'}}>{toast}</div>}

        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <Btn color="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar produto'}</Btn>
        </div>
      </div>
    </div>
  );
};

// ── Página de Produtos ───────────────────────────────────────
const ProductsPage = ({produtos, reload}) => {
  const [busca,setBusca]     = useState('');
  const [filtro,setFiltro]   = useState('todos');
  const [editando,setEditando] = useState(null); // null=fechado, {}=novo, {id,...}=editar
  const [deleting,setDeleting] = useState(null);

  const filtrados = produtos
    .filter(p => filtro==='todos' || (filtro==='ativos'&&p.ativo!==false&&!p.vendido) || (filtro==='vendidos'&&p.vendido) || (filtro==='destaque'&&p.destaque))
    .filter(p => !busca || p.nome.toLowerCase().includes(busca.toLowerCase()));

  const salvar = async (p) => {
    const { id, ...dados } = p;
    dados.preco = dados.preco ? Number(dados.preco) : null;
    if (id) await supa(`produtos?id=eq.${id}`, { method:'PATCH', body: JSON.stringify(dados) });
    else    await supa('produtos',              { method:'POST',  body: JSON.stringify(dados) });
    reload();
  };

  const deletar = async (id) => {
    await supa(`produtos?id=eq.${id}`, { method:'DELETE' });
    setDeleting(null); reload();
  };

  const toggleField = async (p, field) => {
    await supa(`produtos?id=eq.${p.id}`, { method:'PATCH', body: JSON.stringify({ [field]: !p[field] }) });
    reload();
  };

  const imgs = (p) => (p.imagens&&p.imagens.length)?p.imagens:(p.imagem_url?[p.imagem_url]:[]);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Produtos</div>
          <div style={{fontSize:14,color:'var(--muted)'}}>{filtrados.length} de {produtos.length} produtos</div>
        </div>
        <Btn onClick={()=>setEditando({})}>+ Novo produto</Btn>
      </div>

      {/* Filtros */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar produto..." style={{...S.input,width:220,height:36}}/>
        {['todos','ativos','vendidos','destaque'].map(f=>(
          <button key={f} onClick={()=>setFiltro(f)} style={{...S.btn,height:36,fontSize:12,background:filtro===f?'var(--red-dark)':'var(--surface)',border:`1px solid ${filtro===f?'var(--red)':'var(--border)'}`,color:filtro===f?'#fff':'var(--dim)'}}>
            {f.charAt(0).toUpperCase()+f.slice(1)}
          </button>
        ))}
      </div>

      {/* Tabela */}
      <div style={{...S.card,padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:640}}>
            <thead>
              <tr style={{background:'var(--bg3)'}}>
                {['Produto','Console','Preço','Cond.','Status','Views','Ações'].map(h=>(
                  <th key={h} style={{padding:'10px 14px',textAlign:'left',fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--muted)',letterSpacing:'0.15em',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtrados.length === 0 && (
                <tr><td colSpan={7} style={{padding:'2rem',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:13}}>nenhum produto encontrado</td></tr>
              )}
              {filtrados.map(p=>(
                <tr key={p.id} style={{borderTop:'1px solid var(--border)'}}>
                  <td style={{padding:'10px 14px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      {imgs(p).length
                        ? <img src={imgs(p)[0]} alt="" style={{width:40,height:40,objectFit:'cover',borderRadius:4,flexShrink:0}}/>
                        : <div style={{width:40,height:40,background:'var(--bg3)',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🎮</div>}
                      <div style={{fontSize:14,fontWeight:700,color:'var(--text)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.nome}</div>
                    </div>
                  </td>
                  <td style={{padding:'10px 14px',fontSize:13,color:'var(--dim)',whiteSpace:'nowrap'}}>{p.console||'—'}</td>
                  <td style={{padding:'10px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:13,color:'var(--gold)',whiteSpace:'nowrap'}}>{fmtBRL(p.preco)}</td>
                  <td style={{padding:'10px 14px'}}><span style={S.tag(p.condicao)}>{p.condicao||'—'}</span></td>
                  <td style={{padding:'10px 14px'}}>
                    <div style={{display:'flex',flexDirection:'column',gap:4}}>
                      {p.vendido  && <span style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>VENDIDO</span>}
                      {p.destaque && <span style={{fontSize:11,color:'var(--gold)',fontFamily:'Share Tech Mono, monospace'}}>⭐ DESTAQUE</span>}
                      {p.ativo===false && <span style={{fontSize:11,color:'var(--red-b)',fontFamily:'Share Tech Mono, monospace'}}>INATIVO</span>}
                      {p.ativo!==false&&!p.vendido&&!p.destaque && <span style={{fontSize:11,color:'#4ade80',fontFamily:'Share Tech Mono, monospace'}}>ATIVO</span>}
                    </div>
                  </td>
                  <td style={{padding:'10px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--purple)'}}>{p.viewed_count||0}</td>
                  <td style={{padding:'10px 14px'}}>
                    <div style={{display:'flex',gap:6}}>
                      <button title="Editar" onClick={()=>setEditando(p)} style={{...S.btn,padding:'5px 10px',fontSize:13,background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--dim)'}}>✏</button>
                      <button title={p.destaque?'Remover destaque':'Marcar destaque'} onClick={()=>toggleField(p,'destaque')} style={{...S.btn,padding:'5px 10px',fontSize:13,background:p.destaque?'rgba(255,184,0,.2)':'var(--surface2)',border:'1px solid var(--border)',color:p.destaque?'var(--gold)':'var(--dim)'}}>⭐</button>
                      <button title={p.vendido?'Desmarcar vendido':'Marcar vendido'} onClick={()=>toggleField(p,'vendido')} style={{...S.btn,padding:'5px 10px',fontSize:13,background:p.vendido?'rgba(90,74,106,.4)':'var(--surface2)',border:'1px solid var(--border)',color:p.vendido?'var(--muted)':'var(--dim)'}}>✅</button>
                      <button title="Excluir" onClick={()=>setDeleting(p.id)} style={{...S.btn,padding:'5px 10px',fontSize:13,background:'rgba(204,20,20,.1)',border:'1px solid var(--border-r)',color:'var(--red-b)'}}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {editando !== null && <ProductForm initial={editando?.id ? editando : null} onSave={salvar} onClose={()=>setEditando(null)} />}

      {/* Confirmar exclusão */}
      {deleting && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{...S.card,maxWidth:360,borderTop:'3px solid var(--red-b)',textAlign:'center',padding:28}}>
            <div style={{fontSize:32,marginBottom:12}}>🗑</div>
            <div style={{fontFamily:'Press Start 2P, monospace',fontSize:11,color:'var(--text)',marginBottom:8}}>Excluir produto?</div>
            <div style={{fontSize:14,color:'var(--dim)',marginBottom:20}}>Esta ação não pode ser desfeita.</div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <Btn color="ghost" onClick={()=>setDeleting(null)}>Cancelar</Btn>
              <Btn color="danger" onClick={()=>deletar(deleting)}>Excluir</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Analytics ────────────────────────────────────────────────
const Analytics = ({visitas}) => {
  const hoje   = new Date().toDateString();
  const semana = visitas.filter(v=>{ const d=new Date(v.created_at); const s=new Date(); s.setDate(s.getDate()-7); return d>=s; });
  const mobile = visitas.filter(v=>v.dispositivo==='mobile').length;

  const referrers = visitas.reduce((acc,v)=>{
    const r = v.referrer||'Direto';
    acc[r] = (acc[r]||0)+1;
    return acc;
  },{});
  const topRef = Object.entries(referrers).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const recent = [...visitas].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,20);

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Analytics</div>
        <div style={{fontSize:14,color:'var(--muted)'}}>Rastreamento de visitas via Supabase</div>
      </div>

      <div style={S.grid4}>
        <StatCard label="Total visitas"  value={visitas.length}  color="var(--purple)" icon="👁"/>
        <StatCard label="Esta semana"    value={semana.length}   color="var(--red-b)"  icon="📅"/>
        <StatCard label="Hoje"           value={visitas.filter(v=>new Date(v.created_at).toDateString()===hoje).length} color="var(--gold)" icon="☀️"/>
        <StatCard label="Mobile"         value={`${visitas.length?Math.round(mobile/visitas.length*100):0}%`} sub={`${mobile} de ${visitas.length}`} color="var(--green)" icon="📱"/>
      </div>

      <div style={S.grid2}>
        {/* Top referrers */}
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:16}}>// Origem do tráfego</div>
          {topRef.length===0
            ? <div style={{fontSize:13,color:'var(--muted)'}}>Nenhum dado ainda</div>
            : topRef.map(([ref,cnt])=>(
              <div key={ref} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{flex:1,fontSize:13,color:'var(--dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ref}</div>
                <div style={{width:`${Math.round(cnt/topRef[0][1]*100)}%`,minWidth:4,height:4,background:'var(--purple)',borderRadius:2,maxWidth:80}}/>
                <div style={{fontSize:12,color:'var(--text)',fontFamily:'Share Tech Mono, monospace',width:30,textAlign:'right'}}>{cnt}</div>
              </div>
            ))}
        </div>

        {/* Atividade recente */}
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:16}}>// Atividade recente</div>
          <div style={{maxHeight:200,overflow:'auto'}}>
            {recent.length===0
              ? <div style={{fontSize:13,color:'var(--muted)'}}>Nenhuma visita registrada ainda.<br/><br/>Execute o SQL em <code>setup-supabase.sql</code> para ativar o rastreamento.</div>
              : recent.map((v,i)=>(
                <div key={v.id||i} style={{display:'flex',gap:10,padding:'6px 0',borderBottom:i<recent.length-1?'1px solid var(--border)':'none',alignItems:'flex-start'}}>
                  <div style={{fontSize:14}}>{v.dispositivo==='mobile'?'📱':'🖥'}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:'var(--text)'}}>{v.produto_nome||v.pagina||'/'}</div>
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{fmtDate(v.created_at)}</div>
                  </div>
                </div>
              ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Config ────────────────────────────────────────────────────
const Config = () => {
  const [cloud,setCloud]   = useState(localStorage.getItem('ng_cloud_name')||'ddadz8ut');
  const [preset,setPreset] = useState(localStorage.getItem('ng_upload_preset')||'ytsmjlb');
  const [saved,setSaved]   = useState(false);

  const salvar = () => {
    localStorage.setItem('ng_cloud_name', cloud);
    localStorage.setItem('ng_upload_preset', preset);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  return (
    <div style={{maxWidth:480}}>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Configurações</div>
        <div style={{fontSize:14,color:'var(--muted)'}}>Cloudinary e preferências</div>
      </div>
      <div style={{...S.card,borderTop:'3px solid var(--gold)',marginBottom:16}}>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--gold)',letterSpacing:'0.2em',marginBottom:16}}>// CLOUDINARY</div>
        <div style={{fontSize:13,color:'var(--dim)',marginBottom:16,lineHeight:1.6}}>
          Acesse <strong style={{color:'var(--text)'}}>cloudinary.com → Settings → Upload → Upload presets</strong> e crie um preset do tipo <em>Unsigned</em>.
        </div>
        <Input label="Cloud Name" value={cloud} onChange={e=>setCloud(e.target.value)} placeholder="ex: nosferatugames" />
        <Input label="Upload Preset (unsigned)" value={preset} onChange={e=>setPreset(e.target.value)} placeholder="ex: produtos_unsigned" />
        <Btn color="gold" onClick={salvar}>{saved ? '✔ Salvo!' : 'Salvar'}</Btn>
      </div>

      <div style={{...S.card,borderTop:'3px solid var(--purple)'}}>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--purple)',letterSpacing:'0.2em',marginBottom:16}}>// ANALYTICS — SETUP</div>
        <div style={{fontSize:13,color:'var(--dim)',lineHeight:1.8}}>
          Para ativar o rastreamento de visitas, execute o arquivo <code style={{background:'var(--bg3)',padding:'1px 6px',borderRadius:3,color:'var(--text)'}}>setup-supabase.sql</code> no <strong style={{color:'var(--text)'}}>Supabase → SQL Editor</strong>.<br/><br/>
          O site já inclui o código de rastreamento automático.
        </div>
      </div>
    </div>
  );
};

// ── Sidebar nav ───────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard',  icon:'📊' },
  { id:'produtos',  label:'Produtos',   icon:'🎮' },
  { id:'analytics', label:'Analytics',  icon:'👁' },
  { id:'config',    label:'Config',     icon:'⚙️' },
];

// ── App ───────────────────────────────────────────────────────
const App = () => {
  const [auth,setAuth]       = useState(!!sessionStorage.getItem('ng_admin_token'));
  const [tab,setTab]         = useState('dashboard');
  const [produtos,setProdutos] = useState([]);
  const [visitas,setVisitas]   = useState([]);
  const [loading,setLoading]   = useState(true);

  const loadProdutos = useCallback(async () => {
    try { setProdutos(await supa('produtos?order=created_at.desc&limit=200')||[]); }
    catch(e){ console.error(e); }
  },[]);

  const loadVisitas = useCallback(async () => {
    try { setVisitas(await supa('visitas?order=created_at.desc&limit=500')||[]); }
    catch(e){ /* tabela ainda não existe — rode setup-supabase.sql */ }
  },[]);

  useEffect(()=>{
    if (!auth) return;
    Promise.all([loadProdutos(), loadVisitas()]).finally(()=>setLoading(false));
    const t = setInterval(()=>{ loadProdutos(); loadVisitas(); }, 30000);
    return ()=>clearInterval(t);
  },[auth]);

  const logout = () => { sessionStorage.removeItem('ng_admin_token'); setAuth(false); };

  if (!auth) return <Login onLogin={()=>setAuth(true)} />;

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:40,height:40,border:'3px solid var(--border)',borderTopColor:'var(--red-b)',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}}/>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--muted)'}}>carregando...</div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return (
    <div style={S.layout}>
      {/* Sidebar */}
      <div style={S.sidebar}>
        <div style={{padding:'20px 16px 16px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontFamily:'Press Start 2P, monospace',fontSize:9,color:'var(--red-b)',lineHeight:1.8,textShadow:'0 0 10px rgba(204,20,20,.5)'}}>NOSFERATU</div>
          <div style={{fontFamily:'Rajdhani, sans-serif',fontSize:11,color:'var(--gold)',letterSpacing:'0.2em'}}>ADMIN</div>
        </div>
        <nav style={{flex:1,padding:12,display:'flex',flexDirection:'column',gap:4}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setTab(n.id)} style={{...S.btn,justifyContent:'flex-start',padding:'10px 12px',background:tab===n.id?'rgba(204,20,20,.15)':'transparent',border:`1px solid ${tab===n.id?'rgba(204,20,20,.3)':'transparent'}`,color:tab===n.id?'var(--red-b)':'var(--dim)',borderRadius:4,fontSize:14}}>
              <span>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:12,borderTop:'1px solid var(--border)'}}>
          <a href="index.html" target="_blank" style={{...S.btn,justifyContent:'center',width:'100%',background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.3)',color:'var(--green)',textDecoration:'none',marginBottom:6,fontSize:13}}>↗ Ver site</a>
          <button onClick={logout} style={{...S.btn,justifyContent:'center',width:'100%',background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',fontSize:13}}>Sair</button>
        </div>
      </div>

      {/* Main */}
      <div style={S.main}>
        <div style={S.topbar}>
          <div style={{flex:1,fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)'}}>
            {new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}
          </div>
          <div style={{fontSize:13,color:'var(--dim)'}}>
            <span style={{color:'#4ade80',fontSize:10}}>●</span> {produtos.filter(p=>p.ativo!==false&&!p.vendido).length} ativos · {visitas.filter(v=>new Date(v.created_at).toDateString()===new Date().toDateString()).length} visitas hoje
          </div>
        </div>
        <div style={S.content}>
          {tab==='dashboard' && <Dashboard produtos={produtos} visitas={visitas} />}
          {tab==='produtos'  && <ProductsPage produtos={produtos} reload={loadProdutos} />}
          {tab==='analytics' && <Analytics visitas={visitas} />}
          {tab==='config'    && <Config />}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
