// ── PI MONITOR ───────────────────────────────────────────────
// ════════════════════════════════════════════════════════════

const PiMonitor = () => {
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [offline, setOffline] = useState(false);

  const carregar = async () => {
    try {
      const r = await supa('pi_stats?order=criado_em.desc&limit=1');
      const d = r?.[0];
      if (!d) { setOffline(true); setLoading(false); return; }
      const diff = (Date.now() - new Date(d.criado_em)) / 60000;
      setOffline(diff > 5);
      setStats(d);
    } catch { setOffline(true); }
    setLoading(false);
  };

  useEffect(() => { carregar(); const t = setInterval(carregar, 10000); return () => clearInterval(t); }, []);

  const Bar = ({ value, max = 100 }) => {
    const pct = Math.min((value / max) * 100, 100);
    const color = pct > 80 ? 'var(--red-b)' : pct > 60 ? 'var(--amber)' : 'var(--green)';
    return (
      <div style={{ height: 8, background: 'var(--surface2)', borderRadius: 4, overflow: 'hidden', marginTop: 8 }}>
        <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 4, transition: 'width 0.5s' }} />
      </div>
    );
  };

  const fmtUptime = (s) => {
    if (!s) return '—';
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    return `${d}d ${h}h ${m}m`;
  };

  if (loading) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:300 }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ width:32, height:32, border:'3px solid var(--border)', borderTopColor:'var(--red-b)', borderRadius:'50%', animation:'spin 0.8s linear infinite', margin:'0 auto 12px' }} />
        <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--muted)' }}>Carregando dados da Pi...</div>
      </div>
    </div>
  );

  if (offline || !stats) return (
    <div style={{ ...S.card, borderLeft:'3px solid var(--red-b)', padding:24 }}>
      <div style={{ display:'flex', alignItems:'center', gap:16 }}>
        <div style={{ fontSize:32 }}>🍓</div>
        <div>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--red-b)', marginBottom:4 }}>PI SEM DADOS</div>
          <div style={{ fontSize:13, color:'var(--dim)' }}>pi_monitor.py rodando? <code style={{ color:'var(--cyan)' }}>sudo systemctl status pi-monitor</code></div>
        </div>
      </div>
    </div>
  );

  const memPct = (stats.mem_usado_mb / stats.mem_total_mb) * 100;
  const discoPct = (stats.disco_usado_gb / stats.disco_total_gb) * 100;

  return (
    <div>
      <div style={{ marginBottom:20, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontSize:24 }}>🍓</div>
          <div>
            <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:11, color:'var(--text)', marginBottom:2 }}>Raspberry Pi</div>
            <div style={{ fontSize:12, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace' }}><span style={{ color:'var(--green)' }}>● ONLINE</span> · {fmtDateFull(stats.criado_em)}</div>
          </div>
        </div>
        <Btn color="ghost" onClick={carregar} style={{ fontSize:12 }}>↻</Btn>
      </div>
      <div className="ng-grid4" style={S.grid4}>
        <div style={{ ...S.card, borderTop:`3px solid ${stats.cpu_percent > 80 ? 'var(--red-b)' : stats.cpu_percent > 60 ? 'var(--amber)' : 'var(--green)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>CPU</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:22, color:stats.cpu_percent > 80 ? 'var(--red-b)' : stats.cpu_percent > 60 ? 'var(--amber)' : 'var(--green)', marginBottom:4 }}>{stats.cpu_percent}%</div>
          <Bar value={stats.cpu_percent} />
        </div>
        <div style={{ ...S.card, borderTop:`3px solid ${memPct > 80 ? 'var(--red-b)' : memPct > 60 ? 'var(--amber)' : 'var(--purple)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>Memória</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:18, color:memPct > 80 ? 'var(--red-b)' : 'var(--purple)', marginBottom:4 }}>{Math.round(stats.mem_usado_mb)}MB</div>
          <div style={{ fontSize:11, color:'var(--muted)', marginBottom:2 }}>de {Math.round(stats.mem_total_mb)}MB ({Math.round(memPct)}%)</div>
          <Bar value={memPct} />
        </div>
        <div style={{ ...S.card, borderTop:`3px solid ${stats.temp_cpu > 70 ? 'var(--red-b)' : stats.temp_cpu > 55 ? 'var(--amber)' : 'var(--gold)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>Temperatura</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:22, color:stats.temp_cpu > 70 ? 'var(--red-b)' : 'var(--gold)', marginBottom:4 }}>{stats.temp_cpu ? `${stats.temp_cpu}°C` : '—'}</div>
          {stats.temp_cpu && <Bar value={stats.temp_cpu} max={85} />}
        </div>
        <div style={{ ...S.card, borderTop:`3px solid ${discoPct > 80 ? 'var(--red-b)' : discoPct > 60 ? 'var(--amber)' : 'var(--cyan)'}` }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', textTransform:'uppercase', marginBottom:8, letterSpacing:'0.15em' }}>SD Card</div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:18, color:'var(--cyan)', marginBottom:4 }}>{stats.disco_usado_gb}GB</div>
          <div style={{ fontSize:11, color:'var(--muted)', marginBottom:2 }}>de {stats.disco_total_gb}GB ({Math.round(discoPct)}%)</div>
          <Bar value={discoPct} />
        </div>
      </div>
      <div style={S.card}>
        <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--dim)', letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:12 }}>// Uptime</div>
        <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:16, color:'var(--gold)' }}>{fmtUptime(stats.uptime_segundos)}</div>
      </div>
      {(stats.cpu_percent > 80 || memPct > 85 || discoPct > 85 || (stats.temp_cpu && stats.temp_cpu > 70)) && (
        <div style={{ ...S.card, borderLeft:'3px solid var(--amber)', marginTop:16 }}>
          <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--amber)', marginBottom:8 }}>⚠ ALERTAS</div>
          {stats.cpu_percent > 80 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>🔥 CPU alta ({stats.cpu_percent}%) — reduza WORKERS para 2</div>}
          {memPct > 85 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>💾 Memória alta ({Math.round(memPct)}%) — reinicie containers</div>}
          {discoPct > 85 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>💿 SD Card quase cheio ({Math.round(discoPct)}%)</div>}
          {stats.temp_cpu > 70 && <div style={{ fontSize:13, color:'var(--dim)', marginBottom:4 }}>🌡️ Temperatura alta ({stats.temp_cpu}°C)</div>}
        </div>
      )}
    </div>
  );
};

    const html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Financeiro Nosferatu Games</title>'
      +'<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;background:#fff;color:#222;padding:32px}'

      +'.footer{margin-top:24px;font-size:11px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:12px}'
      +'@media print{body{padding:16px}}</style></head><body>'
      +'<table style="width:100%;border-collapse:collapse;background:#1a1a2e;margin-bottom:20px"><tr>'
      +'<td style="padding:18px 24px"><div style="font-size:20px;font-weight:900;color:#CC1414;letter-spacing:2px">NOSFERATU <span style="color:#FFB800">GAMES</span></div><div style="font-size:11px;color:#888;margin-top:3px">Relatorio Financeiro Mensal</div></td>'
      +'<td style="padding:18px 24px;text-align:right"><div style="font-size:14px;font-weight:700;color:#fff">'+mesLabel.toUpperCase()+'</div><div style="font-size:11px;color:#777;margin-top:3px">Gerado em '+geradoEm+'</div></td>'
      +'</tr></table>'
      +'<table style="width:100%;border-collapse:separate;border-spacing:10px;margin-bottom:20px"><tr>'
      +'<td style="background:#fdf2f2;border-left:4px solid #CC1414;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Total Compras</div><div style="font-size:20px;font-weight:900;color:#CC1414">'+fmt(totalC)+'</div></td>'
      +'<td style="background:#fdf6ec;border-left:4px solid #e67e22;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Custos Extras</div><div style="font-size:20px;font-weight:900;color:#e67e22">'+fmt(totalE)+'</div></td>'

      +'</tr></table>'
      +'<table class="data"><thead><tr><th>Produto</th><th>Console</th><th>Origem</th><th>Compra</th><th>Extras</th><th>Venda</th><th>Lucro</th><th>Status</th><th>Data</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table>'
      +'<div class="footer">Nosferatu Games &middot; Porto Alegre, RS &middot; nosferatugames.com.br</div>'

      +'</body></html>';
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
  };

  useEffect(() => { carregar(); }, []);

  const salvar = async () => {
    if (!editando.produto.trim()) { showToast('✕ Nome obrigatório'); return; }
    setSaving(true);
    try {
      const { id, ...dados } = editando;
      dados.preco_compra = dados.preco_compra ? Number(dados.preco_compra) : null;
      dados.preco_venda  = dados.preco_venda  ? Number(dados.preco_venda)  : null;
      dados.custo_extra  = dados.custo_extra  ? Number(dados.custo_extra)  : 0;
      if (id) await supa(`financeiro?id=eq.${id}`, { method:'PATCH', body: JSON.stringify(dados) });
      else    await supa('financeiro',               { method:'POST',  body: JSON.stringify(dados) });
      registrarLog(id?'editar':'criar', 'financeiro', dados.produto);
      setEditando(null);
      showToast('✔ Salvo!');
      carregar();
    } catch(e) { showToast('✕ '+e.message); }
    finally { setSaving(false); }
  };

  const deletar = async (id) => {
    if (!confirm('Excluir este item?')) return;
    await supa(`financeiro?id=eq.${id}`, { method:'DELETE' });
    registrarLog('excluir', 'financeiro', 'item id: '+id);
    carregar();
  };

  const marcarVendido = async (item) => {
    await supa(`financeiro?id=eq.${item.id}`, { method:'PATCH', body: JSON.stringify({ status:'vendido', data_venda: new Date().toISOString().slice(0,10) }) });
    registrarLog('vender', 'financeiro', item.produto + ' marcado como vendido');
    showToast('✔ Marcado como vendido!');
    carregar();
  };


  const marcarVendido = async (item) => {
    await supa(`financeiro?id=eq.${item.id}`, { method:'PATCH', body: JSON.stringify({ status:'vendido', data_venda: new Date().toISOString().slice(0,10) }) });
    registrarLog('vender', 'financeiro', item.produto + ' marcado como vendido');
    showToast('✔ Marcado como vendido!');
    carregar();
  };

  const salvarMeta = () => {
    const v = Number(metaInput);
    if (v > 0) { setMetaMes(v); localStorage.setItem('fin_meta', v); }
    setEditMeta(false);
  };

  // helpers
  const diasNoEstoque = (item) => {
    if (!item.data_compra) return null;
    const diff = Date.now() - new Date(item.data_compra).getTime();
    return Math.floor(diff / 86400000);
  };

  const filtrados = itens.filter(i => {
    const mesOk = !filtroMes || (i.data_compra||'').startsWith(filtroMes) || (i.data_venda||i.created_at||'').startsWith(filtroMes);
    const statusOk = filtroStatus === 'todos' || i.status === filtroStatus;
    return mesOk && statusOk;
  });

  // Métricas do mês
  const doMes = itens.filter(i => { const ref = i.data_venda || i.data_compra || ''; return ref.startsWith(filtroMes); });
  const totalCompras  = doMes.reduce((a,i) => a + Number(i.preco_compra||0), 0);
  const totalVendas   = doMes.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_venda||0), 0);
  const lucro         = totalVendas - doMes.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_compra||0) + Number(i.custo_extra||0), 0);
  const emEstoque     = itens.filter(i=>i.status==='estoque').length;
  const vendidosMes   = doMes.filter(i=>i.status==='vendido');
  const ticketMedio   = vendidosMes.length ? Math.round(vendidosMes.reduce((a,i)=>a+Number(i.preco_venda||0),0)/vendidosMes.length) : 0;
  const parados90     = itens.filter(i=>i.status==='estoque' && diasNoEstoque(i) >= 90);

  // Dados para gráfico últimos 6 meses
  const ultimos6 = Array.from({length:6},(_,i)=>{ const d=new Date(); d.setMonth(d.getMonth()-5+i); return d.toISOString().slice(0,7); });
  const dadosMeses = ultimos6.map(mes=>{
    const it = itens.filter(i=>(i.data_venda||i.data_compra||'').startsWith(mes));
    const v = it.filter(i=>i.status==='vendido').reduce((a,i)=>a+Number(i.preco_venda||0),0);
    const c = it.filter(i=>i.status==='vendido').reduce((a,i)=>a+Number(i.preco_compra||0)+Number(i.custo_extra||0),0);
    const label = new Date(mes+'-02').toLocaleDateString('pt-BR',{month:'short'}).slice(0,3);
    return { mes, label, lucro: v-c, vendas: v };
  });
  const maxLucro = Math.max(...dadosMeses.map(d=>Math.abs(d.lucro)), 1);

  // Ranking por console
  const rankConsole = Object.entries(
    itens.filter(i=>i.status==='vendido').reduce((acc,i)=>{
      const c = i.console||'Outro';
      if(!acc[c]) acc[c]={lucro:0,qtd:0};
      acc[c].lucro += Number(i.preco_venda||0)-Number(i.preco_compra||0)-Number(i.custo_extra||0);
      acc[c].qtd++;
      return acc;
    },{})
  ).sort((a,b)=>b[1].lucro-a[1].lucro).slice(0,6);
  const maxRank = rankConsole.length ? Math.max(...rankConsole.map(r=>r[1].lucro),1) : 1;

  const ORIGENS = ['proprio','olx_garimpo','facebook','enjoei','mercadolivre','site','fornecedor','troca'];
  const ORIGEM_LABEL = { proprio:'Próprio', olx_garimpo:'🎯 OLX', facebook:'📘 Facebook', enjoei:'🛍 Enjoei', mercadolivre:'🛒 ML', site:'🏰 Site', fornecedor:'Fornecedor', troca:'Troca' };
  const ORIGEM_COLOR = { olx_garimpo:'var(--purple)', facebook:'#1877F2', enjoei:'#E91E8C', mercadolivre:'#FFE600', site:'var(--gold)' };
  const CONSOLES_FIN = ['PS5','PS4 Pro','PS4 Slim','PS4 Fat','PS3','PS2','PSP','Xbox Series S','Xbox One','Xbox 360','Switch OLED','Switch V2','Switch Lite','Switch','3DS','DS','Wii U','Wii','Outro'];
  const FORMAS_PAG = ['pix','dinheiro','cartao','transferencia'];
  const FORMA_LABEL = { pix:'PIX', dinheiro:'Dinheiro', cartao:'Cartão', transferencia:'Transferência' };

  const gerarPDF = () => {
    const mesLabel = new Date(filtroMes + '-02').toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    const doMesPDF = itens.filter(i => { const ref = i.data_venda || i.data_compra || ''; return ref.startsWith(filtroMes); });
    const totalC = doMesPDF.reduce((a,i) => a + Number(i.preco_compra||0), 0);
    const totalE = doMesPDF.reduce((a,i) => a + Number(i.custo_extra||0), 0);
    const totalV = doMesPDF.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_venda||0), 0);
    const lucroL = totalV - doMesPDF.filter(i=>i.status==='vendido').reduce((a,i) => a + Number(i.preco_compra||0) + Number(i.custo_extra||0), 0);
    const fmt = v => 'R$' + Math.round(v).toLocaleString('pt-BR');
    const rows = filtrados.map(function(item) {
      const li = item.status==='vendido' ? Number(item.preco_venda||0) - Number(item.preco_compra||0) - Number(item.custo_extra||0) : null;
      const lc = li===null?'#888':li>=0?'#27ae60':'#c0392b';
      const origem = ORIGEM_LABEL[item.origem]||item.origem;
      const sbg = item.status==='vendido'?'#d5f5e3':'#fef9e7';
      const sc = item.status==='vendido'?'#1e8449':'#b7950b';
      const st = item.status==='vendido'?'VENDIDO':'ESTOQUE';
      const dias = diasNoEstoque(item);
      return '<tr><td style="padding:8px 10px;border-bottom:1px solid #eee;font-weight:600">'+item.produto+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#666">'+( item.console||'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee">'+origem+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#CC1414;font-family:monospace">'+fmt(item.preco_compra||0)+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#e67e22;font-family:monospace">'+(item.custo_extra>0?fmt(item.custo_extra):'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#27ae60;font-family:monospace">'+(item.preco_venda?fmt(item.preco_venda):'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:'+lc+';font-family:monospace;font-weight:bold">'+(li===null?'--':(li>=0?'+':'')+fmt(li))+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee"><span style="background:'+sbg+';color:'+sc+';padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">'+st+'</span></td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-size:12px">'+(item.data_venda||item.data_compra||'--')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-size:12px">'+(item.status==='estoque'&&dias!==null?dias+'d':'--')+'</td></tr>';
    }).join('');
    const geradoEm = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Financeiro Nosferatu Games</title>'
      +'<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;background:#fff;color:#222;padding:32px}'
      +'table.data{width:100%;border-collapse:collapse;font-size:13px}'
      +'table.data thead tr{background:#1a1a2e;color:#fff}'
      +'table.data th{padding:10px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}'
      +'table.data td{padding:9px 10px;vertical-align:middle;border-bottom:1px solid #eee}'
      +'table.data tr:nth-child(even) td{background:#f9f9fb}'
      +'.footer{margin-top:24px;font-size:11px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:12px}'
      +'@media print{body{padding:16px}}</style></head><body>'
      +'<table style="width:100%;border-collapse:collapse;background:#1a1a2e;margin-bottom:20px"><tr>'
      +'<td style="padding:18px 24px"><div style="font-size:20px;font-weight:900;color:#CC1414;letter-spacing:2px">NOSFERATU <span style="color:#FFB800">GAMES</span></div><div style="font-size:11px;color:#888;margin-top:3px">Relatorio Financeiro Mensal</div></td>'
      +'<td style="padding:18px 24px;text-align:right"><div style="font-size:14px;font-weight:700;color:#fff">'+mesLabel.toUpperCase()+'</div><div style="font-size:11px;color:#777;margin-top:3px">Gerado em '+geradoEm+'</div></td>'
      +'</tr></table>'
      +'<table style="width:100%;border-collapse:separate;border-spacing:10px;margin-bottom:20px"><tr>'
      +'<td style="background:#fdf2f2;border-left:4px solid #CC1414;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Total Compras</div><div style="font-size:20px;font-weight:900;color:#CC1414">'+fmt(totalC)+'</div></td>'
      +'<td style="background:#fdf6ec;border-left:4px solid #e67e22;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Custos Extras</div><div style="font-size:20px;font-weight:900;color:#e67e22">'+fmt(totalE)+'</div></td>'
      +'<td style="background:#eafaf1;border-left:4px solid #27ae60;border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Total Vendas</div><div style="font-size:20px;font-weight:900;color:#27ae60">'+fmt(totalV)+'</div></td>'
      +'<td style="background:'+(lucroL>=0?'#fefbd8':'#fdf2f2')+';border-left:4px solid '+(lucroL>=0?'#FFB800':'#CC1414')+';border-radius:6px;padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px">Lucro Liquido</div><div style="font-size:20px;font-weight:900;color:'+(lucroL>=0?'#b7950b':'#CC1414')+'">'+(lucroL>=0?'+':'')+fmt(lucroL)+'</div></td>'
      +'</tr></table>'
      +'<table class="data"><thead><tr><th>Produto</th><th>Console</th><th>Origem</th><th>Compra</th><th>Extras</th><th>Venda</th><th>Lucro</th><th>Status</th><th>Data</th><th>Dias</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table>'
      +'<div class="footer">Nosferatu Games &middot; Porto Alegre, RS &middot; nosferatugames.com.br</div>'
      +'<script>window.onload=function(){window.print();}<\/script>'
      +'</body></html>';
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
  };

  return (
    <div>
      {toast && <div style={{ position:'fixed', top:70, right:24, zIndex:2000, background:'var(--surface2)', border:'1px solid var(--border)', padding:'10px 18px', borderRadius:4, fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--text)' }}>{toast}</div>}

      {/* Header */}
      <div style={{ marginBottom:20, display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
        <div>
          <div style={{ fontFamily:'Press Start 2P, monospace', fontSize:14, color:'var(--text)', marginBottom:4 }}>Financeiro</div>
          <div style={{ fontSize:14, color:'var(--muted)' }}>Controle de compra e venda</div>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          <input type="month" value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={{ ...S.input, width:160, height:36, fontSize:13 }} />
          <Btn color="ghost" onClick={gerarPDF}>📄 PDF</Btn>
          <Btn onClick={()=>setEditando({...EMPTY_FIN})}>+ Novo</Btn>
        </div>
      </div>

      {/* Alerta parados 90 dias */}
      {parados90.length > 0 && (
        <div style={{ background:'rgba(204,20,20,.1)', border:'1px solid var(--red-b)', borderRadius:6, padding:'12px 16px', marginBottom:16, display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:20 }}>⚠️</span>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:'var(--red-b)', marginBottom:2 }}>{parados90.length} produto{parados90.length>1?'s':''} parado{parados90.length>1?'s':''} há mais de 90 dias</div>
            <div style={{ fontSize:12, color:'var(--dim)' }}>{parados90.map(i=>i.produto).join(', ')}</div>
          </div>
        </div>
      )}

      {/* Métricas */}
      <div className="ng-grid4" style={S.grid4}>
        <StatCard label="Compras no mês"  value={"R$"+Math.round(totalCompras).toLocaleString('pt-BR')}  color="var(--red-b)"  icon="📥"/>
        <StatCard label="Vendas no mês"   value={"R$"+Math.round(totalVendas).toLocaleString('pt-BR')}   color="var(--green)" icon="📤"/>
        <StatCard label="Lucro no mês"    value={"R$"+Math.round(lucro).toLocaleString('pt-BR')}          color={lucro>=0?'var(--gold)':'var(--red-b)'} icon="💰"/>
        <StatCard label="Em estoque"      value={emEstoque}                                                  color="var(--purple)" icon="📦"/>
      </div>

      {/* Meta mensal */}
      <div style={{ ...S.card, marginBottom:16, padding:'14px 18px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <span style={{ fontSize:16 }}>🎯</span>
            <div>
              <div style={{ fontSize:11, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace', letterSpacing:'0.1em' }}>META DO MÊS</div>
              {editMeta
                ? <div style={{ display:'flex', gap:6, marginTop:4 }}>
                    <input type="number" value={metaInput} onChange={e=>setMetaInput(e.target.value)} placeholder="Ex: 2000" style={{ ...S.input, width:120, height:30, fontSize:13 }} autoFocus />
                    <Btn onClick={salvarMeta}>OK</Btn>
                    <Btn color="ghost" onClick={()=>setEditMeta(false)}>✕</Btn>
                  </div>
                : <div style={{ fontSize:16, fontWeight:700, color:'var(--gold)', cursor:'pointer' }} onClick={()=>{setMetaInput(metaMes||0);setEditMeta(true);}}>
                    {metaMes>0 ? 'R$'+metaMes.toLocaleString('pt-BR') : <span style={{color:'var(--muted)',fontSize:13}}>Clique para definir</span>}
                  </div>
              }
            </div>
          </div>
          {metaMes > 0 && !editMeta && (
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--muted)', marginBottom:4, fontFamily:'Share Tech Mono, monospace' }}>
                <span>{Math.round(lucro).toLocaleString('pt-BR')} / {metaMes.toLocaleString('pt-BR')}</span>
                <span>{Math.min(100,Math.round((lucro/metaMes)*100))}%</span>
              </div>
              <div style={{ height:8, background:'var(--bg3)', borderRadius:4, overflow:'hidden' }}>
                <div style={{ height:'100%', width:Math.min(100,Math.max(0,(lucro/metaMes)*100))+'%', background:lucro>=metaMes?'var(--green)':'var(--gold)', borderRadius:4, transition:'width .5s' }}/>
              </div>
            </div>
          )}
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace' }}>TICKET MÉDIO</div>
            <div style={{ fontSize:16, fontWeight:700, color:'var(--purple)' }}>R${ticketMedio.toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>

      {/* Sub-tabs */}
      <div style={{ display:'flex', gap:8, marginBottom:16, flexWrap:'wrap' }}>
        {['tabela','relatorios'].map(t=>(
          <button key={t} onClick={()=>setSubTab(t)} style={{ ...S.btn, height:34, fontSize:12, background:subTab===t?'rgba(204,20,20,.15)':'var(--surface)', border:`1px solid ${subTab===t?'var(--red)':'var(--border)'}`, color:subTab===t?'#fff':'var(--dim)' }}>
            {t==='tabela'?'📋 Itens':'📊 Relatórios'}
          </button>
        ))}
        {subTab==='tabela' && ['todos','estoque','vendido'].map(s=>(
          <button key={s} onClick={()=>setFiltroStatus(s)} style={{ ...S.btn, height:34, fontSize:12, background:filtroStatus===s?'rgba(123,0,255,.15)':'var(--surface)', border:`1px solid ${filtroStatus===s?'var(--purple)':'var(--border)'}`, color:filtroStatus===s?'var(--purple)':'var(--dim)' }}>
            {s==='todos'?'Todos':s==='estoque'?'📦 Estoque':'✅ Vendidos'}
          </button>
        ))}
        {subTab==='tabela' && <div style={{ marginLeft:'auto', fontSize:12, color:'var(--muted)', alignSelf:'center', fontFamily:'Share Tech Mono, monospace' }}>{filtrados.length} itens</div>}
      </div>

      {/* TABELA */}
      {subTab==='tabela' && (loading
        ? <div style={{ textAlign:'center', padding:40, color:'var(--muted)', fontFamily:'Share Tech Mono, monospace', fontSize:12 }}>Carregando...</div>
        : <div style={{ ...S.card, padding:0, overflow:'hidden' }}>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', borderCollapse:'collapse', minWidth:900 }}>
                <thead>
                  <tr style={{ background:'var(--bg3)' }}>
                    {['Produto','Console','Origem','Compra','Venda','Lucro','Margem','Status','Dias','Ações'].map(h=>(
                      <th key={h} style={{ padding:'10px 14px', textAlign:'left', fontFamily:'Share Tech Mono, monospace', fontSize:10, color:'var(--muted)', letterSpacing:'0.15em', textTransform:'uppercase', whiteSpace:'nowrap' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtrados.length===0 && <tr><td colSpan={10} style={{ padding:'2rem', textAlign:'center', color:'var(--muted)', fontFamily:'Share Tech Mono, monospace', fontSize:13 }}>nenhum item encontrado</td></tr>}
                  {filtrados.map(item => {
                    const lucroItem = item.status==='vendido' ? Number(item.preco_venda||0) - Number(item.preco_compra||0) - Number(item.custo_extra||0) : null;
                    const margemPct = lucroItem!==null && item.preco_compra>0 ? Math.round((lucroItem/(Number(item.preco_compra)+Number(item.custo_extra||0)))*100) : null;
                    const dias = diasNoEstoque(item);
                    const parado = item.status==='estoque' && dias !== null && dias >= 90;
                    const oc = ORIGEM_COLOR[item.origem]||'var(--dim)';
                    return (
                      <tr key={item.id} style={{ borderTop:'1px solid var(--border)', background:parado?'rgba(204,20,20,.04)':'transparent' }}>
                        <td style={{ padding:'10px 14px', fontSize:13, fontWeight:700, color:'var(--text)' }}>
                          {parado && <span title="Parado 90+ dias" style={{marginRight:4}}>🔴</span>}{item.produto}
                        </td>
                        <td style={{ padding:'10px 14px', fontSize:12, color:'var(--dim)' }}>{item.console||'—'}</td>
                        <td style={{ padding:'10px 14px' }}>
                          <span style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, padding:'2px 6px', borderRadius:2, background:'var(--surface2)', color:oc, border:'1px solid var(--border)' }}>
                            {ORIGEM_LABEL[item.origem]||item.origem}
                          </span>
                        </td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:13, color:'var(--red-b)' }}>{item.preco_compra ? 'R$'+Number(item.preco_compra).toLocaleString('pt-BR') : '—'}</td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:13, color:'var(--green)' }}>{item.preco_venda ? 'R$'+Number(item.preco_venda).toLocaleString('pt-BR') : '—'}</td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:13, color:lucroItem===null?'var(--muted)':lucroItem>=0?'var(--gold)':'var(--red-b)' }}>
                          {lucroItem===null ? '—' : (lucroItem>=0?'+':'')+'R$'+lucroItem.toLocaleString('pt-BR')}
                        </td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:12, color:margemPct===null?'var(--muted)':margemPct>=30?'var(--green)':margemPct>=15?'var(--gold)':'var(--red-b)' }}>
                          {margemPct===null ? '—' : margemPct+'%'}
                        </td>
                        <td style={{ padding:'10px 14px' }}>
                          <span style={{ fontFamily:'Share Tech Mono, monospace', fontSize:10, padding:'2px 8px', borderRadius:2, background:item.status==='vendido'?'rgba(37,211,102,.12)':'rgba(255,184,0,.12)', color:item.status==='vendido'?'var(--green)':'var(--gold)', border:`1px solid ${item.status==='vendido'?'rgba(37,211,102,.3)':'rgba(255,184,0,.3)'}`}}>
                            {item.status==='vendido'?'✅ VENDIDO':'📦 ESTOQUE'}
                          </span>
                        </td>
                        <td style={{ padding:'10px 14px', fontFamily:'Share Tech Mono, monospace', fontSize:12, color:parado?'var(--red-b)':'var(--muted)', whiteSpace:'nowrap' }}>
                          {item.status==='estoque' && dias!==null ? dias+'d' : item.data_venda||'—'}
                        </td>
                        <td style={{ padding:'10px 14px' }}>
                          <div style={{ display:'flex', gap:4 }}>
                            <button onClick={()=>setEditando(item)} style={{ ...S.btn, padding:'4px 8px', fontSize:12, background:'var(--surface2)', border:'1px solid var(--border)', color:'var(--dim)' }}>✏</button>
                            {item.status==='estoque' && <button onClick={()=>marcarVendido(item)} style={{ ...S.btn, padding:'4px 8px', fontSize:12, background:'rgba(37,211,102,.1)', border:'1px solid rgba(37,211,102,.3)', color:'var(--green)' }}>✅</button>}
                            <button onClick={()=>deletar(item.id)} style={{ ...S.btn, padding:'4px 8px', fontSize:12, background:'rgba(204,20,20,.1)', border:'1px solid var(--border-r)', color:'var(--red-b)' }}>🗑</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
      )}

      {/* RELATÓRIOS */}
      {subTab==='relatorios' && (
        <div>
          {/* Gráfico de lucro últimos 6 meses */}
          <div style={{ ...S.card, marginBottom:16 }}>
            <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--dim)', letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:16 }}>// Lucro — últimos 6 meses</div>
            <div style={{ display:'flex', alignItems:'flex-end', gap:8, height:120 }}>
              {dadosMeses.map(d=>{
                const h = Math.round((Math.abs(d.lucro)/maxLucro)*100);
                const positivo = d.lucro >= 0;
                const atual = d.mes === new Date().toISOString().slice(0,7);
                return (
                  <div key={d.mes} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                    <div style={{ fontSize:10, fontFamily:'Share Tech Mono, monospace', color:positivo?'var(--gold)':'var(--red-b)' }}>{d.lucro!==0?(positivo?'+':'')+'R$'+Math.abs(Math.round(d.lucro)).toLocaleString('pt-BR'):''}</div>
                    <div style={{ width:'100%', height:h+'%', background:positivo?'var(--gold)':'var(--red-b)', borderRadius:'3px 3px 0 0', opacity:atual?1:0.6, minHeight:4 }}/>
                    <div style={{ fontSize:10, color:atual?'var(--text)':'var(--muted)', fontFamily:'Share Tech Mono, monospace' }}>{d.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Ranking por console */}
          <div style={{ ...S.card }}>
            <div style={{ fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--dim)', letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:16 }}>// Ranking — console mais lucrativo</div>
            {rankConsole.length===0
              ? <div style={{ fontSize:13, color:'var(--muted)', textAlign:'center', padding:20 }}>Sem vendas registradas ainda.</div>
              : rankConsole.map(([console, dados], i) => (
                <div key={console} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                  <div style={{ width:20, fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--muted)' }}>#{i+1}</div>
                  <div style={{ width:120, fontSize:13, color:'var(--text)', fontWeight:i===0?700:400 }}>{console}</div>
                  <div style={{ flex:1, height:8, background:'var(--bg3)', borderRadius:4, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:Math.round((dados.lucro/maxRank)*100)+'%', background:i===0?'var(--gold)':'var(--purple)', borderRadius:4 }}/>
                  </div>
                  <div style={{ width:100, textAlign:'right', fontFamily:'Share Tech Mono, monospace', fontSize:12, color:'var(--gold)' }}>+R${Math.round(dados.lucro).toLocaleString('pt-BR')}</div>
                  <div style={{ width:50, textAlign:'right', fontFamily:'Share Tech Mono, monospace', fontSize:11, color:'var(--muted)' }}>{dados.qtd} vnd</div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* Modal */}
      {editando && (
        <FinanceiroModal
          editando={editando}
          setEditando={setEditando}
          salvar={salvar}
          saving={saving}
          ORIGENS={ORIGENS}
          ORIGEM_LABEL={ORIGEM_LABEL}
          CONSOLES_FIN={CONSOLES_FIN}
          FORMAS_PAG={FORMAS_PAG}
          FORMA_LABEL={FORMA_LABEL}
        />
      )}

    </div>
  );
};

    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();

      hermesGet('/health'),
      hermesGet('/health/extended'),
      hermesGet('/capabilities'),
      hermesGet('/v1/models'),
      hermesGet('/api/dashboard/status'),
      hermesGet('/api/dashboard/sessions'),
      hermesGet('/api/jobs'),

        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${HERMES_KEY}` },
        body: JSON.stringify({ model: 'hermes-agent', messages: [{ role: 'user', content: msg }] }),
        signal: AbortSignal.timeout(60000)

      const d = await r.json();
      const reply = d?.choices?.[0]?.message?.content || '(sem resposta)';
      setHermesChat(c => [...c, { role: 'assistant', content: reply }]);

                    {m.content}

                </div>
              ))}
              {hermesLoading && (
                <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgba(0,255,255,.15)', border: '1px solid rgba(0,255,255,.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>🤖</div>

// ── HermesPage ───────────────────────────────────────────────
const HermesPage = () => {
  const [tab, setTab]             = React.useState('espera');
  const [espera, setEspera]       = React.useState([]);
  const [conversas, setConversas] = React.useState([]);
  const [blacklist, setBlacklist] = React.useState([]);
  const [loading, setLoading]     = React.useState(true);
  const [toast, setToast]         = React.useState('');
  const [novoBlack, setNovoBlack] = React.useState({ phone:'', motivo:'' });

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const load = async () => {
    setLoading(true);
    try {
      const [e, c, b] = await Promise.all([
        supa('lista_espera?order=created_at.desc&limit=100'),
        supa('conversas_ativas?order=ultima_mensagem_at.desc&limit=100'),
        supa('blacklist?order=created_at.desc'),
      ]);
      setEspera(e||[]);
      setConversas(c||[]);
      setBlacklist(b||[]);
    } catch(err) { showToast('✕ Erro ao carregar: '+err.message); }
    setLoading(false);
  };

  React.useEffect(()=>{ load(); }, []);

  const removerEspera = async (id) => {
    await supa(`lista_espera?id=eq.${id}`, { method:'DELETE' });
    showToast('✅ Removido da lista de espera');
    load();
  };

  const marcarConverteu = async (id) => {
    await supa(`conversas_ativas?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({ converteu: true }) });
    showToast('✅ Marcado como convertido');
    load();
  };

  const addBlacklist = async () => {
    if (!novoBlack.phone) { showToast('✕ Informe o número'); return; }
    const phone = novoBlack.phone.replace(/\D/g,'');
    await supa('blacklist', { method:'POST', body: JSON.stringify({ phone, motivo: novoBlack.motivo, ativo: true }) });
    showToast('✅ Número bloqueado');
    setNovoBlack({ phone:'', motivo:'' });
    load();
  };

  const toggleBlacklist = async (id, ativo) => {
    await supa(`blacklist?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({ ativo: !ativo }) });
    showToast(ativo ? '⚠️ Desbloqueado' : '🚫 Bloqueado');
    load();
  };

  const TABS = [
    { id:'espera',    label:'Lista de Espera',   icon:'⏳' },
    { id:'conversas', label:'Conversas Ativas',  icon:'💬' },
    { id:'blacklist', label:'Blacklist',          icon:'🚫' },
  ];

  if (loading) return <div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Carregando...</div>;

  return (
    <div>
      {toast && <div style={{position:'fixed',top:20,right:20,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'12px 20px',zIndex:999,fontFamily:'Share Tech Mono, monospace',fontSize:13,color:'var(--text)',animation:'slideIn .2s ease'}}>{toast}</div>}

      <div style={{marginBottom:20}}>
        <div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>🦇 Hermes Bot</div>
        <div style={{fontSize:14,color:'var(--muted)'}}>Lista de espera · Conversas · Blacklist</div>
      </div>

      {/* Stats */}
      <div className="ng-grid4" style={{...S.grid4, marginBottom:20}}>
        <StatCard label="Aguardando produto" value={espera.filter(e=>!e.notificado).length} sub={`${espera.length} total`} color="var(--gold)" icon="⏳"/>
        <StatCard label="Notificados" value={espera.filter(e=>e.notificado).length} sub="receberam aviso" color="var(--green)" icon="✅"/>
        <StatCard label="Conversas ativas" value={conversas.filter(c=>!c.converteu&&!c.follow_up_enviado).length} sub="sem follow-up" color="var(--purple)" icon="💬"/>
        <StatCard label="Bloqueados" value={blacklist.filter(b=>b.ativo).length} sub="na blacklist" color="var(--red-b)" icon="🚫"/>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.btn,background:tab===t.id?'rgba(204,20,20,.15)':'var(--surface)',border:`1px solid ${tab===t.id?'rgba(204,20,20,.4)':'var(--border)'}`,color:tab===t.id?'var(--red-b)':'var(--dim)',fontSize:13}}>
            {t.icon} {t.label}
          </button>
        ))}
        <button onClick={load} style={{...S.btn,background:'var(--surface)',border:'1px solid var(--border)',color:'var(--dim)',fontSize:13,marginLeft:'auto'}}>↻ Atualizar</button>
      </div>

      {/* Lista de Espera */}
      {tab==='espera' && (
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// CLIENTES AGUARDANDO PRODUTO</div>
          {espera.length===0
            ? <div style={{fontSize:14,color:'var(--muted)',textAlign:'center',padding:24}}>Nenhum cliente na lista de espera</div>
            : espera.map(e=>(
              <div key={e.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontSize:15,fontWeight:700,color:e.notificado?'var(--muted)':'var(--text)'}}>{e.cliente_name||'Desconhecido'}</div>
                  <div style={{fontSize:13,color:'var(--dim)'}}>📱 {e.phone} · 🎮 <strong>{e.termo_buscado}</strong>{e.console?' ('+e.console+')':''}</div>
                  <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{fmtDateFull(e.created_at)}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  {e.notificado
                    ? <MonoTag color="var(--green)" bg="rgba(37,211,102,.1)">✅ Notificado</MonoTag>
                    : <MonoTag color="var(--gold)" bg="rgba(255,184,0,.1)">⏳ Aguardando</MonoTag>}
                  <Btn color="danger" onClick={()=>removerEspera(e.id)} style={{fontSize:12,padding:'4px 10px'}}>✕</Btn>
                </div>
              </div>
            ))}
        </div>
      )}

      {/* Conversas Ativas */}
      {tab==='conversas' && (
        <div style={S.card}>
          <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// CONVERSAS EM ANDAMENTO</div>
          {conversas.length===0
            ? <div style={{fontSize:14,color:'var(--muted)',textAlign:'center',padding:24}}>Nenhuma conversa registrada</div>
            : conversas.map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontSize:15,fontWeight:700,color:c.converteu?'var(--muted)':'var(--text)'}}>{c.cliente_name||'Desconhecido'}</div>
                  <div style={{fontSize:13,color:'var(--dim)'}}>📱 {c.phone}{c.ultimo_interesse?' · 🎮 '+c.ultimo_interesse:''}{c.console?' ('+c.console+')':''}</div>
                  <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>Última msg: {fmtDateFull(c.ultima_mensagem_at)}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  {c.converteu && <MonoTag color="var(--green)" bg="rgba(37,211,102,.1)">✅ Converteu</MonoTag>}
                  {c.follow_up_enviado && !c.converteu && <MonoTag color="var(--purple)" bg="rgba(168,85,247,.1)">📤 Follow-up enviado</MonoTag>}
                  {!c.converteu && !c.follow_up_enviado && <MonoTag color="var(--gold)" bg="rgba(255,184,0,.1)">⏳ Ativo</MonoTag>}
                  {!c.converteu && <Btn color="green" onClick={()=>marcarConverteu(c.id)} style={{fontSize:12,padding:'4px 10px'}}>✅ Converteu</Btn>}
                </div>
              </div>
            ))}
        </div>
      )}

      {/* Blacklist */}
      {tab==='blacklist' && (
        <div>
          <div style={{...S.card, marginBottom:16}}>
            <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// ADICIONAR À BLACKLIST</div>
            <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:180}}>
                <label style={S.label}>Número (somente dígitos)</label>
                <input value={novoBlack.phone} onChange={e=>setNovoBlack(p=>({...p,phone:e.target.value}))} placeholder="5551999887766" style={S.input}/>
              </div>
              <div style={{flex:2,minWidth:180}}>
                <label style={S.label}>Motivo</label>
                <input value={novoBlack.motivo} onChange={e=>setNovoBlack(p=>({...p,motivo:e.target.value}))} placeholder="Ex: não compra, só enrola..." style={S.input}/>
              </div>
              <div style={{display:'flex',alignItems:'flex-end'}}>
                <Btn color="danger" onClick={addBlacklist}>🚫 Bloquear</Btn>
              </div>
            </div>
          </div>
          <div style={S.card}>
            <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.2em',marginBottom:16}}>// NÚMEROS BLOQUEADOS</div>
            {blacklist.length===0
              ? <div style={{fontSize:14,color:'var(--muted)',textAlign:'center',padding:24}}>Nenhum número bloqueado</div>
              : blacklist.map(b=>(
                <div key={b.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:b.ativo?'var(--red-b)':'var(--muted)'}}>{b.phone}</div>
                    {b.motivo && <div style={{fontSize:13,color:'var(--dim)'}}>{b.motivo}</div>}
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{fmtDateFull(b.created_at)}</div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    {b.ativo ? <MonoTag color="var(--red-b)" bg="rgba(204,20,20,.1)">🚫 Bloqueado</MonoTag> : <MonoTag color="var(--muted)" bg="var(--surface2)">Inativo</MonoTag>}
                    <Btn color={b.ativo?'ghost':'danger'} onClick={()=>toggleBlacklist(b.id,b.ativo)} style={{fontSize:12,padding:'4px 10px'}}>{b.ativo?'Desbloquear':'Bloquear'}</Btn>
                  </div>
                </div>
              ))}
          </div>
        </div>
      )}
    </div>
  );
};



// ── CuponsPage ────────────────────────────────────────────────
const CuponsPage = () => {
  const [cupons, setCupons]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [editando, setEditando] = useState(null);
  const [saving, setSaving]     = useState(false);
  const [toast, setToast]       = useState('');
  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(''),3000); };
  const EMPTY = { codigo:'', desconto_pct:10, desconto_fixo:0, ativo:true, usos_max:100, validade:'', descricao:'' };

  const carregar = async () => {
    setLoading(true);
    try { setCupons(await supa('cupons?order=created_at.desc') || []); }
    catch(e){ console.error(e); } finally { setLoading(false); }
  };
  useEffect(()=>{ carregar(); },[]);

  const salvar = async () => {
    if (!editando.codigo.trim()) { showToast('✕ Código obrigatório'); return; }
    setSaving(true);
    try {
      const { id, ...dados } = editando;
      dados.codigo = dados.codigo.toUpperCase().trim();
      dados.desconto_pct = Number(dados.desconto_pct||0);
      dados.desconto_fixo = Number(dados.desconto_fixo||0);
      dados.usos_max = Number(dados.usos_max||100);
      if (id) await supa(`cupons?id=eq.${id}`, { method:'PATCH', body: JSON.stringify(dados) });
      else    await supa('cupons', { method:'POST', body: JSON.stringify(dados) });
      setEditando(null); showToast('✔ Salvo!'); carregar();
    } catch(e){ showToast('✕ '+e.message); } finally { setSaving(false); }
  };

  const toggleAtivo = async (c) => {
    await supa(`cupons?id=eq.${c.id}`, { method:'PATCH', body: JSON.stringify({ ativo: !c.ativo }) });
    carregar();
  };

  const deletar = async (id) => {
    if (!confirm('Excluir cupom?')) return;
    await supa(`cupons?id=eq.${id}`, { method:'DELETE' });
    carregar();
  };

  return (
    <div>
      {toast && <div style={{position:'fixed',top:70,right:24,zIndex:2000,background:'var(--surface2)',border:'1px solid var(--border)',padding:'10px 18px',borderRadius:4,fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--text)'}}>{toast}</div>}
      <div style={{marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>

// ── UploadCSVPage ─────────────────────────────────────────────
const UploadCSVPage = () => {
  const [preview, setPreview]   = useState([]);
  const [uploading, setUploading] = useState(false);
  const [resultado, setResultado] = useState(null);
  const [toast, setToast]         = useState('');
  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(''),4000); };

  const COLUNAS = ['nome','preco','console','condicao','descricao','imagem_url'];

  const lerCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split('\n').filter(l=>l.trim());
      const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/["\']/g,''));
      const rows = lines.slice(1).map(line=>{
        const vals = line.split(',').map(v=>v.trim().replace(/^["\']|["\']$/g,''));
        const obj = {};
        headers.forEach((h,i)=>{ obj[h] = vals[i]||''; });
        return obj;
      }).filter(r=>r.nome);
      setPreview(rows);
      setResultado(null);
    };
    reader.readAsText(file, 'UTF-8');
  };

  const importar = async () => {
    if (preview.length===0) return;
    setUploading(true);
    let ok=0, erros=0;
    for (const row of preview) {
      try {
        const prod = {
          nome: row.nome||'Sem nome',
          preco: row.preco ? Number(row.preco.replace(',','.')) : null,
          console: row.console||'Outro',
          condicao: row.condicao||'Usado',
          descricao: row.descricao||'',
          imagem_url: row.imagem_url||'',
          ativo: true,
          vendido: false,
          destaque: false,
        };
        await supa('produtos', { method:'POST', body: JSON.stringify(prod) });
        ok++;
      } catch(e){ erros++; }
    }
    setResultado({ ok, erros });
    setUploading(false);
    if (ok>0) showToast('✔ '+ok+' produtos importados!');
  };

  const baixarTemplate = () => {
    const csv = COLUNAS.join(',')+'\n'+
      'PS4 Slim 500GB,850,PS4 Slim,Usado,Ótimo estado sem arranhões,'+ '\n'+
      'Nintendo Switch OLED,1500,Switch OLED,Seminovo,Na caixa com todos os acessórios,';
    const blob = new Blob([csv], { type:'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'template_produtos_nosferatu.csv';
    a.click();
  };

  return (
    <div>
      {toast && <div style={{position:'fixed',top:70,right:24,zIndex:2000,background:'var(--surface2)',border:'1px solid var(--border)',padding:'10px 18px',borderRadius:4,fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--text)'}}>{toast}</div>}
      <div style={{marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div><div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Upload em Massa</div><div style={{fontSize:14,color:'var(--muted)'}}>Importe vários produtos via CSV</div></div>
        <Btn color="ghost" onClick={baixarTemplate}>⬇ Baixar Template</Btn>
      </div>
      <div style={{...S.card,marginBottom:16}}>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:12}}>// Colunas do CSV</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {COLUNAS.map(c=><span key={c} style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,padding:'3px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--purple)'}}>{c}</span>)}
        </div>
        <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',border:'2px dashed var(--border)',borderRadius:6,padding:'20px',justifyContent:'center'}}>
          <span style={{fontSize:24}}>📂</span>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>Selecionar arquivo CSV</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>Clique ou arraste o arquivo aqui</div>
          </div>
          <input type="file" accept=".csv" onChange={lerCSV} style={{display:'none'}} />
        </label>
      </div>

      {preview.length > 0 && (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:14,color:'var(--text)'}}>{preview.length} produto{preview.length>1?'s':''} encontrado{preview.length>1?'s':''} no arquivo</div>
            <Btn onClick={importar} disabled={uploading}>{uploading?'Importando...':'⬆ Importar todos'}</Btn>
          </div>
          {resultado && (
            <div style={{...S.card,marginBottom:12,borderTop:'3px solid '+(resultado.erros===0?'var(--green)':'var(--gold)')}}>
              <div style={{fontSize:14,color:resultado.erros===0?'var(--green)':'var(--gold)'}}>{resultado.ok>0?'✔ '+resultado.ok+' importados':''} {resultado.erros>0?'✕ '+resultado.erros+' erros':''}</div>
            </div>
          )}
          <div style={{...S.card,padding:0,overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',minWidth:500}}>
                <thead><tr style={{background:'var(--bg3)'}}>{['Nome','Console','Preço','Condição'].map(h=>(
                  <th key={h} style={{padding:'8px 12px',textAlign:'left',fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--muted)',letterSpacing:'0.1em',textTransform:'uppercase'}}>{h}</th>
                ))}</tr></thead>
                <tbody>
                  {preview.slice(0,20).map((r,i)=>(
                    <tr key={i} style={{borderTop:'1px solid var(--border)'}}>
                      <td style={{padding:'8px 12px',fontSize:13,color:'var(--text)'}}>{r.nome}</td>
                      <td style={{padding:'8px 12px',fontSize:12,color:'var(--dim)'}}>{r.console||'—'}</td>
                      <td style={{padding:'8px 12px',fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--gold)'}}>{r.preco?'R$'+r.preco:'—'}</td>
                      <td style={{padding:'8px 12px',fontSize:12,color:'var(--dim)'}}>{r.condicao||'—'}</td>
                    </tr>
                  ))}
                  {preview.length>20 && <tr><td colSpan={4} style={{padding:'8px 12px',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:11}}>... e mais {preview.length-20} produtos</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

                    <td style={{padding:'10px 14px',fontSize:14,fontWeight:700,color:'var(--text)'}}>{c.nome||'—'}</td>
                    <td style={{padding:'10px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--green)'}}>{c.whatsapp||'—'}</td>
                    <td style={{padding:'10px 14px',fontSize:12,color:'var(--dim)'}}>{c.email||'—'}</td>
                    <td style={{padding:'10px 14px',fontSize:12,color:'var(--dim)'}}>{c.cidade||'—'}</td>
                    <td style={{padding:'10px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)'}}>{c.created_at?new Date(c.created_at).toLocaleDateString('pt-BR'):'—'}</td>
                    <td style={{padding:'10px 14px'}}>
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>abrirCliente(c)} style={{...S.btn,padding:'4px 10px',fontSize:12,background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--dim)'}}>👁 Ver</button>
                        {c.whatsapp && <a href={'https://wa.me/55'+c.whatsapp.replace(/\D/g,'')} target="_blank" style={{...S.btn,padding:'4px 10px',fontSize:12,background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.3)',color:'var(--green)',textDecoration:'none'}}>💬</a>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Modal cliente */}
      {selecionado && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,width:'100%',maxWidth:500,maxHeight:'85vh',overflow:'auto',padding:24,position:'relative'}}>
            <button onClick={()=>setSelecionado(null)} style={{position:'absolute',top:14,right:14,background:'none',border:'none',color:'var(--dim)',fontSize:20,cursor:'pointer'}}>✕</button>
            <div style={{fontFamily:'Press Start 2P, monospace',fontSize:11,color:'var(--text)',marginBottom:16}}>CLIENTE</div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:4}}>{selecionado.nome||'Sem nome'}</div>
              {selecionado.whatsapp && <div style={{fontSize:13,color:'var(--green)',marginBottom:2}}>📱 {selecionado.whatsapp}</div>}
              {selecionado.email    && <div style={{fontSize:13,color:'var(--dim)',marginBottom:2}}>✉ {selecionado.email}</div>}
              {selecionado.cidade   && <div style={{fontSize:13,color:'var(--dim)'}}>📍 {selecionado.cidade}{selecionado.estado?', '+selecionado.estado:''}</div>}
            </div>
            <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--dim)',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:12}}>// Pedidos</div>
            {finCliente.length===0
              ? <div style={{fontSize:13,color:'var(--muted)',padding:'16px 0'}}>Nenhum pedido encontrado</div>
              : finCliente.map((p,i)=>(
                <div key={p.id||i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
                  <div><div style={{color:'var(--text)',fontWeight:600}}>{p.itens?JSON.stringify(p.itens).slice(0,40):'Pedido'}</div><div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{p.created_at?new Date(p.created_at).toLocaleDateString('pt-BR'):''}</div></div>
                  <div style={{color:'var(--gold)',fontFamily:'Share Tech Mono, monospace'}}>R${Number(p.total||0).toLocaleString('pt-BR')}</div>
                </div>
              ))}
            {selecionado.whatsapp && (
              <a href={'https://wa.me/55'+selecionado.whatsapp.replace(/\D/g,'')} target="_blank" style={{...S.btn,display:'flex',justifyContent:'center',marginTop:16,background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.3)',color:'var(--green)',textDecoration:'none',padding:'10px'}}>💬 Abrir WhatsApp</a>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

// ── BuscaGlobal ───────────────────────────────────────────────
const BuscaGlobal = ({produtos, setTab, fechar}) => {
  const [q, setQ]             = useState('');
  const [resultados, setRes]  = useState([]);
  const [loading, setLoading] = useState(false);
  const inputRef = useRef();

  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),50); },[]);

  useEffect(()=>{
    if (q.length < 2) { setRes([]); return; }
    setLoading(true);
    const t = setTimeout(async ()=>{
      try {
        const [prods, fins, peds] = await Promise.all([
          supa('produtos?select=id,nome,console,preco,vendido&order=nome.asc&limit=10&nome=ilike.*'+encodeURIComponent(q)+'*'),
          supa('financeiro?select=id,produto,preco_venda,status&order=data_compra.desc&limit=10&produto=ilike.*'+encodeURIComponent(q)+'*'),
          supa('pedidos?select=id,status,total,created_at&order=created_at.desc&limit=5'),
        ]);
        const r = [
          ...(prods||[]).map(p=>({tipo:'produto',label:p.nome,sub:(p.console||'')+(p.vendido?' · VENDIDO':''),valor:p.preco?'R$'+Number(p.preco).toLocaleString('pt-BR'):'',acao:()=>{setTab('produtos');fechar();}})),
          ...(fins||[]).map(f=>({tipo:'financeiro',label:f.produto,sub:f.status==='vendido'?'Vendido':'Em estoque',valor:f.preco_venda?'R$'+Number(f.preco_venda).toLocaleString('pt-BR'):'',acao:()=>{setTab('financeiro');fechar();}})),
        ];
        setRes(r);
      } catch(e){ console.error(e); }
      finally { setLoading(false); }
    }, 300);
    return ()=>clearTimeout(t);
  },[q]);

  const TIPO_COLOR = {produto:'var(--purple)',financeiro:'var(--gold)',pedido:'var(--green)'};
  const TIPO_ICON  = {produto:'🗡️',financeiro:'💰',pedido:'💳'};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:2000,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'80px 16px 16px'}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,width:'100%',maxWidth:560}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <span style={{fontSize:18,color:'var(--muted)'}}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar produto, venda, pedido..." style={{...S.input,flex:1,border:'none',background:'transparent',fontSize:15,outline:'none'}}/>
          <button onClick={fechar} style={{background:'none',border:'none',color:'var(--dim)',fontSize:18,cursor:'pointer'}}>✕</button>
        </div>
        {loading && <div style={{padding:'16px',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:12}}>buscando...</div>}
        {!loading && q.length>=2 && resultados.length===0 && <div style={{padding:'16px',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:12}}>nenhum resultado</div>}
        {resultados.map((r,i)=>(
          <div key={i} onClick={r.acao} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'background .15s'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <span style={{fontSize:18}}>{TIPO_ICON[r.tipo]}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{r.label}</div>
              <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>{r.sub}</div>
            </div>
            <div style={{fontSize:12,color:TIPO_COLOR[r.tipo],fontFamily:'Share Tech Mono, monospace'}}>{r.valor}</div>
            <span style={{fontSize:10,background:'var(--bg3)',color:'var(--muted)',padding:'2px 6px',borderRadius:3,fontFamily:'Share Tech Mono, monospace'}}>{r.tipo}</span>
          </div>
        ))}
        <div style={{padding:'8px 16px',fontSize:11,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace'}}>ESC para fechar</div>
      </div>
    </div>
  );
};

// ── LogPage ───────────────────────────────────────────────────
const LogPage = () => {
  const [logs, setLogs]   = useState([]);
  const [loading, setLoading] = useState(true);

  const carregar = async () => {
    setLoading(true);
    try { setLogs(await supa('admin_log?order=created_at.desc&limit=200')||[]); }
    catch(e){ console.error(e); }
    finally { setLoading(false); }
  };

  useEffect(()=>{ carregar(); },[]);

  const ACAO_COLOR = {criar:'var(--green)',editar:'var(--gold)',excluir:'var(--red-b)',vender:'var(--purple)'};

  return (
    <div>
      <div style={{marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontFamily:'Press Start 2P, monospace',fontSize:14,color:'var(--text)',marginBottom:4}}>Log de Atividades</div><div style={{fontSize:14,color:'var(--muted)'}}>Histórico de alterações</div></div>
        <Btn color="ghost" onClick={carregar}>↻ Atualizar</Btn>
      </div>
      {loading ? <div style={{textAlign:'center',padding:40,color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:12}}>Carregando...</div> : (
        <div style={{...S.card,padding:0,overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:'var(--bg3)'}}>
                {['Quando','Ação','Tabela','Detalhe'].map(h=>(
                  <th key={h} style={{padding:'10px 14px',textAlign:'left',fontFamily:'Share Tech Mono, monospace',fontSize:10,color:'var(--muted)',letterSpacing:'0.15em',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {logs.length===0 && <tr><td colSpan={4} style={{padding:'2rem',textAlign:'center',color:'var(--muted)',fontFamily:'Share Tech Mono, monospace',fontSize:13}}>nenhuma atividade registrada</td></tr>}
                {logs.map((l,i)=>(
                  <tr key={l.id||i} style={{borderTop:'1px solid var(--border)'}}>
                    <td style={{padding:'8px 14px',fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)',whiteSpace:'nowrap'}}>{l.created_at?new Date(l.created_at).toLocaleString('pt-BR'):'—'}</td>
                    <td style={{padding:'8px 14px'}}><span style={{fontFamily:'Share Tech Mono, monospace',fontSize:11,padding:'2px 8px',borderRadius:3,background:'var(--bg3)',color:ACAO_COLOR[l.acao]||'var(--dim)',border:'1px solid var(--border)'}}>{l.acao}</span></td>
                    <td style={{padding:'8px 14px',fontSize:12,color:'var(--dim)'}}>{l.tabela||'—'}</td>
                    <td style={{padding:'8px 14px',fontSize:12,color:'var(--text)',maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.detalhe||'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
};

const NAV = [
  { id:'dashboard',  label:'Dashboard',   icon:'🏰' },
  { id:'produtos',   label:'Produtos',    icon:'🗡️' },
  { id:'pedidos',    label:'Pedidos',     icon:'💳' },
  { id:'clientes',   label:'Clientes',    icon:'👥' },
  { id:'financeiro', label:'Financeiro',  icon:'💰' },
  { id:'rastreios',  label:'Rastreios',   icon:'📦' },
  { id:'cupons',     label:'Cupons',      icon:'🏷️' },
  { id:'csv',        label:'Import CSV',  icon:'📂' },
  { id:'garimpo',    label:'Garimpo',     icon:'🎮' },
  { id:'hermes',     label:'Hermes Bot',  icon:'🦇' },
  { id:'analytics',  label:'Analytics',   icon:'🧛' },
  { id:'infra',      label:'Infra',       icon:'🖥️' },
  { id:'log',        label:'Atividades',  icon:'📋' },
  { id:'config',     label:'Config',      icon:'⚙️' },
];

const App = () => {
  const [auth,setAuth]       = useState(!!sessionStorage.getItem('ng_admin_token'));
  const [tab,setTab]         = useState('dashboard');
  const [produtos,setProdutos] = useState([]);
  const [visitas,setVisitas]   = useState([]);
  const [loading,setLoading]   = useState(true);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const [buscaAberta,setBuscaAberta] = useState(false);

  useEffect(()=>{
    const handler = (e) => {
      if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); setBuscaAberta(b=>!b); }
      if (e.key==='Escape') setBuscaAberta(false);
    };
    window.addEventListener('keydown', handler);
    return ()=>window.removeEventListener('keydown', handler);
  },[]);

  const loadProdutos = useCallback(async () => {
    try { setProdutos(await supa('produtos?order=created_at.desc&limit=200')||[]); } catch(e){ console.error(e); }
  },[]);
  const loadVisitas = useCallback(async () => {
    try { setVisitas(await supa('visitas?order=created_at.desc&limit=500')||[]); } catch {}
  },[]);

  useEffect(()=>{
    if (!auth) return;
    Promise.all([loadProdutos(), loadVisitas()]).finally(()=>setLoading(false));
    const t = setInterval(()=>{ loadProdutos(); loadVisitas(); }, 30000);
    return ()=>clearInterval(t);
  },[auth]);

  const logout = () => { sessionStorage.removeItem('ng_admin_token'); setAuth(false); };

  if (!auth) return <Login onLogin={()=>setAuth(true)} />;

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:40,height:40,border:'3px solid var(--border)',borderTopColor:'var(--red-b)',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}}/>
        <div style={{fontFamily:'Share Tech Mono, monospace',fontSize:12,color:'var(--muted)'}}>carregando...</div>
      </div>
    </div>
  );

  const closeNav = () => setSidebarOpen(false);

  return (
    <div style={S.layout}>
      {/* Mobile overlay */}
      {sidebarOpen && <div className="ng-overlay" onClick={closeNav} />}

      {/* Sidebar */}
      <div className={`ng-sidebar${sidebarOpen?' open':''}`} style={S.sidebar}>
        <div style={{padding:'20px 16px 16px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontFamily:'Press Start 2P, monospace',fontSize:9,color:'var(--red-b)',lineHeight:1.8,textShadow:'0 0 10px rgba(204,20,20,.5)'}}>🏰 NOSFERATU</div>
          <div style={{fontFamily:'Rajdhani, sans-serif',fontSize:10,color:'var(--gold)',letterSpacing:'0.2em'}}>ADMIN PANEL</div>
        </div>
        <nav style={{flex:1,padding:12,display:'flex',flexDirection:'column',gap:4}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>{setTab(n.id);closeNav();}} style={{...S.btn,justifyContent:'flex-start',padding:'10px 12px',background:tab===n.id?'rgba(204,20,20,.15)':'transparent',border:`1px solid ${tab===n.id?'rgba(204,20,20,.3)':'transparent'}`,color:tab===n.id?'var(--red-b)':'var(--dim)',borderRadius:4,fontSize:14}}>
              <span>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:12,borderTop:'1px solid var(--border)'}}>
          <a href="index.html" target="_blank" style={{...S.btn,justifyContent:'center',width:'100%',background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.3)',color:'var(--green)',textDecoration:'none',marginBottom:6,fontSize:13}}>↗ Ver site</a>
          <button onClick={logout} style={{...S.btn,justifyContent:'center',width:'100%',background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',fontSize:13}}>Sair</button>
        </div>
      </div>

      {/* Main */}
      <div className="ng-main" style={S.main}>
        <div style={S.topbar}>
          <button className="ng-hamburger" onClick={()=>setSidebarOpen(s=>!s)}>☰</button>
          <div className="ng-topbar-date" style={{flex:1,fontFamily:'Share Tech Mono, monospace',fontSize:11,color:'var(--muted)'}}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</div>
          <button onClick={()=>setBuscaAberta(true)} style={{...S.btn,padding:'5px 12px',fontSize:12,background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',gap:6}}>🔍 <span style={{fontFamily:'Share Tech Mono, monospace',fontSize:10}}>Ctrl+K</span></button>
          <div style={{fontSize:12,color:'var(--dim)',textAlign:'right'}}>
            <span style={{color:'#4ade80',fontSize:10}}>●</span> {produtos.filter(p=>p.ativo!==false&&!p.vendido).length} ativos · {visitas.filter(v=>new Date(v.created_at).toDateString()===new Date().toDateString()).length} visitas hoje
          </div>
        </div>
        <div className="ng-content" style={S.content}>
          {tab==='dashboard' && <Dashboard produtos={produtos} visitas={visitas} />}
          {tab==='produtos'  && <ProductsPage produtos={produtos} reload={loadProdutos} />}
          {tab==='pedidos'   && <PedidosPage />}
          {tab==='clientes'  && <ClientesPage />}
          {tab==='rastreios' && <RastreiosPage />}
          {tab==='cupons'    && <CuponsPage />}
          {tab==='csv'       && <UploadCSVPage />}
          {tab==='garimpo'   && <GarimpoPage />}
          {tab==='hermes'    && <HermesPage />}
          {tab==='analytics' && <Analytics visitas={visitas} />}
          {tab==='infra'     && <InfraPage />}
          {tab==='financeiro' && <FinanceiroPage />}
          {tab==='log'       && <LogPage />}
          {tab==='config'    && <Config />}
          {buscaAberta && <BuscaGlobal produtos={produtos} setTab={setTab} fechar={()=>setBuscaAberta(false)} />}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
