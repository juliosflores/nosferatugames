server {
    listen 443 ssl;
    server_name n8n.nosferatugames.com.br;

    ssl_certificate /etc/letsencrypt/live/n8n.nosferatugames.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.nosferatugames.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors https://nosferatugames.vercel.app https://nosferatugames.com.br https://juliosflores.github.io *";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    }
}

server {
    listen 443 ssl;
    server_name hermes.nosferatugames.com.br;

    # CORRIGIDO: certificado próprio do hermes
    # Se ainda não tem, rode: certbot --nginx -d hermes.nosferatugames.com.br
    ssl_certificate /etc/letsencrypt/live/hermes.nosferatugames.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hermes.nosferatugames.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Permite uploads de fotos grandes (base64 ~35MB)
    client_max_body_size 50M;

    location /atualizar-token {
        proxy_pass http://localhost:5009/atualizar-token;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Admin-Key" always;
    }

    location /status-token {
        proxy_pass http://localhost:5009/status-token;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /chat2api/ {
        proxy_pass http://localhost:5007/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    }

    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
            add_header Access-Control-Max-Age "86400";
            add_header Content-Length "0";
            return 204;
        }
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "*" always;
    }
}

server {
    listen 80;
    server_name n8n.nosferatugames.com.br hermes.nosferatugames.com.br;
    return 301 https://$host$request_uri;
}
